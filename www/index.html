    ctx.beginPath(); ctx.arc(-2.3, -10.3, 0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(1.7, -10.3, 0.5, 0, Math.PI*2); ctx.fill();

    // 8. Antenna beacon on top
    ctx.strokeStyle = '#1a2838'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(0, -22); ctx.stroke();
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const ag = ctx.createRadialGradient(0, -22, 0, 0, -22, 8);
    ag.addColorStop(0, 'rgba(100,220,255,1)');
    ag.addColorStop(0.4, 'rgba(77,208,255,0.6)');
    ag.addColorStop(1, 'rgba(77,208,255,0)');
    ctx.fillStyle = ag;
    ctx.beginPath(); ctx.arc(0, -22, 8, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    const acore = ctx.createRadialGradient(-0.5, -22.5, 0, 0, -22, 2.3);
    acore.addColorStop(0, '#fff');
    acore.addColorStop(0.5, '#a8e9ff');
    acore.addColorStop(1, '#2080c8');
    ctx.fillStyle = acore;
    ctx.beginPath(); ctx.arc(0, -22, 2.3, 0, Math.PI*2); ctx.fill();

    // 9. Hit flash
    if(hitFlash > 0){
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle = `rgba(255,255,255,${hitFlash*0.75})`;
      ctx.beginPath(); ctx.ellipse(0, 0, e.w*0.55, e.h*0.65, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  // =======================================================================
  //  ASTEROID SPINY — rocky boss-lite with magma veins and spinning spikes
  //  Layers: pulsing danger aura · shadow · spinning metallic spikes ·
  //          lumpy rock body · glowing magma cracks · craters · angry face
  // =======================================================================
  else if(e.kind==='spikehead'){
    ctx.save();
    const acx = cx, acy = by + e.h/2;

    // 1. Pulsing danger aura (red)
    const auraPulse = 0.75 + Math.sin(G.t*0.006)*0.25;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const aura = ctx.createRadialGradient(acx, acy, 4, acx, acy, 58);
    aura.addColorStop(0, `rgba(255,60,40,${0.48*auraPulse})`);
    aura.addColorStop(0.5, `rgba(255,40,20,${0.22*auraPulse})`);
    aura.addColorStop(1, 'rgba(255,40,20,0)');
    ctx.fillStyle=aura;
    ctx.beginPath(); ctx.arc(acx, acy, 58, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 2. Contact shadow
    softShadow(acx, by+e.h, 18, 0.5);

    ctx.save();
    ctx.translate(acx, acy);

    // 3. Spinning metallic spikes (behind body)
    const rotSpin = G.t*0.004;
    const spikes = 10;
    const baseR = e.w*0.38, tipR = e.w*0.62;
    for(let i=0; i<spikes; i++) {
      const a = (i/spikes) * Math.PI*2 + rotSpin;
      const x1 = Math.cos(a - 0.18)*baseR;
      const y1 = Math.sin(a - 0.18)*baseR;
      const x2 = Math.cos(a + 0.18)*baseR;
      const y2 = Math.sin(a + 0.18)*baseR;
      const tx = Math.cos(a)*tipR;
      const ty = Math.sin(a)*tipR;
      // spike gradient (metal with red-hot tip)
      const sg = ctx.createLinearGradient(0, 0, tx, ty);
      sg.addColorStop(0, '#e0b890');
      sg.addColorStop(0.5, '#a05028');
      sg.addColorStop(0.85, '#ff5020');
      sg.addColorStop(1, '#fff4a0');
      ctx.fillStyle = sg;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(tx, ty);
      ctx.lineTo(x2, y2);
      ctx.closePath();
      ctx.fill();
      // spike dark outline
      ctx.strokeStyle = '#2a0a08'; ctx.lineWidth = 1;
      ctx.stroke();
      // spike highlight (glossy line on one side)
      ctx.strokeStyle = 'rgba(255,240,200,0.7)';
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.moveTo(x1 + (tx-x1)*0.15, y1 + (ty-y1)*0.15);
      ctx.lineTo(tx*0.92, ty*0.92);
      ctx.stroke();
      // hot tip glow
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const tg = ctx.createRadialGradient(tx, ty, 0, tx, ty, 5);
      tg.addColorStop(0, 'rgba(255,220,120,0.9)');
      tg.addColorStop(1, 'rgba(255,120,40,0)');
      ctx.fillStyle = tg;
      ctx.beginPath(); ctx.arc(tx, ty, 5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // 4. Lumpy rock body (irregular polygon with proper gradient)
    const rockG = ctx.createRadialGradient(-e.w*0.18, -e.w*0.2, e.w*0.05, 0, 0, e.w*0.48);
    rockG.addColorStop(0,    '#8a5a48');
    rockG.addColorStop(0.35, '#5a2e22');
    rockG.addColorStop(0.7,  '#2c1208');
    rockG.addColorStop(1,    '#0c0404');
    ctx.fillStyle = rockG;
    ctx.beginPath();
    const pts = 14;
    const seed = e.hop*0.15;
    for(let i=0; i<=pts; i++) {
      const a = (i/pts) * Math.PI*2;
      const r = e.w*0.37 + Math.sin(i*2.1+seed)*2.4 + Math.cos(i*3.3-seed)*1.5;
      const px = Math.cos(a)*r, py = Math.sin(a)*r;
      if(i===0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    // rock outline
    ctx.strokeStyle = '#0a0302'; ctx.lineWidth = 1.2;
    ctx.stroke();

    // 5. Magma crack veins (glowing orange across rock body)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle = 'rgba(255,140,40,0.85)'; ctx.lineWidth = 1.6;
    ctx.lineCap = 'round';
    // vein 1 (left-top to center)
    ctx.beginPath();
    ctx.moveTo(-e.w*0.28, -e.w*0.1);
    ctx.lineTo(-e.w*0.12, -e.w*0.05);
    ctx.lineTo(-e.w*0.04, -e.w*0.18);
    ctx.stroke();
    // vein 2 (right to bottom)
    ctx.beginPath();
    ctx.moveTo(e.w*0.22, -e.w*0.16);
    ctx.lineTo(e.w*0.14, e.w*0.02);
    ctx.lineTo(e.w*0.20, e.w*0.18);
    ctx.stroke();
    // vein 3 (small branch)
    ctx.strokeStyle = 'rgba(255,200,80,0.7)'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-e.w*0.08, e.w*0.1);
    ctx.lineTo(-e.w*0.18, e.w*0.2);
    ctx.stroke();
    // pulsing hot spots on vein junctions
    const pulse = 0.6 + Math.sin(G.t*0.015)*0.4;
    for(const pt of [[-e.w*0.12, -e.w*0.05], [e.w*0.14, e.w*0.02], [-e.w*0.04, -e.w*0.18]]){
      const hg = ctx.createRadialGradient(pt[0], pt[1], 0, pt[0], pt[1], 5);
      hg.addColorStop(0, `rgba(255,240,180,${pulse})`);
      hg.addColorStop(1, 'rgba(255,120,40,0)');
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(pt[0], pt[1], 5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();

    // 6. Craters (small recessed circles)
    for(const cr of [[-8, 4, 3.2], [7, -6, 2.4], [-4, -9, 1.8]]){
      const [cxr, cyr, rr] = cr;
      // dark bowl
      const crG = ctx.createRadialGradient(cxr, cyr-0.5, 0, cxr, cyr, rr);
      crG.addColorStop(0, 'rgba(0,0,0,0.6)');
      crG.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = crG;
      ctx.beginPath(); ctx.arc(cxr, cyr, rr, 0, Math.PI*2); ctx.fill();
      // rim highlight
      ctx.strokeStyle = 'rgba(180,120,80,0.5)'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.arc(cxr, cyr, rr, -Math.PI*0.4, Math.PI*0.6); ctx.stroke();
    }

    // 7. Angry glowing eyes (intense red with iris)
    for(const side of [-1, 1]){
      const ex = side*6;
      // eye socket shadow
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.beginPath(); ctx.arc(ex, -1, 5.3, 0, Math.PI*2); ctx.fill();
      // white
      ctx.fillStyle = '#fff4dc';
      ctx.beginPath(); ctx.arc(ex, -1, 5, 0, Math.PI*2); ctx.fill();
      // glowing red iris
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const eyG = ctx.createRadialGradient(ex, 0, 0, ex, 0, 3.5);
      eyG.addColorStop(0, 'rgba(255,220,80,0.9)');
      eyG.addColorStop(0.4, 'rgba(255,60,40,0.8)');
      eyG.addColorStop(1, 'rgba(200,20,20,0)');
      ctx.fillStyle = eyG;
      ctx.beginPath(); ctx.arc(ex, 0, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      const pupG = ctx.createRadialGradient(ex-0.8, -0.8, 0, ex, 0, 2.6);
      pupG.addColorStop(0, '#ff8040');
      pupG.addColorStop(0.5, '#ff2020');
      pupG.addColorStop(1, '#600808');
      ctx.fillStyle = pupG;
      ctx.beginPath(); ctx.arc(ex+(side>0?1:-1), 0, 2.6, 0, Math.PI*2); ctx.fill();
      // catchlight
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(ex-1.2, -1.2, 0.9, 0, Math.PI*2); ctx.fill();
    }

    // 8. Angry brows (glowing yellow-orange, bold)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle = 'rgba(255,180,60,0.6)';
    ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(-12, -7); ctx.lineTo(-2, -3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, -7); ctx.lineTo(2, -3); ctx.stroke();
    ctx.restore();
    ctx.strokeStyle = '#ffb347'; ctx.lineWidth = 2.8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-12, -7); ctx.lineTo(-2, -3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(12, -7); ctx.lineTo(2, -3); ctx.stroke();

    // 9. Sharp teeth grin
    ctx.fillStyle = '#fff8e0';
    ctx.strokeStyle = '#3a1008'; ctx.lineWidth = 0.6;
    const teeth = [[-5,8],[-2.5,10.5],[0,8],[2.5,10.5],[5,8]];
    for(let i=0; i<teeth.length-1; i++){
      ctx.beginPath();
      ctx.moveTo(teeth[i][0], teeth[i][1]);
      ctx.lineTo((teeth[i][0]+teeth[i+1][0])/2, (teeth[i][1]+teeth[i+1][1])/2 + 2);
      ctx.lineTo(teeth[i+1][0], teeth[i+1][1]);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
    }

    ctx.restore(); // end translate

    // 10. Hit flash
    if(hitFlash > 0){
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle = `rgba(255,255,255,${hitFlash*0.8})`;
      ctx.beginPath(); ctx.arc(acx, acy, e.w*0.52, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }
}

// ============================================================================
//  DRAW — OBSTACLES
// ============================================================================
function drawObstacle(o){
  const cx = o.x + o.w/2, cy = o.y + o.h/2;

  // Shared helpers (same quality bar as enemies)
  const softShadow = (sx, sy, sw, alpha=0.42) => {
    ctx.save();
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, sw);
    sg.addColorStop(0, `rgba(0,0,0,${alpha})`);
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.ellipse(sx, sy, sw, sw*0.28, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  };
  const specular = (x, y, rx, ry, alpha=0.75) => {
    ctx.save();
    const g = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
    g.addColorStop(0, `rgba(255,255,255,${alpha})`);
    g.addColorStop(0.5, `rgba(255,255,255,${alpha*0.3})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(x, y, rx, ry, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  };

  // =======================================================================
  //  CRYSTAL CLUSTER (was 'coal') — Polished 4-shard cluster with facets
  //  Layers: ambient halo · stone base with crack detail · 4 crystal shards
  //          with multi-stop gradient · specular facets · inner energy core
  // =======================================================================
  if(o.kind==='coal'){
    ctx.save();
    // 1. Contact shadow beneath base
    softShadow(cx, o.y+o.h+1, 22, 0.4);

    // 2. Ambient halo (pink energy)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const haloPulse = 0.75 + Math.sin(G.t*0.006)*0.25;
    const gg = ctx.createRadialGradient(cx, cy, 4, cx, cy, 42);
    gg.addColorStop(0, `rgba(255,77,184,${0.45*haloPulse})`);
    gg.addColorStop(0.5, `rgba(255,100,200,${0.22*haloPulse})`);
    gg.addColorStop(1, 'rgba(255,77,184,0)');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(cx, cy, 42, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 3. Rock base (3-stop dark gradient with edge highlight)
    const baseG = ctx.createLinearGradient(o.x, o.y+o.h-6, o.x, o.y+o.h+2);
    baseG.addColorStop(0, '#4a2a58');
    baseG.addColorStop(0.6, '#2a1535');
    baseG.addColorStop(1, '#120820');
    ctx.fillStyle = baseG;
    roundRect(o.x-2, o.y+o.h-6, o.w+4, 8, 3); ctx.fill();
    ctx.strokeStyle = '#0a0418'; ctx.lineWidth = 0.8;
    roundRect(o.x-2, o.y+o.h-6, o.w+4, 8, 3); ctx.stroke();
    // crack detail on base
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(o.x+2, o.y+o.h-3); ctx.lineTo(o.x+8, o.y+o.h-1); ctx.lineTo(o.x+12, o.y+o.h-4);
    ctx.stroke();

    // 4. 4 crystal shards with rich multi-stop gradient + facet highlights
    const crystals = [
      {dx:-14, dy:-4, w:7, h:18, tilt:-0.22, hue:0},    // magenta
      {dx:-3,  dy:-8, w:8, h:22, tilt:0.03,  hue:0},    // magenta tall
      {dx:7,   dy:-6, w:6, h:19, tilt:0.18,  hue:1},    // cyan
      {dx:-9,  dy:0,  w:5, h:12, tilt:-0.42, hue:0},    // magenta small
    ];
    for(const cr of crystals){
      ctx.save();
      ctx.translate(cx+cr.dx, cy+cr.dy);
      ctx.rotate(cr.tilt);
      // inner energy glow
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const innerG = ctx.createRadialGradient(0, -cr.h*0.3, 0, 0, -cr.h*0.3, cr.w*1.5);
      const innerCol = cr.hue ? '140,220,255' : '255,180,230';
      innerG.addColorStop(0, `rgba(${innerCol},0.7)`);
      innerG.addColorStop(1, `rgba(${innerCol},0)`);
      ctx.fillStyle = innerG;
      ctx.beginPath(); ctx.arc(0, -cr.h*0.3, cr.w*1.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // main body — 5-stop gradient for rich depth
      const cg = ctx.createLinearGradient(0, -cr.h, 0, cr.h/2);
      if(cr.hue){
        cg.addColorStop(0,    '#f0faff');
        cg.addColorStop(0.2,  '#b8e4ff');
        cg.addColorStop(0.5,  '#4dd0ff');
        cg.addColorStop(0.85, '#0088c8');
        cg.addColorStop(1,    '#042a50');
      } else {
        cg.addColorStop(0,    '#ffe0f4');
        cg.addColorStop(0.2,  '#ffc8e8');
        cg.addColorStop(0.5,  '#ff4db8');
        cg.addColorStop(0.85, '#8f2488');
        cg.addColorStop(1,    '#2a0828');
      }
      ctx.fillStyle = cg;
      ctx.strokeStyle = cr.hue ? '#041838' : '#2a0828';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -cr.h);
      ctx.lineTo(cr.w/2, -cr.h*0.25);
      ctx.lineTo(cr.w/2-1, cr.h/2);
      ctx.lineTo(-cr.w/2+1, cr.h/2);
      ctx.lineTo(-cr.w/2, -cr.h*0.25);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // primary facet highlight (glossy edge)
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath();
      ctx.moveTo(0, -cr.h);
      ctx.lineTo(cr.w*0.3, -cr.h*0.2);
      ctx.lineTo(-cr.w*0.15, -cr.h*0.05);
      ctx.closePath();
      ctx.fill();
      // secondary tiny catchlight near tip
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.arc(0, -cr.h*0.85, 0.9, 0, Math.PI*2); ctx.fill();
      // subtle internal facet line
      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, -cr.h);
      ctx.lineTo(0, cr.h/2);
      ctx.stroke();
      ctx.restore();
    }
    ctx.restore();
  }

  // =======================================================================
  //  PLASMA VENT (firepit) — Procedural 3-layer flame plume + metal pipe
  //  Layers: pipe housing with bevel · plasma core (white) · mid (orange) ·
  //          outer (red) · animated ember spawn · electric arc sparks
  // =======================================================================
  else if(o.kind==='firepit'){
    ctx.save();
    // 1. Contact shadow
    softShadow(cx, o.y+o.h+1, o.w*0.58, 0.5);

    // 2. Metal pipe base — chromed with multi-stop horizontal gradient
    const pg = ctx.createLinearGradient(o.x, 0, o.x+o.w, 0);
    pg.addColorStop(0,    '#1a2030');
    pg.addColorStop(0.15, '#3a4860');
    pg.addColorStop(0.5,  '#c0d0e0');
    pg.addColorStop(0.75, '#5a6880');
    pg.addColorStop(1,    '#1a2030');
    ctx.fillStyle = pg;
    roundRect(o.x-2, o.y+4, o.w+4, o.h-4, 4); ctx.fill();
    // inner seam highlight
    ctx.strokeStyle = 'rgba(200,220,255,0.3)'; ctx.lineWidth = 0.6;
    ctx.beginPath();
    ctx.moveTo(o.x, o.y+12); ctx.lineTo(o.x+o.w, o.y+12);
    ctx.stroke();

    // 3. Top rim (pipe opening) — chromed ring
    const rimG = ctx.createLinearGradient(o.x, o.y, o.x+o.w, o.y);
    rimG.addColorStop(0,   '#1a2030');
    rimG.addColorStop(0.5, '#8a98b0');
    rimG.addColorStop(1,   '#1a2030');
    ctx.fillStyle = rimG;
    roundRect(o.x-6, o.y, o.w+12, 10, 4); ctx.fill();
    ctx.strokeStyle = '#0a121c'; ctx.lineWidth = 1.4;
    roundRect(o.x-6, o.y, o.w+12, 10, 4); ctx.stroke();
    // inner rim shadow (depth)
    ctx.fillStyle = '#04080f';
    roundRect(o.x+1, o.y+2, o.w-2, 6, 2); ctx.fill();
    // rim highlight (top bright edge)
    ctx.strokeStyle = 'rgba(230,240,255,0.7)'; ctx.lineWidth = 0.9;
    ctx.beginPath();
    ctx.moveTo(o.x-4, o.y+1.5); ctx.lineTo(o.x+o.w+4, o.y+1.5);
    ctx.stroke();

    // 4. Rivets on pipe body (3 across bottom row)
    for(let i=0; i<3; i++){
      const rx = o.x + 10 + i*((o.w-20)/2);
      // rivet glow
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const rgG = ctx.createRadialGradient(rx, o.y+o.h-6, 0, rx, o.y+o.h-6, 4);
      rgG.addColorStop(0, 'rgba(255,210,80,0.7)');
      rgG.addColorStop(1, 'rgba(255,150,20,0)');
      ctx.fillStyle = rgG;
      ctx.beginPath(); ctx.arc(rx, o.y+o.h-6, 4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // rivet core
      const rvG = ctx.createRadialGradient(rx-0.6, o.y+o.h-7, 0, rx, o.y+o.h-6, 2.2);
      rvG.addColorStop(0, '#fff8d0');
      rvG.addColorStop(0.6, '#ffd54a');
      rvG.addColorStop(1, '#7a5010');
      ctx.fillStyle = rvG;
      ctx.beginPath(); ctx.arc(rx, o.y+o.h-6, 2.2, 0, Math.PI*2); ctx.fill();
    }

    // 5. Procedural 3-layer flame plume (yellow base → orange mid → red tip)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const plumeH = 42 + Math.sin(G.t*0.012)*5;
    // Layer 1 — outer red/orange wash (widest, softest)
    const f1 = ctx.createLinearGradient(cx, o.y+2, cx, o.y-plumeH*1.15);
    f1.addColorStop(0,    'rgba(255,60,20,0.75)');
    f1.addColorStop(0.4,  'rgba(255,90,30,0.55)');
    f1.addColorStop(0.8,  'rgba(255,60,40,0.25)');
    f1.addColorStop(1,    'rgba(200,40,20,0)');
    ctx.fillStyle = f1;
    const flk1 = Math.sin(G.t*0.02)*3;
    ctx.beginPath();
    ctx.moveTo(cx-14, o.y+2);
    ctx.bezierCurveTo(cx-16+flk1, o.y-plumeH*0.35, cx-8, o.y-plumeH*0.8, cx+flk1*0.4, o.y-plumeH*1.15);
    ctx.bezierCurveTo(cx+8, o.y-plumeH*0.8, cx+16-flk1, o.y-plumeH*0.35, cx+14, o.y+2);
    ctx.closePath();
    ctx.fill();
    // Layer 2 — mid yellow/orange
    const f2 = ctx.createLinearGradient(cx, o.y+2, cx, o.y-plumeH*0.9);
    f2.addColorStop(0,   'rgba(255,200,60,0.85)');
    f2.addColorStop(0.5, 'rgba(255,160,40,0.7)');
    f2.addColorStop(1,   'rgba(255,120,40,0)');
    ctx.fillStyle = f2;
    const flk2 = Math.sin(G.t*0.025 + 1.5)*2.5;
    ctx.beginPath();
    ctx.moveTo(cx-9, o.y+1);
    ctx.bezierCurveTo(cx-11+flk2, o.y-plumeH*0.3, cx-4, o.y-plumeH*0.65, cx+flk2*0.3, o.y-plumeH*0.9);
    ctx.bezierCurveTo(cx+4, o.y-plumeH*0.65, cx+11-flk2, o.y-plumeH*0.3, cx+9, o.y+1);
    ctx.closePath();
    ctx.fill();
    // Layer 3 — white-hot core
    const f3 = ctx.createLinearGradient(cx, o.y+1, cx, o.y-plumeH*0.6);
    f3.addColorStop(0,   'rgba(255,255,255,0.95)');
    f3.addColorStop(0.5, 'rgba(255,240,180,0.8)');
    f3.addColorStop(1,   'rgba(255,200,100,0)');
    ctx.fillStyle = f3;
    const flk3 = Math.sin(G.t*0.03 + 3)*1.6;
    ctx.beginPath();
    ctx.moveTo(cx-4, o.y);
    ctx.bezierCurveTo(cx-5+flk3, o.y-plumeH*0.25, cx-2, o.y-plumeH*0.45, cx, o.y-plumeH*0.6);
    ctx.bezierCurveTo(cx+2, o.y-plumeH*0.45, cx+5-flk3, o.y-plumeH*0.25, cx+4, o.y);
    ctx.closePath();
    ctx.fill();
    // Layer 4 — root flame mass (wider base glow)
    const f4 = ctx.createRadialGradient(cx, o.y+2, 2, cx, o.y+2, 20);
    f4.addColorStop(0, 'rgba(255,200,100,0.9)');
    f4.addColorStop(1, 'rgba(255,80,30,0)');
    ctx.fillStyle = f4;
    ctx.beginPath(); ctx.arc(cx, o.y+2, 20, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 6. Ember spawn (small upward-floating dots with gravity off)
    if(G.frame % 4 === 0){
      G.particles.push({
        x: cx + rand(-6,6), y: o.y - 2,
        vx: rand(-0.4, 0.4), vy: rand(-2.2, -1.2),
        life: 1, max: rand(28, 46),
        color: Math.random()<0.5 ? 'rgba(255,180,60,0.9)' : 'rgba(255,120,40,0.9)',
        size: rand(1.4, 2.4), g: -0.02, shape:'circle',
      });
    }

    // 7. Electric arc sparks — zigzag lightning above flame
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle = 'rgba(255,255,220,0.9)';
    ctx.lineWidth = 1.3; ctx.lineCap = 'round';
    for(let i=0; i<2; i++){
      const ph = G.t*0.06 + i*2.1;
      const sx = cx + Math.sin(ph)*12;
      const sy = o.y - 10 - Math.abs(Math.sin(ph*0.7))*20;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx+4, sy-4);
      ctx.lineTo(sx+1, sy-8);
      ctx.lineTo(sx+5, sy-12);
      ctx.stroke();
    }
    ctx.restore();
    ctx.restore();
  }

  // =======================================================================
  //  SAW BLADE (saw) — Metallic circular saw with zigzag teeth + spark trail
  //  Layers: motion-blur ring · danger aura · chromed disc · zigzag teeth ·
  //          rivet studs · center hub · glowing core · cut-air spark trail
  // =======================================================================
  else if(o.kind==='saw'){
    ctx.save();
    // 1. Motion blur — subtle streaked ring behind rotating disc
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const blurG = ctx.createRadialGradient(cx, cy, o.w*0.35, cx, cy, o.w*0.58);
    blurG.addColorStop(0, 'rgba(200,220,240,0.3)');
    blurG.addColorStop(1, 'rgba(200,220,240,0)');
    ctx.fillStyle = blurG;
    ctx.beginPath(); ctx.arc(cx, cy, o.w*0.58, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 2. Danger aura (red-tinted warning glow — it's a cutting tool!)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const auraPulse = 0.7 + Math.sin(G.t*0.012)*0.3;
    const ring = ctx.createRadialGradient(cx, cy, o.w*0.25, cx, cy, o.w*0.78);
    ring.addColorStop(0, `rgba(255,90,60,${0.3*auraPulse})`);
    ring.addColorStop(0.5, `rgba(255,60,40,${0.15*auraPulse})`);
    ring.addColorStop(1, 'rgba(255,60,40,0)');
    ctx.fillStyle = ring;
    ctx.beginPath(); ctx.arc(cx, cy, o.w*0.78, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 3. Spark trail along rotation edge (catch the air being cut)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const rotA = o.rotA || 0;
    for(let i=0; i<6; i++){
      const a = rotA * 1.2 + i * Math.PI/3 + Math.sin(G.t*0.05+i)*0.3;
      const dist = o.w*0.52 + Math.sin(G.t*0.08+i)*2;
      const sx = cx + Math.cos(a)*dist;
      const sy = cy + Math.sin(a)*dist;
      const sgG = ctx.createRadialGradient(sx, sy, 0, sx, sy, 4);
      sgG.addColorStop(0, 'rgba(255,220,120,0.85)');
      sgG.addColorStop(1, 'rgba(255,150,40,0)');
      ctx.fillStyle = sgG;
      ctx.beginPath(); ctx.arc(sx, sy, 4, 0, Math.PI*2); ctx.fill();
      // white-hot spark core
      ctx.fillStyle = 'rgba(255,255,200,0.9)';
      ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI*2); ctx.fill();
    }
    // occasional emitted spark particle
    if(G.frame % 3 === 0){
      const spA = rotA*1.2 + Math.random()*Math.PI*2;
      G.particles.push({
        x: cx + Math.cos(spA)*o.w*0.52,
        y: cy + Math.sin(spA)*o.w*0.52,
        vx: Math.cos(spA)*rand(2,5) + rand(-1,1),
        vy: Math.sin(spA)*rand(2,5) + rand(-1,1),
        life: 1, max: rand(15, 25),
        color: 'rgba(255,220,140,0.95)',
        size: rand(1, 2), g: 0.08, shape:'circle',
      });
    }
    ctx.restore();

    // Transform for rotation
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rotA);
    const outer = o.w*0.5;
    const innerR = o.w*0.32;

    // 4. Zigzag teeth (16 triangular teeth around edge)
    const teethCount = 16;
    for(let i=0; i<teethCount; i++){
      const a1 = (i/teethCount)*Math.PI*2;
      const a2 = ((i+0.5)/teethCount)*Math.PI*2;
      const a3 = ((i+1)/teethCount)*Math.PI*2;
      // tooth with gradient (base darker, tip bright)
      const tg = ctx.createLinearGradient(
        Math.cos(a1)*innerR, Math.sin(a1)*innerR,
        Math.cos(a2)*outer, Math.sin(a2)*outer
      );
      tg.addColorStop(0, '#3a4858');
      tg.addColorStop(0.5, '#a0b0c4');
      tg.addColorStop(0.85, '#ffffff');
      tg.addColorStop(1, '#c8d4e0');
      ctx.fillStyle = tg;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a1)*innerR, Math.sin(a1)*innerR);
      ctx.lineTo(Math.cos(a2)*outer, Math.sin(a2)*outer);
      ctx.lineTo(Math.cos(a3)*innerR, Math.sin(a3)*innerR);
      ctx.closePath();
      ctx.fill();
      // tooth outline (dark)
      ctx.strokeStyle = '#0a1018'; ctx.lineWidth = 0.7;
      ctx.stroke();
      // razor-sharp tip highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a2)*outer*0.92, Math.sin(a2)*outer*0.92);
      ctx.lineTo(Math.cos(a2)*outer, Math.sin(a2)*outer);
      ctx.stroke();
    }

    // 5. Main chromed disc body (radial gradient for dome effect)
    const diskG = ctx.createRadialGradient(-innerR*0.35, -innerR*0.4, innerR*0.05, 0, 0, innerR);
    diskG.addColorStop(0,    '#ffffff');
    diskG.addColorStop(0.2,  '#e0e8f0');
    diskG.addColorStop(0.5,  '#8a9aae');
    diskG.addColorStop(0.85, '#3a4858');
    diskG.addColorStop(1,    '#1a2030');
    ctx.fillStyle = diskG;
    ctx.beginPath(); ctx.arc(0, 0, innerR, 0, Math.PI*2); ctx.fill();
    // disc rim ring (dark separating line)
    ctx.strokeStyle = '#0a1018'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(0, 0, innerR, 0, Math.PI*2); ctx.stroke();
    // inner bevel ring (glossy)
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(0, 0, innerR*0.88, 0, Math.PI*2); ctx.stroke();

    // 6. Radial spoke pattern (engineered saw look)
    ctx.save();
    for(let i=0; i<6; i++){
      ctx.rotate(Math.PI/3);
      ctx.strokeStyle = 'rgba(20,30,40,0.4)';
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.moveTo(innerR*0.3, 0);
      ctx.lineTo(innerR*0.85, 0);
      ctx.stroke();
    }
    ctx.restore();

    // 7. Rivet studs around disc (inner ring)
    for(let i=0; i<6; i++){
      const a = (i/6)*Math.PI*2;
      const rx = Math.cos(a)*innerR*0.65;
      const ry = Math.sin(a)*innerR*0.65;
      const rvG = ctx.createRadialGradient(rx-0.5, ry-0.5, 0, rx, ry, 2);
      rvG.addColorStop(0, '#ffffff');
      rvG.addColorStop(0.5, '#8a9aae');
      rvG.addColorStop(1, '#2a3548');
      ctx.fillStyle = rvG;
      ctx.beginPath(); ctx.arc(rx, ry, 2, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#0a1018'; ctx.lineWidth = 0.4;
      ctx.beginPath(); ctx.arc(rx, ry, 2, 0, Math.PI*2); ctx.stroke();
    }

    // 8. Specular highlight on disc (top-left sheen)
    specular(-innerR*0.38, -innerR*0.42, innerR*0.26, innerR*0.18, 0.7);

    // 9. Center hub (boss nut)
    const hubG = ctx.createRadialGradient(-3, -3, 0, 0, 0, 8);
    hubG.addColorStop(0, '#fff');
    hubG.addColorStop(0.5, '#a0b0c4');
    hubG.addColorStop(1, '#1a2030');
    ctx.fillStyle = hubG;
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#0a1018'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.stroke();
    // center hex bolt
    ctx.fillStyle = '#3a4858';
    ctx.beginPath();
    for(let k=0; k<6; k++){
      const a = (k/6)*Math.PI*2;
      const px = Math.cos(a)*4.5, py = Math.sin(a)*4.5;
      if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#0a1018'; ctx.lineWidth = 0.5;
    ctx.stroke();
    // glowing red core at center (warning)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const crPulse = 0.7 + Math.sin(G.t*0.02)*0.3;
    const crG = ctx.createRadialGradient(0, 0, 0, 0, 0, 3);
    crG.addColorStop(0, `rgba(255,100,80,${crPulse})`);
    crG.addColorStop(1, 'rgba(255,60,40,0)');
    ctx.fillStyle = crG;
    ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.restore();
    ctx.restore();
  }

  // =======================================================================
  //  SPACE CACTUS-CHILI (chili) — Fleshy green stem with thorns + fire flower
  //  Layers: shadow · ribbed stem with gradient · rib shadows · thorns
  //          specular · flaming pepper flower on top with heat glow + embers
  // =======================================================================
  else if(o.kind==='chili'){
    ctx.save();
    ctx.translate(cx, o.y+o.h);

    // 1. Contact shadow
    softShadow(0, 0, 16, 0.45);

    // 2. Stem main body (5-stop gradient with subtle inner highlight)
    const sg = ctx.createLinearGradient(-12, 0, 12, 0);
    sg.addColorStop(0,    '#0a3018');
    sg.addColorStop(0.25, '#2e8040');
    sg.addColorStop(0.5,  '#68d478');
    sg.addColorStop(0.75, '#2e8040');
    sg.addColorStop(1,    '#0a3018');
    ctx.fillStyle = sg;
    ctx.strokeStyle = '#041608';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(-12, 0);
    ctx.bezierCurveTo(-16, -o.h*0.35, -10, -o.h*0.7, -9, -o.h+8);
    ctx.bezierCurveTo(-6, -o.h+4, 6, -o.h+4, 9, -o.h+8);
    ctx.bezierCurveTo(10, -o.h*0.7, 16, -o.h*0.35, 12, 0);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    // 3. Top-front specular shine (vertical wet highlight)
    ctx.save();
    ctx.globalAlpha = 0.45;
    const shineG = ctx.createLinearGradient(-5, -o.h, -5, 0);
    shineG.addColorStop(0, 'rgba(255,255,255,0.9)');
    shineG.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = shineG;
    ctx.beginPath();
    ctx.ellipse(-4, -o.h*0.55, 2, o.h*0.42, -0.08, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // 4. Ribs (3 vertical darker grooves)
    ctx.save();
    ctx.globalCompositeOperation='multiply';
    ctx.strokeStyle = 'rgba(0,0,0,0.28)';
    ctx.lineWidth = 1.6; ctx.lineCap = 'round';
    for(const rx of [-7, 0, 7]){
      ctx.beginPath();
      ctx.moveTo(rx + (rx === 0 ? 0 : -0.5), -4);
      ctx.lineTo(rx + (rx === 0 ? 0 : 0.5), -o.h+8);
      ctx.stroke();
    }
    ctx.restore();
    // inner rib highlights (micro shine beside each rib)
    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
    ctx.lineWidth = 0.8;
    for(const rx of [-5, 2, 9]){
      ctx.beginPath();
      ctx.moveTo(rx, -8); ctx.lineTo(rx, -o.h+10);
      ctx.stroke();
    }

    // 5. Yellow thorns (4 per side with beveled gradient + glow)
    for(let i=0; i<4; i++){
      const sy = -o.h*0.2 - i*(o.h*0.17);
      for(const side of [-1, 1]){
        ctx.save();
        // thorn glow
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const glow = ctx.createRadialGradient(side*14, sy-2, 0, side*14, sy-2, 6);
        glow.addColorStop(0, 'rgba(255,220,80,0.5)');
        glow.addColorStop(1, 'rgba(255,180,40,0)');
        ctx.fillStyle = glow;
        ctx.beginPath(); ctx.arc(side*14, sy-2, 6, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        // thorn shape with multi-stop gradient
        const thG = ctx.createLinearGradient(side*11, sy, side*18, sy);
        thG.addColorStop(0, '#c08a10');
        thG.addColorStop(0.5, '#ffe070');
        thG.addColorStop(1, '#fff8d0');
        ctx.fillStyle = thG;
        ctx.strokeStyle = '#5a3a05';
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(side*11, sy);
        ctx.lineTo(side*18, sy-2);
        ctx.lineTo(side*11, sy-5);
        ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
      }
    }
    // Tiny front-facing thorns (dots) — 2 columns
    ctx.fillStyle = '#ffe070';
    ctx.strokeStyle = '#8a6010'; ctx.lineWidth = 0.3;
    for(let i=0; i<5; i++){
      const ty = -o.h*0.15 - i*(o.h*0.15);
      ctx.beginPath(); ctx.arc(-3, ty, 0.9, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.beginPath(); ctx.arc(3, ty-3, 0.9, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    }

    // 6. Flaming chili-pepper flower on top (replacing static pink flower)
    // Flower base (red pepper body with gradient)
    const pepG = ctx.createRadialGradient(-1, -o.h-6, 1, 0, -o.h-4, 8);
    pepG.addColorStop(0,    '#ffc080');
    pepG.addColorStop(0.35, '#ff6030');
    pepG.addColorStop(0.75, '#c82820');
    pepG.addColorStop(1,    '#5a0a08');
    ctx.fillStyle = pepG;
    ctx.strokeStyle = '#300404'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.ellipse(0, -o.h-4, 7, 5, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    // pepper specular
    ctx.fillStyle = 'rgba(255,240,200,0.7)';
    ctx.beginPath(); ctx.ellipse(-2, -o.h-6, 1.5, 1.2, -0.5, 0, Math.PI*2); ctx.fill();
    // green stem top
    ctx.fillStyle = '#4a9020';
    ctx.beginPath();
    ctx.moveTo(-3, -o.h-7); ctx.lineTo(0, -o.h-11); ctx.lineTo(3, -o.h-7);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#1a4008'; ctx.lineWidth = 0.5;
    ctx.stroke();

    // 7. Heat distortion / flame tip above pepper
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const heatH = 14 + Math.sin(G.t*0.02)*3;
    // outer red
    const hgA = ctx.createLinearGradient(0, -o.h-4, 0, -o.h-4-heatH);
    hgA.addColorStop(0, 'rgba(255,80,20,0.7)');
    hgA.addColorStop(1, 'rgba(255,40,0,0)');
    ctx.fillStyle = hgA;
    const flk = Math.sin(G.t*0.03)*2;
    ctx.beginPath();
    ctx.moveTo(-5, -o.h-4);
    ctx.bezierCurveTo(-6+flk, -o.h-4-heatH*0.4, -2, -o.h-4-heatH*0.75, 0, -o.h-4-heatH);
    ctx.bezierCurveTo(2, -o.h-4-heatH*0.75, 6-flk, -o.h-4-heatH*0.4, 5, -o.h-4);
    ctx.closePath(); ctx.fill();
    // inner yellow core
    const hgB = ctx.createLinearGradient(0, -o.h-4, 0, -o.h-4-heatH*0.7);
    hgB.addColorStop(0, 'rgba(255,220,100,0.9)');
    hgB.addColorStop(1, 'rgba(255,180,40,0)');
    ctx.fillStyle = hgB;
    ctx.beginPath();
    ctx.moveTo(-2, -o.h-4);
    ctx.bezierCurveTo(-3, -o.h-4-heatH*0.3, -1, -o.h-4-heatH*0.55, 0, -o.h-4-heatH*0.7);
    ctx.bezierCurveTo(1, -o.h-4-heatH*0.55, 3, -o.h-4-heatH*0.3, 2, -o.h-4);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // 8. Small ember sparks occasionally
    if(G.frame % 10 === 0){
      G.particles.push({
        x: cx + rand(-2,2), y: o.y - 6 + rand(-2,0),
        vx: rand(-0.4, 0.4), vy: rand(-1.8, -0.8),
        life: 1, max: rand(20, 34),
        color: 'rgba(255,150,50,0.9)',
        size: rand(1, 2), g: -0.01, shape:'circle',
      });
    }

    ctx.restore();
  }

  // =======================================================================
  //  MYSTERY BOX — Holographic rotating 3D loot box with cycling icons
  //  Layers: rainbow halo · holographic shell with scanlines · bevel frame ·
  //          3D tumbling icon inside · catchlight · corner sparkles
  // =======================================================================
  else if(o.kind==='mystery'){
    const mcx = o.x + o.w/2, mcy = o.y + o.h/2;
    const bob = Math.sin(G.t*0.008) * 3;
    ctx.save();
    ctx.translate(mcx, mcy+bob);

    // 1. Rainbow holo halo (color-cycling, bigger+softer)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const hue = Math.floor(G.t*0.15) % 360;
    const haloPulse = 0.75 + Math.sin(G.t*0.008)*0.25;
    const rg = ctx.createRadialGradient(0,0,4, 0,0,52);
    rg.addColorStop(0, `hsla(${hue},95%,70%,${0.55*haloPulse})`);
    rg.addColorStop(0.5, `hsla(${(hue+60)%360},95%,75%,${0.3*haloPulse})`);
    rg.addColorStop(1, `hsla(${hue},95%,70%,0)`);
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(0, 0, 52, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 2. Contact shadow (on floor far below)
    softShadow(0, o.h/2+10, 20, 0.35);

    // Tumble: pitch (Y axis, shows front vs side), always positive yaw drift
    const rot = Math.sin(G.t*0.003)*0.08;
    const yaw = G.t * 0.004;  // horizontal tumble rate
    const yawCos = Math.cos(yaw);
    const yawAbs = Math.abs(yawCos);
    ctx.rotate(rot);

    // 3. Holographic shell (square box with hologram edge shimmer + scanlines)
    const boxW = o.w * yawAbs + 4;  // compressed when edge-on
    const boxH = o.h;
    // outer frame glow (animated hue edge)
    ctx.save();
    ctx.shadowColor = `hsl(${hue},95%,70%)`;
    ctx.shadowBlur = 14;
    // metallic frame
    const frameG = ctx.createLinearGradient(0, -boxH/2, 0, boxH/2);
    frameG.addColorStop(0,    '#fff3a0');
    frameG.addColorStop(0.35, '#ffd54a');
    frameG.addColorStop(0.7,  '#c88810');
    frameG.addColorStop(1,    '#5a3a00');
    ctx.fillStyle = frameG;
    ctx.strokeStyle = '#2a1a00';
    ctx.lineWidth = 2;
    roundRect(-boxW/2, -boxH/2, boxW, boxH, 6);
    ctx.fill(); ctx.stroke();
    ctx.restore();

    // 4. Inner holographic window (shows transparent inside with scanlines)
    ctx.save();
    roundRect(-boxW/2+4, -boxH/2+4, boxW-8, boxH-8, 3);
    ctx.clip();
    // hologram base fill (gradient sky behind icons)
    const holoG = ctx.createLinearGradient(0, -boxH/2, 0, boxH/2);
    holoG.addColorStop(0, `hsla(${hue},90%,60%,0.3)`);
    holoG.addColorStop(1, `hsla(${(hue+120)%360},90%,40%,0.35)`);
    ctx.fillStyle = holoG;
    ctx.fillRect(-boxW/2, -boxH/2, boxW, boxH);
    // scanlines (moving)
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#ffffff';
    const scanOff = (G.t * 0.15) % 4;
    for(let sy = -boxH/2 + scanOff; sy < boxH/2; sy += 4){
      ctx.fillRect(-boxW/2, sy, boxW, 0.7);
    }
    ctx.globalAlpha = 1;
    // 3D tumbling icon inside (cycles through gift types)
    const iconTypes = ['coin', 'gem', 'shield', 'spark'];
    const iconIdx = Math.floor(G.t*0.001) % iconTypes.length;
    const iconType = iconTypes[iconIdx];
    const iconFade = (Math.sin(G.t*0.001*Math.PI*2 - iconIdx*2) + 1) * 0.5;
    ctx.save();
    ctx.scale(yawAbs, 1);
    ctx.globalAlpha = 0.85 + iconFade*0.15;
    // outer icon glow
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const iconGlowColor = iconType==='coin' ? 'rgba(255,213,74,' : iconType==='gem' ? 'rgba(255,77,184,' : iconType==='shield' ? 'rgba(80,200,255,' : 'rgba(255,180,60,';
    const igG = ctx.createRadialGradient(0, 0, 0, 0, 0, 18);
    igG.addColorStop(0, iconGlowColor + '0.7)');
    igG.addColorStop(1, iconGlowColor + '0)');
    ctx.fillStyle = igG;
    ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // icon core
    if(iconType==='coin'){
      const cG = ctx.createRadialGradient(-3, -4, 1, 0, 0, 10);
      cG.addColorStop(0, '#fff4b0');
      cG.addColorStop(0.5, '#ffd54a');
      cG.addColorStop(1, '#7a5008');
      ctx.fillStyle = cG;
      ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#3a2000'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.stroke();
      // star inside
      ctx.fillStyle = '#8a5a10';
      ctx.beginPath();
      for(let k=0;k<10;k++){
        const a = (k/10)*Math.PI*2 - Math.PI/2;
        const rr = k%2===0 ? 5 : 2.5;
        const px = Math.cos(a)*rr, py = Math.sin(a)*rr;
        if(k===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
      }
      ctx.closePath(); ctx.fill();
    } else if(iconType==='gem'){
      ctx.fillStyle = '#6a1a50';
      ctx.beginPath();
      ctx.moveTo(0,-10); ctx.lineTo(10,0); ctx.lineTo(0,10); ctx.lineTo(-10,0);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ff4db8';
      ctx.beginPath();
      ctx.moveTo(0,-10); ctx.lineTo(10,0); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffbddc';
      ctx.beginPath();
      ctx.moveTo(0,-10); ctx.lineTo(-10,0); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(0,-10); ctx.lineTo(4,-3); ctx.lineTo(-4,-3); ctx.closePath(); ctx.fill();
    } else if(iconType==='shield'){
      const shG = ctx.createRadialGradient(-3, -3, 0, 0, 0, 10);
      shG.addColorStop(0, '#e0f4ff');
      shG.addColorStop(0.6, '#4dd0ff');
      shG.addColorStop(1, '#1a4868');
      ctx.fillStyle = shG;
      ctx.beginPath();
      ctx.moveTo(0, -10); ctx.lineTo(8, -4); ctx.lineTo(8, 5); ctx.lineTo(0, 10); ctx.lineTo(-8, 5); ctx.lineTo(-8, -4);
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = '#0a3048'; ctx.lineWidth = 1;
      ctx.stroke();
      // inner star
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
    } else {
      // spark
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle = '#ffd080'; ctx.lineWidth = 2; ctx.lineCap='round';
      for(let k=0; k<8; k++){
        const a = (k/8)*Math.PI*2 + G.t*0.01;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a)*2, Math.sin(a)*2);
        ctx.lineTo(Math.cos(a)*9, Math.sin(a)*9);
        ctx.stroke();
      }
      ctx.restore();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
    ctx.restore();

    // 5. Frame bevel highlight (top edge bright)
    ctx.strokeStyle = 'rgba(255,255,255,0.65)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-boxW/2+3, -boxH/2+2);
    ctx.lineTo(boxW/2-3, -boxH/2+2);
    ctx.stroke();

    // 6. Corner pulsing rainbow gems
    for(let i=0; i<4; i++){
      const a = (i/4)*Math.PI*2 + G.t*0.003;
      const gemX = (i<2?-1:1) * (boxW/2 - 5);
      const gemY = (i%2===0?-1:1) * (boxH/2 - 5);
      const gPulse = 0.7 + Math.sin(G.t*0.01 + i)*0.3;
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const gmG = ctx.createRadialGradient(gemX, gemY, 0, gemX, gemY, 5);
      gmG.addColorStop(0, `hsla(${(hue+i*90)%360},100%,80%,${gPulse})`);
      gmG.addColorStop(1, `hsla(${(hue+i*90)%360},100%,60%,0)`);
      ctx.fillStyle = gmG;
      ctx.beginPath(); ctx.arc(gemX, gemY, 5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = `hsl(${(hue+i*90)%360},100%,85%)`;
      ctx.beginPath(); ctx.arc(gemX, gemY, 1.6, 0, Math.PI*2); ctx.fill();
    }

    // 7. Floating "?" above the box when mostly face-on
    if(yawAbs > 0.4){
      const qY = -o.h/2 - 16 + Math.sin(G.t*0.015)*2;
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle = `hsla(${hue},95%,85%,${yawAbs})`;
      ctx.font = '900 16px Russo One, sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('?', 0, qY);
      ctx.restore();
      ctx.fillStyle = `rgba(255,255,255,${yawAbs})`;
      ctx.fillText('?', 0, qY);
    }

    ctx.restore();
  }

  // =======================================================================
  //  BOUNCE PAD (bouncer) — Chromed trampoline with coil springs + launch glow
  //  Layers: shadow · metal base with rivets · coil springs ·
  //          cushion with 2-tone gradient · specular · pulsing launch halo · up arrows
  // =======================================================================
  else if(o.kind==='bouncer'){
    ctx.save();
    const cx2 = o.x + o.w/2;

    // 1. Contact shadow
    softShadow(cx2, o.y+o.h+2, o.w*0.45, 0.4);

    // 2. Launch halo (pulsing pink aura above pad)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const bpPulse = 0.7 + Math.sin(G.t*0.012)*0.3;
    const gg = ctx.createRadialGradient(cx2, o.y-8, 2, cx2, o.y-8, 48);
    gg.addColorStop(0, `rgba(255,77,184,${0.6*bpPulse})`);
    gg.addColorStop(0.5, `rgba(255,120,220,${0.25*bpPulse})`);
    gg.addColorStop(1, 'rgba(255,77,184,0)');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(cx2, o.y-8, 48, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 3. Base mount (chromed metal with 5-stop gradient)
    const bG = ctx.createLinearGradient(o.x, o.y+8, o.x+o.w, o.y+8);
    bG.addColorStop(0,    '#0a0410');
    bG.addColorStop(0.15, '#3a1b4a');
    bG.addColorStop(0.5,  '#8a5aa0');
    bG.addColorStop(0.85, '#3a1b4a');
    bG.addColorStop(1,    '#0a0410');
    ctx.fillStyle = bG;
    roundRect(o.x, o.y+8, o.w, o.h-4, 4); ctx.fill();
    ctx.strokeStyle = '#0a0418'; ctx.lineWidth = 1;
    roundRect(o.x, o.y+8, o.w, o.h-4, 4); ctx.stroke();
    // bottom bevel
    ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(o.x+2, o.y+9); ctx.lineTo(o.x+o.w-2, o.y+9);
    ctx.stroke();
    // corner rivets on base
    for(const rx of [o.x+4, o.x+o.w-4]){
      const rvG = ctx.createRadialGradient(rx-0.5, o.y+11, 0, rx, o.y+11, 1.8);
      rvG.addColorStop(0, '#fff');
      rvG.addColorStop(0.5, '#ffd54a');
      rvG.addColorStop(1, '#7a5010');
      ctx.fillStyle = rvG;
      ctx.beginPath(); ctx.arc(rx, o.y+11, 1.8, 0, Math.PI*2); ctx.fill();
    }

    // 4. Coil springs (3 zigzag helixes with metallic shine)
    for(let k=0; k<3; k++){
      const sx = o.x + 10 + k*((o.w-20)/2);
      const compress = Math.sin(G.t*0.01 + k*0.5)*0.6;  // subtle idle bounce
      // outer dark coil shape
      ctx.strokeStyle = '#3a2058'; ctx.lineWidth = 3.5; ctx.lineCap='round';
      ctx.beginPath();
      for(let c=0; c<4; c++){
        const cy = o.y + 8 - c*1.2 + compress*c;
        ctx.moveTo(sx-4, cy);
        ctx.quadraticCurveTo(sx, cy-2, sx+4, cy);
      }
      ctx.stroke();
      // inner metallic coil highlight
      ctx.strokeStyle = '#ffd54a'; ctx.lineWidth = 1.8;
      ctx.beginPath();
      for(let c=0; c<4; c++){
        const cy = o.y + 8 - c*1.2 + compress*c;
        ctx.moveTo(sx-4, cy);
        ctx.quadraticCurveTo(sx, cy-2, sx+4, cy);
      }
      ctx.stroke();
      // top highlight (specular)
      ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 0.8;
      ctx.beginPath();
      for(let c=0; c<4; c++){
        const cy = o.y + 8 - c*1.2 + compress*c - 0.6;
        ctx.moveTo(sx-3, cy);
        ctx.quadraticCurveTo(sx, cy-1.8, sx+3, cy);
      }
      ctx.stroke();
    }

    // 5. Top cushion (vibrant pink with radial glossy gradient)
    const cG = ctx.createLinearGradient(0, o.y-1, 0, o.y+9);
    cG.addColorStop(0,    '#ffe0f0');
    cG.addColorStop(0.3,  '#ff9ed4');
    cG.addColorStop(0.7,  '#ff4db8');
    cG.addColorStop(1,    '#7a1060');
    ctx.fillStyle = cG;
    roundRect(o.x+3, o.y-1, o.w-6, 11, 3.5); ctx.fill();
    // cushion outline
    ctx.strokeStyle = '#3a0828'; ctx.lineWidth = 1;
    roundRect(o.x+3, o.y-1, o.w-6, 11, 3.5); ctx.stroke();

    // 6. Cushion specular streak (top bright line)
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    roundRect(o.x+6, o.y, o.w-12, 2, 1); ctx.fill();
    // secondary catchlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.ellipse(cx2-o.w*0.2, o.y+1, o.w*0.1, 1, 0, 0, Math.PI*2); ctx.fill();

    // 7. Energy ripples (horizontal wave lines emanating up from pad)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    for(let i=0; i<3; i++){
      const rippleY = o.y - 4 - ((G.t*0.08 + i*12) % 36);
      const rippleAlpha = 1 - ((o.y-4-rippleY)/36);
      ctx.strokeStyle = `rgba(255,200,240,${rippleAlpha*0.5})`;
      ctx.lineWidth = 1;
      const rw = o.w*0.4 + (o.y-4-rippleY)*0.6;
      ctx.beginPath();
      ctx.ellipse(cx2, rippleY, rw, 2, 0, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.restore();

    // 8. Up arrows floating above (animated bob)
    const ay = o.y - 22 + Math.sin(G.t*0.008)*4;
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.strokeStyle = '#ffffff'; ctx.fillStyle = '#ffffff';
    ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    for(const dx of [-9, 9]){
      ctx.beginPath();
      ctx.moveTo(cx2+dx-5, ay+3);
      ctx.lineTo(cx2+dx,   ay-3);
      ctx.lineTo(cx2+dx+5, ay+3);
      ctx.stroke();
    }
    ctx.restore();

    ctx.restore();
  }

  // =======================================================================
  //  METEOR SHARDS (spikes) — Metal spikes on rusted blood-stained base
  //  Layers: rusted base with crack details · 5 beveled metal spikes
  //          with specular edges · tip warning glow · dried-blood stains
  // =======================================================================
  else if(o.kind==='spikes'){
    ctx.save();

    // 1. Base shadow
    softShadow(cx, o.y+o.h+1, o.w*0.6, 0.5);

    // 2. Rusted base (iron with blood stains)
    const baseG = ctx.createLinearGradient(o.x, o.y+o.h-7, o.x, o.y+o.h+2);
    baseG.addColorStop(0, '#58362a');
    baseG.addColorStop(0.3, '#3a2018');
    baseG.addColorStop(0.7, '#1a0808');
    baseG.addColorStop(1, '#0a0204');
    ctx.fillStyle = baseG;
    roundRect(o.x-4, o.y+o.h-7, o.w+8, 9, 3); ctx.fill();
    // dark outline
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    roundRect(o.x-4, o.y+o.h-7, o.w+8, 9, 3); ctx.stroke();
    // top bevel (metal edge catches light)
    ctx.strokeStyle = 'rgba(180,120,80,0.5)'; ctx.lineWidth = 0.7;
    ctx.beginPath();
    ctx.moveTo(o.x-2, o.y+o.h-6); ctx.lineTo(o.x+o.w+2, o.y+o.h-6);
    ctx.stroke();
    // rust texture spots
    for(let i=0; i<6; i++){
      const rx = o.x + 4 + (i*o.w/6) + (i*37)%7;
      const ry = o.y+o.h-4 + (i%2)*2;
      ctx.fillStyle = `rgba(${80+i*8},${40+i*5},20,0.5)`;
      ctx.beginPath(); ctx.arc(rx, ry, 1.2+(i%2)*0.6, 0, Math.PI*2); ctx.fill();
    }
    // dried blood stains (darker reddish-brown drips on front)
    ctx.fillStyle = 'rgba(80,15,15,0.7)';
    for(let i=0; i<3; i++){
      const bx = o.x + 6 + i*(o.w/3.5);
      ctx.beginPath();
      ctx.moveTo(bx, o.y+o.h-2);
      ctx.quadraticCurveTo(bx+1.5, o.y+o.h, bx+0.5, o.y+o.h+2);
      ctx.quadraticCurveTo(bx-0.5, o.y+o.h+1, bx, o.y+o.h-2);
      ctx.closePath(); ctx.fill();
    }

    // 3. 5 metal spikes with multi-stop bevel gradient + specular
    const n = 5;
    for(let i=0; i<n; i++){
      const sx = o.x + (i+0.5)*(o.w/n);
      const h = o.h + (i%2 ? -2 : 3);
      // spike base shadow (on mount)
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.beginPath(); ctx.ellipse(sx, o.y+h-1, 5, 1.5, 0, 0, Math.PI*2); ctx.fill();
      // main spike body (steel gradient with rust streak)
      const spG = ctx.createLinearGradient(sx-7, o.y+h, sx+7, o.y+h);
      spG.addColorStop(0,    '#1a1a24');
      spG.addColorStop(0.2,  '#4a5058');
      spG.addColorStop(0.45, '#c8d0d8');
      spG.addColorStop(0.65, '#707880');
      spG.addColorStop(0.9,  '#2a2e34');
      spG.addColorStop(1,    '#0a0a10');
      ctx.fillStyle = spG;
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(sx-6, o.y+h);
      ctx.lineTo(sx-1, o.y-2);
      ctx.lineTo(sx+1, o.y-2);
      ctx.lineTo(sx+6, o.y+h);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // specular highlight (front-facing sharp edge)
      ctx.strokeStyle = 'rgba(255,255,255,0.85)';
      ctx.lineWidth = 1;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(sx-1.5, o.y+h*0.3);
      ctx.lineTo(sx-0.2, o.y);
      ctx.stroke();
      // secondary thinner catchlight
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(sx+2, o.y+h*0.5);
      ctx.lineTo(sx+0.5, o.y);
      ctx.stroke();
      // rust streak (darker orange running down from tip)
      ctx.strokeStyle = 'rgba(120,50,20,0.45)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(sx-2, o.y+h*0.25);
      ctx.quadraticCurveTo(sx-1, o.y+h*0.65, sx-2, o.y+h*0.9);
      ctx.stroke();
      // tip warning glow (additive red)
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const tipPulse = 0.6 + Math.sin(G.t*0.008 + i)*0.4;
      const tipG = ctx.createRadialGradient(sx, o.y-2, 0, sx, o.y-2, 4);
      tipG.addColorStop(0, `rgba(255,100,80,${tipPulse*0.7})`);
      tipG.addColorStop(1, 'rgba(255,60,40,0)');
      ctx.fillStyle = tipG;
      ctx.beginPath(); ctx.arc(sx, o.y-2, 4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // 4. Ambient subtle red danger halo (dimmer than before)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const dgPulse = 0.6 + Math.sin(G.t*0.01)*0.25;
    const gg = ctx.createRadialGradient(cx, cy, 4, cx, cy, o.w*0.75);
    gg.addColorStop(0, `rgba(255,80,60,${0.18*dgPulse})`);
    gg.addColorStop(1, 'rgba(200,40,20,0)');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(cx, cy, o.w*0.75, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.restore();
  }
}

// Clear visual indicators above enemies so player knows stomp vs dodge
function drawStompIndicator(cx, topY){
  const bob = Math.sin(G.t*0.008) * 3;
  const y = topY - 24 + bob;
  // soft green glow
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const gl = ctx.createRadialGradient(cx, y, 2, cx, y, 16);
  gl.addColorStop(0, 'rgba(80,255,120,0.65)');
  gl.addColorStop(1, 'rgba(80,255,120,0)');
  ctx.fillStyle = gl;
  ctx.beginPath(); ctx.arc(cx, y, 16, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // down-arrow / "stomp here" triangle
  ctx.fillStyle = '#5fee80';
  ctx.strokeStyle = '#126028';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx-8, y-6);
  ctx.lineTo(cx+8, y-6);
  ctx.lineTo(cx, y+7);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // small boot/foot print on top
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(cx-1.5, y-4, 3, 5);
  ctx.fillRect(cx-3, y-1, 6, 2);
}
function drawDangerIndicator(cx, topY){
  const pulse = 0.7 + Math.sin(G.t*0.018) * 0.3;
  const y = topY - 24 + Math.sin(G.t*0.012)*1.5;
  // red menacing glow
  ctx.save();
  ctx.globalAlpha = pulse;
  ctx.globalCompositeOperation='lighter';
  const gl = ctx.createRadialGradient(cx, y, 2, cx, y, 18);
  gl.addColorStop(0, 'rgba(255,40,40,0.85)');
  gl.addColorStop(1, 'rgba(255,40,40,0)');
  ctx.fillStyle = gl;
  ctx.beginPath(); ctx.arc(cx, y, 18, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // warning triangle with exclamation
  ctx.fillStyle = '#ff3030';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx, y-8);
  ctx.lineTo(cx+8, y+6);
  ctx.lineTo(cx-8, y+6);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // exclamation !
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx-1.2, y-3, 2.4, 5);
  ctx.beginPath(); ctx.arc(cx, y+4, 1.3, 0, Math.PI*2); ctx.fill();
}
function drawFlame(x,y,w,h,phase){
  ctx.save();
  const flick = Math.sin(phase)*2;
  const g = ctx.createLinearGradient(x, y+h, x, y-h);
  g.addColorStop(0, C.fire); g.addColorStop(0.6, C.fireHi); g.addColorStop(1, '#fff8c0');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.moveTo(x-w, y+h);
  ctx.bezierCurveTo(x-w-flick, y, x-w*0.3, y-h*0.6, x, y-h);
  ctx.bezierCurveTo(x+w*0.3, y-h*0.6, x+w+flick, y, x+w, y+h);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

// ============================================================================
//  DRAW — COLLECTIBLES
// ============================================================================
// Per-collectible color palette for halo + orbit particles
function getCollectibleColor(kind){
  switch(kind){
    case 'coin':         return {rgb:'255,213,74',  name:'gold'};
    case 'gem':          return {rgb:'255,77,184',  name:'magenta'};
    case 'water':        return {rgb:'77,208,255',  name:'cyan'};
    case 'ice':          return {rgb:'126,239,255', name:'ice'};
    case 'shield':       return {rgb:'180,230,255', name:'white'};
    case 'magnet':       return {rgb:'255,100,180', name:'pink'};
    case 'rocket':       return {rgb:'255,100,60',  name:'flame'};
    case 'dbl':          return {rgb:'255,230,100', name:'yellow'};
    case 'slowmo':       return {rgb:'128,216,255', name:'sky'};
    case 'smash':        return {rgb:'255,140,60',  name:'orange'};
    case 'supersparkle': return {rgb:'255,200,255', name:'rainbow'};
    default:             return {rgb:'255,255,255', name:'white'};
  }
}

function drawCollectible(c){
  ctx.save();
  ctx.translate(c.x, c.y);
  const pulse = 1 + Math.sin(G.t*0.008+c.t)*0.06;
  ctx.scale(pulse, pulse);

  const palette = getCollectibleColor(c.kind);
  const baseRGB = palette.rgb;

  // 1. Outer pulsing halo — colored to match collectible (−30% intensity)
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const haloPulse = 0.7 + Math.sin(G.t*0.006 + c.t)*0.3;
  const g = ctx.createRadialGradient(0,0,2,0,0,c.r*2);
  g.addColorStop(0, `rgba(${baseRGB},${0.35*haloPulse})`);   // was 0.5-0.65, −30%
  g.addColorStop(0.5, `rgba(${baseRGB},${0.18*haloPulse})`);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0,0,c.r*2,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // 2. Magnetic orbit — 4 tiny particles orbiting at different phases & radii
  //    Supersparkle gets rainbow multi-layer orbit, others get single-color
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const orbitSpeed = c.kind === 'supersparkle' ? 0.006 : 0.004;
  const orbitCount = c.kind === 'supersparkle' ? 8 : 4;
  for(let k=0; k<orbitCount; k++){
    const oa = (k/orbitCount)*Math.PI*2 + G.t*orbitSpeed + c.t*0.3;
    const orbR = c.r*1.35 + Math.sin(G.t*0.008 + k)*c.r*0.1;
    const ox = Math.cos(oa)*orbR;
    const oy = Math.sin(oa)*orbR*0.55; // elliptical orbit (flatter)
    const orbAlpha = 0.5 + Math.sin(G.t*0.01 + k)*0.3;
    // particle glow
    let orbColor;
    if(c.kind === 'supersparkle'){
      orbColor = `hsla(${(G.t*0.3 + k*45)%360},100%,75%,`;
    } else {
      orbColor = `rgba(${baseRGB},`;
    }
    const og = ctx.createRadialGradient(ox, oy, 0, ox, oy, 2.8);
    og.addColorStop(0, orbColor + orbAlpha + ')');
    og.addColorStop(1, orbColor + '0)');
    ctx.fillStyle = og;
    ctx.beginPath(); ctx.arc(ox, oy, 2.8, 0, Math.PI*2); ctx.fill();
    // particle core
    ctx.fillStyle = `rgba(255,255,255,${orbAlpha*0.85})`;
    ctx.beginPath(); ctx.arc(ox, oy, 0.8, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  if(c.kind==='coin'){
    // -------- 3D ROTATING METALLIC COIN (Apple-grade) --------
    // Rotation angle drives width compression for 3D face/edge effect
    const rotA = G.t*0.004 + c.t;
    const cosA = Math.cos(rotA);
    const absC = Math.abs(cosA);
    const widthScale = absC;      // 0 = edge view, 1 = full face
    const W2 = c.r * widthScale;  // horizontal radius

    // Edge thickness — visible when rotated sideways
    const edgeThickness = c.r * 0.18;

    // Back-face shadow (when coin flips, show dark underside briefly at edge)
    // Only render if we're past "edge" moment
    if(absC > 0.05){
      // === FRONT FACE ===
      // Face gradient — metallic gold with radial highlight
      const isHeads = cosA > 0;
      ctx.save();
      // Edge ring (dark rim around the coin face)
      const edgeG = ctx.createLinearGradient(0, -c.r, 0, c.r);
      edgeG.addColorStop(0, '#8a5c12');
      edgeG.addColorStop(0.5, '#ffea8a');
      edgeG.addColorStop(1, '#5a3a08');
      ctx.fillStyle = edgeG;
      ctx.beginPath(); ctx.ellipse(0, 0, W2+1.2, c.r+1.2, 0, 0, Math.PI*2); ctx.fill();
      // Face metallic gradient (warm gold with subtle sheen band)
      const faceG = ctx.createRadialGradient(-W2*0.35, -c.r*0.4, c.r*0.1, 0, 0, c.r);
      faceG.addColorStop(0,    '#fff4b0');
      faceG.addColorStop(0.25, '#ffe060');
      faceG.addColorStop(0.55, '#ffc030');
      faceG.addColorStop(0.85, '#c8821a');
      faceG.addColorStop(1,    '#6a4408');
      ctx.fillStyle = faceG;
      ctx.beginPath(); ctx.ellipse(0, 0, W2, c.r, 0, 0, Math.PI*2); ctx.fill();

      // Rotating sheen band (vertical streak moving across face)
      ctx.save();
      ctx.beginPath(); ctx.ellipse(0, 0, W2, c.r, 0, 0, Math.PI*2); ctx.clip();
      ctx.globalCompositeOperation='lighter';
      const sheenX = Math.sin(G.t*0.004 + c.t*0.5) * W2 * 0.8;
      const sheenG = ctx.createLinearGradient(sheenX-W2*0.35, 0, sheenX+W2*0.35, 0);
      sheenG.addColorStop(0, 'rgba(255,255,255,0)');
      sheenG.addColorStop(0.5, 'rgba(255,255,255,0.35)');
      sheenG.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = sheenG;
      ctx.fillRect(-W2, -c.r, W2*2, c.r*2);
      ctx.restore();

      // Face symbol — star on heads, "$" on tails (conceptual A/B sides)
      ctx.save();
      ctx.translate(0, 0);
      ctx.scale(widthScale, 1);
      if(isHeads){
        // 5-point star
        ctx.fillStyle = '#8a5a10';
        ctx.beginPath();
        for(let i=0;i<10;i++){
          const a = (i/10)*Math.PI*2 - Math.PI/2;
          const rr = i%2===0 ? c.r*0.48 : c.r*0.22;
          const px = Math.cos(a)*rr, py = Math.sin(a)*rr;
          if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.closePath(); ctx.fill();
        // inner shine
        ctx.fillStyle = '#fff3a0';
        ctx.beginPath();
        for(let i=0;i<10;i++){
          const a = (i/10)*Math.PI*2 - Math.PI/2;
          const rr = i%2===0 ? c.r*0.3 : c.r*0.14;
          const px = Math.cos(a)*rr, py = Math.sin(a)*rr;
          if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
        }
        ctx.closePath(); ctx.fill();
      } else {
        // ✦ burst (tails side)
        ctx.strokeStyle = '#8a5a10'; ctx.lineWidth = 2.2; ctx.lineCap='round';
        for(let i=0;i<4;i++){
          const a = (i/4)*Math.PI*2 + Math.PI/4;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a)*c.r*0.15, Math.sin(a)*c.r*0.15);
          ctx.lineTo(Math.cos(a)*c.r*0.48, Math.sin(a)*c.r*0.48);
          ctx.stroke();
        }
        ctx.fillStyle = '#fff3a0';
        ctx.beginPath(); ctx.arc(0,0, c.r*0.16, 0, Math.PI*2); ctx.fill();
      }
      ctx.restore();

      // Top-left specular highlight on face
      ctx.save();
      ctx.beginPath(); ctx.ellipse(0, 0, W2, c.r, 0, 0, Math.PI*2); ctx.clip();
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.beginPath(); ctx.ellipse(-W2*0.38, -c.r*0.42, W2*0.22, c.r*0.18, -0.4, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // Face outline
      ctx.strokeStyle = 'rgba(80,45,6,0.85)';
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.ellipse(0, 0, W2, c.r, 0, 0, Math.PI*2); ctx.stroke();
      ctx.restore();
    } else {
      // === PURE EDGE VIEW (coin is perpendicular — shows thin slice) ===
      const edgeG = ctx.createLinearGradient(-edgeThickness, 0, edgeThickness, 0);
      edgeG.addColorStop(0, '#5a3a08');
      edgeG.addColorStop(0.5, '#ffd060');
      edgeG.addColorStop(1, '#5a3a08');
      ctx.fillStyle = edgeG;
      roundRect(-edgeThickness, -c.r, edgeThickness*2, c.r*2, edgeThickness); ctx.fill();
      ctx.strokeStyle = '#3a2406'; ctx.lineWidth = 1;
      roundRect(-edgeThickness, -c.r, edgeThickness*2, c.r*2, edgeThickness); ctx.stroke();
    }

    // Global soft outer glow (yellow/gold — additive)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const gg = ctx.createRadialGradient(0, 0, c.r*0.8, 0, 0, c.r*1.7);
    gg.addColorStop(0, 'rgba(255,220,120,0.35)');
    gg.addColorStop(1, 'rgba(255,180,40,0)');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(0, 0, c.r*1.7, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  else if(c.kind==='gem'){
    // -------- FACETED 3D DIAMOND with 4 triangular facets + sparkle --------
    // Slight side-to-side wobble (living gem)
    ctx.rotate(Math.sin(G.t*0.003 + c.t)*0.08);
    // 1. Back shadow (depth under gem)
    ctx.save();
    ctx.fillStyle = 'rgba(30,0,20,0.4)';
    ctx.beginPath();
    ctx.moveTo(0,-c.r); ctx.lineTo(c.r,0); ctx.lineTo(0,c.r); ctx.lineTo(-c.r,0);

    ctx.restore();

    // Top-right facet (brightest)
    const fg1 = ctx.createLinearGradient(0,-c.r, c.r,0);
    fg1.addColorStop(0, '#ffe4f4'); fg1.addColorStop(0.5, '#ff6ec4'); fg1.addColorStop(1, '#c21580');
    ctx.fillStyle = fg1;
    ctx.beginPath();
    ctx.moveTo(0,-c.r); ctx.lineTo(c.r,0); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
    // Top-left facet (bright)
    const fg2 = ctx.createLinearGradient(0,-c.r, -c.r,0);
    fg2.addColorStop(0, '#ffd0e8'); fg2.addColorStop(0.5, '#ff4db8'); fg2.addColorStop(1, '#8a0c5a');
    ctx.fillStyle = fg2;
    ctx.beginPath();
    ctx.moveTo(0,-c.r); ctx.lineTo(-c.r,0); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
    // Bottom-right facet (medium-dark)
    const fg3 = ctx.createLinearGradient(c.r,0, 0,c.r);
    fg3.addColorStop(0, '#c21580'); fg3.addColorStop(0.6, '#7a0c4a'); fg3.addColorStop(1, '#3a0420');
    ctx.fillStyle = fg3;
    ctx.beginPath();
    ctx.moveTo(c.r,0); ctx.lineTo(0,c.r); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
    // Bottom-left facet (darkest — shadow side)
    const fg4 = ctx.createLinearGradient(-c.r,0, 0,c.r);

    ctx.beginPath();
    ctx.moveTo(-c.r,0); ctx.lineTo(0,c.r); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();

    // 3. Top crown white highlight (primary glossy edge)
    ctx.save();
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(0,-c.r);
    ctx.lineTo(c.r*0.42, -c.r*0.35);
    ctx.lineTo(0, -c.r*0.18);
    ctx.lineTo(-c.r*0.42, -c.r*0.35);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    // secondary sub-highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.moveTo(c.r*0.18, -c.r*0.55);
    ctx.lineTo(c.r*0.3, -c.r*0.38);
    ctx.lineTo(c.r*0.08, -c.r*0.4);
    ctx.closePath(); ctx.fill();

    // 4. Facet separator lines (glossy cross)
    ctx.strokeStyle = 'rgba(255,220,240,0.85)'; ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(c.r,0); ctx.lineTo(-c.r,0);
    ctx.moveTo(0,-c.r); ctx.lineTo(0,c.r);
    ctx.stroke();
    // Diamond outline (bright pink-white ring)
    ctx.strokeStyle = '#ffb8e0'; ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(0,-c.r); ctx.lineTo(c.r,0); ctx.lineTo(0,c.r); ctx.lineTo(-c.r,0);
    ctx.closePath(); ctx.stroke();

    // 5. Animated sparkle traversing the upper facets (cross pattern)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const sph = (G.t*0.006+c.t)%6.28;
    const spX = Math.cos(sph)*c.r*0.4;
    const spY = -Math.abs(Math.sin(sph))*c.r*0.45 - c.r*0.12;
    // 4-ray star
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 1.2; ctx.lineCap='round';
    for(let k=0; k<4; k++){
      const sa = k*Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(spX - Math.cos(sa)*3.5, spY - Math.sin(sa)*3.5);
      ctx.lineTo(spX + Math.cos(sa)*3.5, spY + Math.sin(sa)*3.5);
      ctx.stroke();
    }
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(spX, spY, 1.6, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  else if(c.kind==='water'){
    // -------- 3D WATER DROP with liquid shimmer + ripples --------
    // 1. Pulsing ripple rings behind drop (2 rings)
    ctx.save();
    for(let r=0; r<2; r++){
      const ripplePhase = (G.t*0.004 + c.t*0.5 + r*0.5)%1;
      ctx.globalAlpha = (1-ripplePhase)*0.45;
      ctx.strokeStyle = C.waterHi;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(0, 0, c.r + ripplePhase*c.r*0.9, 0, Math.PI*2); ctx.stroke();
    }
    ctx.restore();
    // 2. Drop body with rich 5-stop gradient (depth)
    const g = ctx.createRadialGradient(-c.r*0.3, -c.r*0.35, 1, 0, c.r*0.1, c.r*1.15);
    g.addColorStop(0,    '#ffffff');
    g.addColorStop(0.15, '#eaf9ff');
    g.addColorStop(0.45, '#9fe4ff');
    g.addColorStop(0.78, '#3aa8e8');
    g.addColorStop(1,    '#0a5090');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0,-c.r);
    ctx.bezierCurveTo(c.r,0, c.r*0.7,c.r, 0,c.r);
    ctx.bezierCurveTo(-c.r*0.7,c.r, -c.r,0, 0,-c.r);
    ctx.fill();
    // 3. Rim light on bottom-right (refraction)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const rimG = ctx.createRadialGradient(c.r*0.4, c.r*0.35, c.r*0.35, 0, 0, c.r*1.05);
    rimG.addColorStop(0, 'rgba(180,240,255,0)');
    rimG.addColorStop(0.9, 'rgba(180,240,255,0)');
    rimG.addColorStop(0.97, 'rgba(200,250,255,0.65)');
    rimG.addColorStop(1, 'rgba(180,240,255,0)');
    ctx.fillStyle = rimG;
    ctx.beginPath();
    ctx.moveTo(0,-c.r);
    ctx.bezierCurveTo(c.r,0, c.r*0.7,c.r, 0,c.r);
    ctx.bezierCurveTo(-c.r*0.7,c.r, -c.r,0, 0,-c.r);
    ctx.fill();
    ctx.restore();
    // 4. Inner wave line animated (liquid surface)
    ctx.save();
    const wavePhase = G.t*0.005 + c.t;
    ctx.strokeStyle = 'rgba(255,255,255,0.65)';
    ctx.lineWidth = 1.6;
    ctx.beginPath();
    for(let i=-c.r*0.7; i<=c.r*0.7; i+=3){
      const y = Math.sin(i*0.18 + wavePhase)*2.5;
      if(i===-c.r*0.7) ctx.moveTo(i, y);
      else ctx.lineTo(i, y);
    }
    ctx.stroke();
    // secondary darker wave line
    ctx.strokeStyle = 'rgba(30,100,160,0.4)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    for(let i=-c.r*0.7; i<=c.r*0.7; i+=3){
      const y = Math.sin(i*0.18 + wavePhase)*2.5 + 3;
      if(i===-c.r*0.7) ctx.moveTo(i, y);
      else ctx.lineTo(i, y);
    }
    ctx.stroke();
    ctx.restore();
    // 5. Primary specular (glossy top-left shine — teardrop shape)
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.beginPath(); ctx.ellipse(-c.r*0.32, -c.r*0.28, 2.8, 7, -0.35, 0, Math.PI*2); ctx.fill();
    // secondary catchlight mid
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.ellipse(-c.r*0.18, -c.r*0.58, 1.4, 2.2, -0.3, 0, Math.PI*2); ctx.fill();
    // tiny shine bottom
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath(); ctx.arc(c.r*0.25, c.r*0.45, 1.5, 0, Math.PI*2); ctx.fill();
    // 6. Outline (subtle cyan edge)
    ctx.strokeStyle = 'rgba(200,240,255,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0,-c.r);
    ctx.bezierCurveTo(c.r,0, c.r*0.7,c.r, 0,c.r);
    ctx.bezierCurveTo(-c.r*0.7,c.r, -c.r,0, 0,-c.r);
    ctx.stroke();
  }
  else if(c.kind==='ice'){
    // -------- 3D ICE CUBE with frost crystal inside + cold aura --------
    ctx.save();
    ctx.rotate(Math.sin(G.t*0.008+c.t)*0.12);
    const s = c.r;
    // 1. Cold aura (cyan frost breath)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const ap = 0.6 + Math.sin(G.t*0.01)*0.3;
    const ag = ctx.createRadialGradient(0, 0, s*0.6, 0, 0, s*1.6);

    ag.addColorStop(1, 'rgba(180,250,255,0)');
    ctx.fillStyle = ag;
    ctx.beginPath(); ctx.arc(0, 0, s*1.6, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // 2. Back/bottom shadow face (3D cube depth — right+bottom edges)
    ctx.fillStyle = '#1a5a7a';
    ctx.beginPath();
    ctx.moveTo(s, -s+3); ctx.lineTo(s+3, -s+6); ctx.lineTo(s+3, s+3);
    ctx.lineTo(s, s); ctx.closePath(); ctx.fill();
    ctx.beginPath();

    ctx.stroke();

    for(let k=0; k<2; k++){

      ctx.moveTo(spX - Math.cos(sa)*2.5, spY - Math.sin(sa)*2.5);

    ctx.restore();
    ctx.restore();
  }
  else if(c.kind==='shield'){
