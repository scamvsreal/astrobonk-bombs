    const arG = ctx.createLinearGradient(0, -c.r*0.55, 0, c.r*0.55);
    arG.addColorStop(0, '#ffffff');
    arG.addColorStop(0.7, '#ffeab0');
    arG.addColorStop(1, '#d8a240');
    ctx.fillStyle = arG;
    ctx.strokeStyle = '#5a1008';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    ctx.moveTo(-c.r*0.45, -c.r*0.15);
    ctx.lineTo(-c.r*0.15, -c.r*0.15);
    ctx.lineTo(-c.r*0.15, -c.r*0.55);
    ctx.lineTo(c.r*0.15, -c.r*0.55);
    ctx.lineTo(c.r*0.15, -c.r*0.15);
    ctx.lineTo(c.r*0.45, -c.r*0.15);
    ctx.lineTo(0, c.r*0.55);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // 7. Impact sparks at bottom (pulsing)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle = 'rgba(255,220,100,0.9)'; ctx.lineWidth = 1.6; ctx.lineCap='round';
    for(const s of [[-1,-0.25], [1,0.25]]){
      ctx.beginPath();
      ctx.moveTo(s[0]*c.r*0.6, c.r*0.85 + s[1]*2);
      ctx.lineTo(s[0]*c.r*0.35, c.r*0.55 + s[1]*2);
      ctx.stroke();
    }
    ctx.restore();
  }
  else if(c.kind==='supersparkle'){
    // -------- GIANT RAINBOW SUPER-SPARKLE — W1 welcome gift (legendary tier) --------
    const hue = (G.t*0.15)%360;
    const pulse = 1 + Math.sin(G.t*0.015)*0.10;
    const sparkSize = c.r*0.45 + Math.sin(G.t*0.03)*c.r*0.12;
    ctx.scale(pulse, pulse);
    // 1. Giant 3-layer rainbow halo
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    for(let layer=0; layer<3; layer++){
      const hh = (hue + layer*120)%360;
      const hg = ctx.createRadialGradient(0,0,0, 0,0, c.r*(1.8+layer*0.4));
      hg.addColorStop(0, `hsla(${hh},100%,70%,${0.5-layer*0.15})`);  // reduced 30% overall
      hg.addColorStop(1, `hsla(${hh},100%,70%,0)`);
      ctx.fillStyle = hg;
      ctx.beginPath(); ctx.arc(0,0, c.r*(1.8+layer*0.4), 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
    // 2. 12 long rays with gradient (each ray color-shifted)
    ctx.save();
    ctx.lineCap='round';
    const rays = 12;
    for(let i=0;i<rays;i++){
      const a = (i/rays)*Math.PI*2 + G.t*0.006;
      const outer = sparkSize + (i%2 ? c.r*0.45 : c.r*0.2);
      const rayHue = (hue + i*30) % 360;
      // ray gradient (bright at tip, fades at root)
      const rgd = ctx.createLinearGradient(
        Math.cos(a)*c.r*0.2, Math.sin(a)*c.r*0.2,
        Math.cos(a)*(outer+c.r*0.5), Math.sin(a)*(outer+c.r*0.5)
      );
      rgd.addColorStop(0, `hsla(${rayHue},100%,85%,0.95)`);
      rgd.addColorStop(1, `hsla(${rayHue},100%,70%,0.3)`);
      ctx.strokeStyle = rgd;
      ctx.lineWidth = i%2===0 ? 3.5 : 2;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*c.r*0.2, Math.sin(a)*c.r*0.2);
      ctx.lineTo(Math.cos(a)*(outer+c.r*0.5), Math.sin(a)*(outer+c.r*0.5));
      ctx.stroke();
    }
    ctx.restore();
    // 3. 3D gem-like core (5-stop rainbow gradient with depth)
    ctx.save();
    // outer rainbow disc
    const cg = ctx.createRadialGradient(-c.r*0.15, -c.r*0.15, 0, 0, 0, c.r*0.55);
    cg.addColorStop(0, '#ffffff');
    cg.addColorStop(0.25, `hsl(${(hue+60)%360},100%,85%)`);
    cg.addColorStop(0.55, `hsl(${hue},100%,70%)`);
    cg.addColorStop(0.85, `hsl(${(hue-30+360)%360},85%,55%)`);
    cg.addColorStop(1, `hsl(${hue},100%,40%)`);
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(0, 0, c.r*0.48, 0, Math.PI*2); ctx.fill();
    // rim light
    ctx.globalCompositeOperation='lighter';
    const rim = ctx.createRadialGradient(c.r*0.3, c.r*0.3, c.r*0.3, 0, 0, c.r*0.5);
    rim.addColorStop(0, 'rgba(255,255,255,0)');
    rim.addColorStop(0.92, `hsla(${hue},100%,85%,0.6)`);
    rim.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = rim;
    ctx.beginPath(); ctx.arc(0, 0, c.r*0.48, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // 4. Specular top-left
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath(); ctx.ellipse(-c.r*0.18, -c.r*0.2, c.r*0.1, c.r*0.08, -0.4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // 5. White-hot inner star core
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const cor = ctx.createRadialGradient(0, 0, 0, 0, 0, c.r*0.22);
    cor.addColorStop(0, '#ffffff');
    cor.addColorStop(0.6, 'rgba(255,255,255,0.8)');
    cor.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = cor;
    ctx.beginPath(); ctx.arc(0, 0, c.r*0.22, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // 6. Floating "GIFT!" label above with pulsing glow
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline='middle';
    ctx.font = '900 12px Chakra Petch';
    const lbl = '🎁 GIFT';
    const lblY = -c.r-14 + Math.sin(G.t*0.008)*2;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillText(lbl, 0.5, lblY+1);
    // rainbow fill
    ctx.fillStyle = `hsl(${hue},100%,75%)`;
    ctx.globalAlpha = 0.85 + Math.sin(G.t*0.01)*0.15;
    ctx.fillText(lbl, 0, lblY);
    ctx.restore();
  }
  else if(c.kind==='slowmo'){
    // -------- 3D SLOWMO CRYSTAL — pentagonal ice crystal with inset clock --------
    ctx.rotate(Math.sin(G.t*0.003+c.t)*0.12);
    const s = c.r;
    // 1. Outer glow halo (time dilation feel)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const timeAura = ctx.createRadialGradient(0, 0, s*0.5, 0, 0, s*1.3);
    timeAura.addColorStop(0, 'rgba(140,220,255,0.35)');
    timeAura.addColorStop(1, 'rgba(140,220,255,0)');
    ctx.fillStyle = timeAura;
    ctx.beginPath(); ctx.arc(0, 0, s*1.3, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // 2. Crystal body with 5-stop ice gradient
    const g = ctx.createLinearGradient(-s*0.3, -s, s*0.3, s);
    g.addColorStop(0,    '#ffffff');
    g.addColorStop(0.25, '#d0f4ff');
    g.addColorStop(0.55, '#7acce8');
    g.addColorStop(0.85, '#2070b0');
    g.addColorStop(1,    '#0a2040');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(0,-s);
    ctx.lineTo(s*0.72, -s*0.2);
    ctx.lineTo(s*0.5, s);
    ctx.lineTo(-s*0.5, s);
    ctx.lineTo(-s*0.72, -s*0.2);
    ctx.closePath(); ctx.fill();
    // 3. Outline
    ctx.strokeStyle = '#042044'; ctx.lineWidth = 1.2;
    ctx.stroke();
    // 4. Facet separator lines (glossy cross pattern)
    ctx.strokeStyle = 'rgba(255,255,255,0.75)'; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(0,-s); ctx.lineTo(0,s);
    ctx.moveTo(-s*0.72,-s*0.2); ctx.lineTo(s*0.72,-s*0.2);
    ctx.stroke();
    // 5. Crown highlight (top triangle bright)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.beginPath();
    ctx.moveTo(0,-s);
    ctx.lineTo(s*0.32, -s*0.35);
    ctx.lineTo(0, -s*0.2);
    ctx.lineTo(-s*0.32, -s*0.35);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    // 6. Secondary small catchlight near tip
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    ctx.beginPath(); ctx.arc(0, -s*0.82, 1.3, 0, Math.PI*2); ctx.fill();
    // 7. Inset 3D clock (bottom center, embossed)
    // clock shadow
    ctx.fillStyle = 'rgba(0,20,40,0.7)';
    ctx.beginPath(); ctx.arc(0.7, s*0.28+0.7, 6.2, 0, Math.PI*2); ctx.fill();
    // clock body (dark navy)
    const clG = ctx.createRadialGradient(-1.5, s*0.22, 0, 0, s*0.28, 6);
    clG.addColorStop(0, '#2a5888');
    clG.addColorStop(0.6, '#0a3050');
    clG.addColorStop(1, '#020a20');
    ctx.fillStyle = clG;
    ctx.beginPath(); ctx.arc(0, s*0.28, 6, 0, Math.PI*2); ctx.fill();
    // clock rim highlight
    ctx.strokeStyle = 'rgba(180,240,255,0.85)'; ctx.lineWidth = 0.9;
    ctx.beginPath(); ctx.arc(0, s*0.28, 6, 0, Math.PI*2); ctx.stroke();
    // clock hands (12 + 2 position, slowly ticking)
    ctx.strokeStyle = '#e0f4ff'; ctx.lineWidth = 1.3; ctx.lineCap='round';
    const tickPhase = G.t*0.001;
    // hour hand
    ctx.beginPath();
    ctx.moveTo(0, s*0.28);
    ctx.lineTo(Math.cos(tickPhase*0.3 - Math.PI/2)*3, s*0.28 + Math.sin(tickPhase*0.3 - Math.PI/2)*3);
    ctx.stroke();
    // minute hand
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, s*0.28);
    ctx.lineTo(Math.cos(tickPhase*1.2 - Math.PI/2)*4.5, s*0.28 + Math.sin(tickPhase*1.2 - Math.PI/2)*4.5);
    ctx.stroke();
    // center dot
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(0, s*0.28, 0.8, 0, Math.PI*2); ctx.fill();
    // 12/3/6/9 tick marks
    ctx.strokeStyle = 'rgba(200,240,255,0.8)'; ctx.lineWidth = 0.6;
    for(let k=0; k<4; k++){
      const ta = k*Math.PI/2 - Math.PI/2;
      ctx.beginPath();
      ctx.moveTo(0 + Math.cos(ta)*5, s*0.28 + Math.sin(ta)*5);
      ctx.lineTo(0 + Math.cos(ta)*5.8, s*0.28 + Math.sin(ta)*5.8);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ============================================================================
//  DRAW — WORLD
// ============================================================================
// ============================================================================
//  MID-DEPTH PARALLAX — world-unique background silhouettes + structures
// ============================================================================
function drawWorldParallax(){
  const wIdx = (G.state==='play' || G.state==='gameover') ? (G.world||1) : 1;
  const ox = (G.distance*0.22) % W;  // medium parallax speed
  ctx.save();

  // W1 — COSMIC — distant nebulae planets of various sizes
  if(wIdx===1){
    for(let i=-1; i<=1; i++){
      const xo = i*W - ox;
      // big planet silhouettes with glow
      for(const p of [{x:W*0.2, y:H*0.48, r:38, c:'#3a1870'}, {x:W*0.55, y:H*0.40, r:26, c:'#6a2aa0'}, {x:W*0.85, y:H*0.50, r:32, c:'#2a1260'}]){
        const px = xo + p.x;
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const gl = ctx.createRadialGradient(px, p.y, p.r*0.5, px, p.y, p.r*1.8);
        gl.addColorStop(0, 'rgba(255,140,220,0.25)');
        gl.addColorStop(1, 'rgba(180,80,220,0)');
        ctx.fillStyle = gl;
        ctx.beginPath(); ctx.arc(px, p.y, p.r*1.8, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        // planet silhouette
        const pg = ctx.createRadialGradient(px-p.r*0.3, p.y-p.r*0.3, 2, px, p.y, p.r);
        pg.addColorStop(0, p.c);
        pg.addColorStop(1, 'rgba(10,5,20,0.9)');
        ctx.fillStyle = pg;
        ctx.beginPath(); ctx.arc(px, p.y, p.r, 0, Math.PI*2); ctx.fill();
      }
    }
  }
  // W2 — ICE SPIRES (jagged crystalline peaks)
  else if(wIdx===2){
    const spireCol1 = 'rgba(140,200,240,0.75)';
    const spireCol2 = 'rgba(80,140,200,0.85)';
    for(let i=-1; i<=1; i++){
      const xo = i*W - ox;
      const spires = [
        {x:30, h:180, w:60}, {x:110, h:230, w:70}, {x:210, h:200, w:55},
        {x:290, h:260, w:80}, {x:380, h:190, w:50}, {x:460, h:220, w:65},
      ];
      for(const s of spires){
        const sx = xo + s.x;
        const sg = ctx.createLinearGradient(sx, H*0.55 - s.h, sx, H*0.55);
        sg.addColorStop(0, spireCol1);
        sg.addColorStop(0.7, spireCol2);
        sg.addColorStop(1, 'rgba(30,60,100,0.95)');
        ctx.fillStyle = sg;
        ctx.beginPath();
        ctx.moveTo(sx, H*0.55);
        ctx.lineTo(sx + s.w*0.35, H*0.55 - s.h*0.7);
        ctx.lineTo(sx + s.w*0.5, H*0.55 - s.h);
        ctx.lineTo(sx + s.w*0.65, H*0.55 - s.h*0.6);
        ctx.lineTo(sx + s.w, H*0.55);
        ctx.closePath(); ctx.fill();
        // snow peak highlight
        ctx.fillStyle = 'rgba(240,250,255,0.7)';
        ctx.beginPath();
        ctx.moveTo(sx + s.w*0.4, H*0.55 - s.h*0.85);
        ctx.lineTo(sx + s.w*0.5, H*0.55 - s.h);
        ctx.lineTo(sx + s.w*0.6, H*0.55 - s.h*0.8);
        ctx.closePath(); ctx.fill();
      }
    }
  }
  // W3 — VOLCANIC PEAKS with glowing lava at base
  else if(wIdx===3){
    for(let i=-1; i<=1; i++){
      const xo = i*W - ox;
      const peaks = [
        {x:20, h:210, w:140}, {x:170, h:260, w:160}, {x:340, h:190, w:130}, {x:470, h:240, w:150},
      ];
      for(const p of peaks){
        const sx = xo + p.x;
        const pg = ctx.createLinearGradient(sx, H*0.55 - p.h, sx, H*0.55);
        pg.addColorStop(0, 'rgba(80,20,10,0.9)');
        pg.addColorStop(0.5, 'rgba(120,30,20,0.85)');
        pg.addColorStop(1, 'rgba(200,60,20,0.7)');
        ctx.fillStyle = pg;
        ctx.beginPath();
        ctx.moveTo(sx, H*0.55);
        ctx.lineTo(sx + p.w*0.3, H*0.55 - p.h*0.6);
        ctx.lineTo(sx + p.w*0.48, H*0.55 - p.h);
        ctx.lineTo(sx + p.w*0.62, H*0.55 - p.h*0.75);
        ctx.lineTo(sx + p.w, H*0.55);
        ctx.closePath(); ctx.fill();
        // lava glow at crater
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const lg = ctx.createRadialGradient(sx + p.w*0.48, H*0.55 - p.h, 0, sx + p.w*0.48, H*0.55 - p.h, 18);
        lg.addColorStop(0, 'rgba(255,200,80,0.9)');
        lg.addColorStop(1, 'rgba(255,100,20,0)');
        ctx.fillStyle = lg;
        ctx.beginPath(); ctx.arc(sx + p.w*0.48, H*0.55 - p.h, 18, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }
  }
  // W4 — GIANT MUSHROOM TREES
  else if(wIdx===4){
    for(let i=-1; i<=1; i++){
      const xo = i*W - ox;
      const shrooms = [
        {x:50, cap:44, stem:110}, {x:180, cap:60, stem:140}, {x:310, cap:50, stem:120}, {x:430, cap:70, stem:160},
      ];
      for(const s of shrooms){
        const sx = xo + s.x;
        const baseY = H*0.55;
        // stem
        ctx.fillStyle = 'rgba(220,220,190,0.85)';
        roundRect(sx-8, baseY - s.stem, 16, s.stem, 4); ctx.fill();
        // cap
        const cg = ctx.createRadialGradient(sx, baseY-s.stem, 5, sx, baseY-s.stem, s.cap);
        cg.addColorStop(0, 'rgba(180,255,100,0.95)');
        cg.addColorStop(0.7, 'rgba(100,180,50,0.95)');
        cg.addColorStop(1, 'rgba(40,90,20,0.95)');
        ctx.fillStyle = cg;
        ctx.beginPath(); ctx.arc(sx, baseY-s.stem, s.cap, Math.PI, Math.PI*2); ctx.fill();
        ctx.fillRect(sx-s.cap, baseY-s.stem, s.cap*2, 5);
        // yellow spore dots on cap
        ctx.fillStyle = 'rgba(255,240,120,0.85)';
        for(let k=-2; k<=2; k++){
          ctx.beginPath(); ctx.arc(sx + k*s.cap*0.35, baseY-s.stem-s.cap*0.4, 3, 0, Math.PI*2); ctx.fill();
        }
      }
    }
  }
  // W5 — VOID MONOLITHS (black obelisks with faint glow)
  else if(wIdx===5){
    for(let i=-1; i<=1; i++){
      const xo = i*W - ox;
      const obe = [{x:80,h:260,w:30},{x:220,h:200,w:24},{x:340,h:280,w:36},{x:470,h:220,w:28}];
      for(const o of obe){
        const sx = xo + o.x;
        ctx.fillStyle = 'rgba(10,8,18,0.95)';
        ctx.beginPath();
        ctx.moveTo(sx, H*0.55);
        ctx.lineTo(sx + o.w*0.3, H*0.55 - o.h*0.9);
        ctx.lineTo(sx + o.w*0.5, H*0.55 - o.h);
        ctx.lineTo(sx + o.w*0.7, H*0.55 - o.h*0.9);
        ctx.lineTo(sx + o.w, H*0.55);
        ctx.closePath(); ctx.fill();
        // faint rune glow
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        ctx.strokeStyle = `rgba(200,200,255,${0.3 + Math.sin(G.t*0.005+o.x)*0.2})`;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(sx + o.w*0.3, H*0.55 - o.h*0.5);
        ctx.lineTo(sx + o.w*0.7, H*0.55 - o.h*0.5);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(sx + o.w*0.5, H*0.55 - o.h*0.65, 4, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
    }
  }
  // W6 — SOLAR RUINS (broken stone arches with lava seam)
  else if(wIdx===6){
    for(let i=-1; i<=1; i++){
      const xo = i*W - ox;
      const arches = [{x:60, h:180, w:90}, {x:220, h:220, w:110}, {x:380, h:160, w:80}];
      for(const a of arches){
        const sx = xo + a.x;
        ctx.fillStyle = 'rgba(120,60,20,0.9)';
        // left pillar
        ctx.fillRect(sx, H*0.55-a.h, a.w*0.18, a.h);
        // right pillar
        ctx.fillRect(sx+a.w*0.82, H*0.55-a.h, a.w*0.18, a.h);
        // top arch (broken)
        ctx.beginPath();
        ctx.moveTo(sx, H*0.55-a.h);
        ctx.quadraticCurveTo(sx+a.w/2, H*0.55-a.h-20, sx+a.w, H*0.55-a.h);
        ctx.lineTo(sx+a.w, H*0.55-a.h+12);
        ctx.quadraticCurveTo(sx+a.w/2, H*0.55-a.h-8, sx, H*0.55-a.h+12);
        ctx.closePath(); ctx.fill();
        // lava seam in middle
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        ctx.strokeStyle = 'rgba(255,180,50,0.7)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(sx+a.w*0.1, H*0.55-a.h*0.4);
        ctx.lineTo(sx+a.w*0.25, H*0.55-a.h*0.2);
        ctx.stroke();
        ctx.restore();
      }
    }
  }
  // W7 — CYBER TOWERS with LED arrays
  else if(wIdx===7){
    for(let i=-1; i<=1; i++){
      const xo = i*W - ox;
      const towers = [
        {x:30, h:280, w:50}, {x:110, h:350, w:40}, {x:180, h:260, w:60},
        {x:280, h:380, w:45}, {x:360, h:300, w:52}, {x:440, h:340, w:58},
      ];
      for(const t of towers){
        const sx = xo + t.x;
        // tower body (dark cyber)
        const tg = ctx.createLinearGradient(sx, H*0.55-t.h, sx+t.w, H*0.55-t.h);
        tg.addColorStop(0, 'rgba(15,10,40,0.95)');
        tg.addColorStop(0.5, 'rgba(40,20,80,0.95)');
        tg.addColorStop(1, 'rgba(10,8,30,0.95)');
        ctx.fillStyle = tg;
        ctx.fillRect(sx, H*0.55-t.h, t.w, t.h);
        // antenna spike on top
        ctx.fillStyle = 'rgba(15,10,40,0.95)';
        ctx.beginPath();
        ctx.moveTo(sx+t.w*0.45, H*0.55-t.h);
        ctx.lineTo(sx+t.w*0.5, H*0.55-t.h-16);
        ctx.lineTo(sx+t.w*0.55, H*0.55-t.h);
        ctx.closePath(); ctx.fill();
        // antenna LED
        const antBlink = Math.sin(G.t*0.015 + sx) > 0;
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        if(antBlink){
          const ag = ctx.createRadialGradient(sx+t.w*0.5, H*0.55-t.h-16, 0, sx+t.w*0.5, H*0.55-t.h-16, 6);
          ag.addColorStop(0, 'rgba(255,40,220,0.9)');
          ag.addColorStop(1, 'rgba(255,40,220,0)');
          ctx.fillStyle = ag;
          ctx.beginPath(); ctx.arc(sx+t.w*0.5, H*0.55-t.h-16, 6, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
        // window LEDs (grid)
        const rows = Math.floor(t.h / 18);
        const cols = Math.max(2, Math.floor(t.w / 10));
        for(let r=0; r<rows; r++){
          for(let c=0; c<cols; c++){
            const lit = ((r*7 + c*3 + Math.floor(G.t*0.002))%7) < 3;
            const lx = sx + 4 + c*((t.w-8)/Math.max(1,cols-1));
            const ly = H*0.55-t.h + 10 + r*16;
            if(lit){
              ctx.fillStyle = (r+c)%2===0 ? 'rgba(100,230,255,0.9)' : 'rgba(255,80,200,0.85)';
              ctx.fillRect(lx-1.5, ly-1, 3, 2);
              ctx.save();
              ctx.globalCompositeOperation='lighter';
              ctx.fillStyle = (r+c)%2===0 ? 'rgba(100,230,255,0.35)' : 'rgba(255,80,200,0.3)';
              ctx.fillRect(lx-3, ly-2, 6, 4);
              ctx.restore();
            }
          }
        }
      }
    }
  }
  // W8 — KELP FOREST / CORAL SILHOUETTES
  else if(wIdx===8){
    for(let i=-1; i<=1; i++){
      const xo = i*W - ox;
      for(let k=0; k<6; k++){
        const sx = xo + 20 + k*90;
        ctx.strokeStyle = 'rgba(30,100,110,0.7)';
        ctx.lineWidth = 6;
        ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(sx, H*0.55);
        const sway = Math.sin(G.t*0.003 + k)*12;
        ctx.quadraticCurveTo(sx+sway*0.5, H*0.55-90, sx+sway, H*0.55-180);
        ctx.stroke();
        // coral branch
        ctx.strokeStyle = 'rgba(60,140,140,0.6)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(sx+sway*0.5, H*0.55-90);
        ctx.lineTo(sx+sway*0.5+12, H*0.55-105);
        ctx.stroke();
      }
    }
  }
  // W9 — RUBY CRYSTAL CLUSTERS
  else if(wIdx===9){
    for(let i=-1; i<=1; i++){
      const xo = i*W - ox;
      const clusters = [{x:60,h:180,w:60},{x:200,h:240,w:80},{x:350,h:200,w:70},{x:460,h:220,w:75}];
      for(const c of clusters){
        const sx = xo + c.x;
        for(let k=0; k<4; k++){
          const kx = sx + k*c.w*0.22;
          const kh = c.h * (0.6 + (k%2)*0.35);
          const cg = ctx.createLinearGradient(kx, H*0.55-kh, kx, H*0.55);
          cg.addColorStop(0, 'rgba(255,100,140,0.85)');
          cg.addColorStop(0.6, 'rgba(180,30,70,0.9)');
          cg.addColorStop(1, 'rgba(60,10,20,0.95)');
          ctx.fillStyle = cg;
          ctx.beginPath();
          ctx.moveTo(kx-8, H*0.55);
          ctx.lineTo(kx, H*0.55-kh);
          ctx.lineTo(kx+8, H*0.55);
          ctx.closePath(); ctx.fill();
          // highlight edge
          ctx.strokeStyle = 'rgba(255,180,200,0.6)';
          ctx.lineWidth = 0.8;
          ctx.beginPath();
          ctx.moveTo(kx-6, H*0.55-4);
          ctx.lineTo(kx-1, H*0.55-kh+4);
          ctx.stroke();
        }
      }
    }
  }
  // W10 — GOLDEN PALACE PEAKS (ornate silhouettes)
  else if(wIdx===10){
    for(let i=-1; i<=1; i++){
      const xo = i*W - ox;
      const palaces = [{x:30,h:220,w:120},{x:180,h:280,w:150},{x:360,h:240,w:130}];
      for(const p of palaces){
        const sx = xo + p.x;
        ctx.fillStyle = 'rgba(80,50,10,0.92)';
        ctx.fillRect(sx, H*0.55-p.h*0.7, p.w, p.h*0.7);
        // dome on top
        ctx.beginPath();
        ctx.ellipse(sx+p.w/2, H*0.55-p.h*0.7, p.w*0.35, p.h*0.25, 0, Math.PI, Math.PI*2);
        ctx.fill();
        // spire
        ctx.beginPath();
        ctx.moveTo(sx+p.w*0.45, H*0.55-p.h*0.95);
        ctx.lineTo(sx+p.w/2, H*0.55-p.h);
        ctx.lineTo(sx+p.w*0.55, H*0.55-p.h*0.95);
        ctx.closePath(); ctx.fill();
        // spire LED
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const sg = ctx.createRadialGradient(sx+p.w/2, H*0.55-p.h, 0, sx+p.w/2, H*0.55-p.h, 8);
        sg.addColorStop(0, 'rgba(255,240,120,0.9)');
        sg.addColorStop(1, 'rgba(255,220,80,0)');
        ctx.fillStyle = sg;
        ctx.beginPath(); ctx.arc(sx+p.w/2, H*0.55-p.h, 8, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        // golden outline
        ctx.strokeStyle = 'rgba(255,200,80,0.5)';
        ctx.lineWidth = 0.8;
        ctx.strokeRect(sx, H*0.55-p.h*0.7, p.w, p.h*0.7);
      }
    }
  }
  ctx.restore();
}

function drawBackground(){
  const cw = (G.state==='play' || G.state==='gameover') ? currentWorld() : WORLDS[0];
  // Deep space gradient — per-world colors
  const g = ctx.createLinearGradient(0,0,0,H);
  if(G.rage && G.state==='play'){
    g.addColorStop(0, '#3a1020'); g.addColorStop(0.5, '#220b2e'); g.addColorStop(1, '#0a0a1f');
  } else if(G.bossActive){
    g.addColorStop(0, '#4a1020'); g.addColorStop(0.5, '#2a0b2e'); g.addColorStop(1, '#150a1f');
  } else {
    g.addColorStop(0, cw.bg[0]);
    g.addColorStop(0.3, cw.bg[1]);
    g.addColorStop(0.65, cw.bg[2]);
    g.addColorStop(1, cw.bg[3]);
  }
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // --- NEBULA BLOBS (per-world colors) ---
  if(!G.rage && !G.bossActive){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const t = G.t*0.00018;
    const positions = [
      {x:W*0.28, y:H*0.22, r:200, phase:0},
      {x:W*0.72, y:H*0.38, r:220, phase:2},
      {x:W*0.50, y:H*0.12, r:160, phase:4},
      {x:W*0.15, y:H*0.50, r:140, phase:6},
    ];
    positions.forEach((p,i) => {
      const gx = p.x + Math.cos(t+p.phase)*22;
      const gy = p.y + Math.sin((t+p.phase)*0.7)*14;
      const ng = ctx.createRadialGradient(gx, gy, 5, gx, gy, p.r);
      ng.addColorStop(0, cw.nebulas[i] || cw.nebulas[0]);
      const base = (cw.nebulas[i] || cw.nebulas[0]).replace(/,[\d.]+\)$/, ',0)');
      ng.addColorStop(1, base);
      ctx.fillStyle = ng;
      ctx.beginPath(); ctx.arc(gx, gy, p.r, 0, Math.PI*2); ctx.fill();
    });
    ctx.restore();
  }

  // --- 3-LAYER PARALLAX STARFIELD with depth tinting ---
  for(const s of G.bgStars){
    const layer = s.layer || 0;
    const speed = layer === 0 ? 0.04 : layer === 1 ? 0.08 : 0.15;
    const sx = ((s.px - G.distance*speed) % W + W) % W;
    const a = 0.3 + Math.sin(s.tw)*0.3 + 0.4;
    const tint = layer === 2 ? '255,240,220' : layer === 1 ? '230,235,255' : '200,210,255';
    ctx.fillStyle = `rgba(${tint},${a})`;
    ctx.beginPath(); ctx.arc(sx, s.y, s.s, 0, Math.PI*2); ctx.fill();
    if(s.s > 1.3){
      ctx.strokeStyle = `rgba(${tint},${a*0.5})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(sx - s.s*3.2, s.y); ctx.lineTo(sx + s.s*3.2, s.y);
      ctx.moveTo(sx, s.y - s.s*3.2); ctx.lineTo(sx, s.y + s.s*3.2);
      ctx.stroke();
    }
  }

  // --- SHOOTING STARS ---
  for(const ss of G.shootingStars){
    ctx.save();
    for(let i=0; i<ss.trail.length; i++){
      const frac = i/ss.trail.length;
      const a = frac * ss.life * 0.9;
      const tr = ss.trail[i];
      ctx.fillStyle = `rgba(180,220,255,${a})`;
      ctx.beginPath(); ctx.arc(tr.x, tr.y, 1.8*frac+0.5, 0, Math.PI*2); ctx.fill();
    }
    // head glow
    ctx.globalCompositeOperation='lighter';
    const hg = ctx.createRadialGradient(ss.x, ss.y, 0, ss.x, ss.y, 10);
    hg.addColorStop(0, 'rgba(255,255,255,0.9)'); hg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(ss.x, ss.y, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ss.x, ss.y, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // --- DISTANT PLANETS ---
  if(!G.rage && !G.bossActive){
    // Gas giant with rings (top-right)
    ctx.save();
    const px = W*0.78 + Math.sin(G.t*0.00008)*4;
    const py = H*0.16;
    // GOD RAYS radiating outward — cinematic volumetric light
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha = 0.15;
    ctx.strokeStyle = '#ff80c8';
    ctx.lineCap = 'round';
    for(let i=0;i<14;i++){
      const a = (i/14)*Math.PI*2 + G.t*0.0002;
      const rayLen = 160 + Math.sin(G.t*0.0004+i*0.7)*40;
      ctx.lineWidth = 2 + Math.sin(G.t*0.0018+i*1.2)*1.5;
      ctx.beginPath();
      ctx.moveTo(px + Math.cos(a)*42, py + Math.sin(a)*42);
      ctx.lineTo(px + Math.cos(a)*rayLen, py + Math.sin(a)*rayLen);
      ctx.stroke();
    }
    ctx.restore();
    // outer glow
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const gl = ctx.createRadialGradient(px, py, 20, px, py, 80);
    gl.addColorStop(0, 'rgba(255,77,184,0.3)'); gl.addColorStop(1, 'rgba(255,77,184,0)');
    ctx.fillStyle = gl;
    ctx.beginPath(); ctx.arc(px, py, 80, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // planet body
    const pg = ctx.createRadialGradient(px-12, py-10, 5, px, py, 44);
    pg.addColorStop(0, '#ffc8e0');
    pg.addColorStop(0.35, '#d88df0');
    pg.addColorStop(0.75, '#6a30a0');
    pg.addColorStop(1, '#2a0b4a');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(px, py, 42, 0, Math.PI*2); ctx.fill();
    // bands (clipped to sphere)
    ctx.save();
    ctx.beginPath(); ctx.arc(px, py, 42, 0, Math.PI*2); ctx.clip();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(px-42, py-12); ctx.quadraticCurveTo(px, py-8, px+42, py-14); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px-42, py+6); ctx.quadraticCurveTo(px, py+3, px+42, py+5); ctx.stroke();
    ctx.strokeStyle = 'rgba(0,0,0,0.22)';
    ctx.beginPath(); ctx.moveTo(px-42, py+16); ctx.quadraticCurveTo(px, py+20, px+42, py+14); ctx.stroke();
    ctx.restore();
    // ring
    ctx.save();
    ctx.translate(px, py); ctx.rotate(-0.35);
    ctx.strokeStyle = 'rgba(255,77,184,0.55)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(0, 0, 64, 11, 0, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,210,120,0.3)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.ellipse(0, 0, 58, 9, 0, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
    ctx.restore();

    // Small cyan planet (top-left)
    ctx.save();
    const px2 = W*0.12, py2 = H*0.09;
    ctx.globalCompositeOperation='lighter';
    const gl2 = ctx.createRadialGradient(px2, py2, 3, px2, py2, 30);
    gl2.addColorStop(0, 'rgba(77,208,255,0.35)'); gl2.addColorStop(1, 'rgba(77,208,255,0)');
    ctx.fillStyle = gl2;
    ctx.beginPath(); ctx.arc(px2, py2, 30, 0, Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='source-over';
    const pg2 = ctx.createRadialGradient(px2-5, py2-4, 2, px2, py2, 17);
    pg2.addColorStop(0, '#c0f0ff'); pg2.addColorStop(0.6, '#4dd0ff'); pg2.addColorStop(1, '#002a45');
    ctx.fillStyle = pg2;
    ctx.beginPath(); ctx.arc(px2, py2, 17, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Tiny golden planet (bottom-right far)
    ctx.save();
    const px3 = W*0.88, py3 = H*0.38;
    const pg3 = ctx.createRadialGradient(px3-2, py3-2, 1, px3, py3, 9);
    pg3.addColorStop(0, '#ffdfa0'); pg3.addColorStop(0.6, '#d48830'); pg3.addColorStop(1, '#4a2010');
    ctx.fillStyle = pg3;
    ctx.beginPath(); ctx.arc(px3, py3, 9, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // --- AURORA SHIMMER (wavy colored band at top) ---
  if(!G.rage && !G.bossActive){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const t = G.t*0.00015;
    for(let layer=0; layer<3; layer++){
      const hues = [
        ['rgba(77,208,255,0.15)','rgba(77,208,255,0)'],
        ['rgba(255,77,184,0.12)','rgba(255,77,184,0)'],
        ['rgba(126,239,255,0.08)','rgba(126,239,255,0)'],
      ];
      const yBase = 60 + layer*18;
      const amp = 10 + layer*6;
      const phase = t + layer*1.3;
      ctx.beginPath();
      ctx.moveTo(0, H); // just so path exists
      ctx.moveTo(0, yBase);
      for(let x=0; x<=W; x+=14){
        const y = yBase + Math.sin(x*0.012 + phase)*amp + Math.cos(x*0.007 + phase*0.6)*amp*0.3;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(W, yBase + 60);
      ctx.lineTo(0, yBase + 60);
      ctx.closePath();
      const g = ctx.createLinearGradient(0, yBase-10, 0, yBase+60);
      g.addColorStop(0, hues[layer][0]);
      g.addColorStop(1, hues[layer][1]);
      ctx.fillStyle = g;
      ctx.fill();
    }
    ctx.restore();
  }

  // --- SPEED LINES (during gameplay) ---
  if(G.state==='play' && G.speed > 2){
    ctx.save();
    ctx.strokeStyle = '#ffffff';
    const speedFactor = Math.min(1, (G.speed - 2) / 4); // 0..1
    ctx.lineWidth = 1;
    for(const sl of G.speedLines){
      sl.x -= G.speed * 2.2;
      if(sl.x + sl.len < 0){ sl.x = W + 20; sl.y = 200+Math.random()*(GND-260); sl.len = 30+Math.random()*60; sl.op = 0.05+Math.random()*0.12; }
      ctx.globalAlpha = sl.op * speedFactor;
      ctx.beginPath();
      ctx.moveTo(sl.x, sl.y);
      ctx.lineTo(sl.x+sl.len, sl.y);
      ctx.stroke();
    }
    ctx.restore();
  }

  // --- MID-DEPTH PARALLAX STRUCTURES (per-world) ---
  // Rendered between the starfield and the foreground dunes, at medium parallax speed
  if(!G.rage && !G.bossActive){
    drawWorldParallax();
  }

  // --- FAR DUNES (former mountains, now alien terrain) ---
  ctx.save();
  const ox = (G.distance*0.1)%W;
  ctx.fillStyle = 'rgba(50,22,85,0.55)';
  for(let i=-1;i<=1;i++){
    const x = i*W - ox;
    ctx.beginPath();
    ctx.moveTo(x, H*0.62);
    ctx.lineTo(x+W*0.15, H*0.47); ctx.lineTo(x+W*0.3, H*0.57);
    ctx.lineTo(x+W*0.45, H*0.42); ctx.lineTo(x+W*0.65, H*0.52);
    ctx.lineTo(x+W*0.8, H*0.44); ctx.lineTo(x+W, H*0.57);
    ctx.lineTo(x+W, H*0.72); ctx.lineTo(x, H*0.72);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // --- NEAR DUNES ---
  ctx.save();
  const ox2 = (G.distance*0.35)%W;
  const gg = ctx.createLinearGradient(0, H*0.55, 0, H*0.8);
  gg.addColorStop(0, 'rgba(35,12,60,0.88)'); gg.addColorStop(1, 'rgba(15,8,30,0.95)');
  ctx.fillStyle = gg;
  for(let i=-1;i<=1;i++){
    const x = i*W - ox2;
    ctx.beginPath();
    ctx.moveTo(x, H*0.75);
    for(let k=0;k<=6;k++){
      ctx.lineTo(x + k*(W/6), H*0.65 + Math.sin(k*1.3)*18 + (k%2?0:-8));
    }
    ctx.lineTo(x+W, H*0.8); ctx.lineTo(x, H*0.8);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();

  // --- VIGNETTE ---
  ctx.save();
  const vg = ctx.createRadialGradient(W/2, H/2, W*0.32, W/2, H/2, W*0.78);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg;
  ctx.fillRect(0,0,W,H);
  ctx.restore();
}

function drawGround(){
  const cw = (G.state==='play' || G.state==='gameover') ? currentWorld() : WORLDS[0];
  const wIdx = (G.state==='play' || G.state==='gameover') ? (G.world||1) : 1;
  // Ground deep gradient with layered color band
  const g = ctx.createLinearGradient(0, GND-4, 0, H);
  g.addColorStop(0, cw.ground[0]);
  g.addColorStop(0.15, cw.ground[1]);
  g.addColorStop(0.6, cw.ground[2]);
  g.addColorStop(1, '#02020a');
  ctx.fillStyle = g; ctx.fillRect(0, GND-4, W, H-GND+4);

  // ============================================================================
  //  PER-WORLD GROUND TEXTURE — unique pattern for visual identity
  // ============================================================================
  ctx.save();
  // clip everything inside the ground band
  ctx.beginPath(); ctx.rect(0, GND-4, W, H-GND+4); ctx.clip();
  const scroll = (G.distance*1.6);
  // W1 — COSMIC TILES with embedded stars
  if(wIdx===1){
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.strokeStyle = 'rgba(255,180,220,0.35)';
    ctx.lineWidth = 0.8;
    const ts = 60;
    const os = scroll % ts;
    for(let y = GND+6; y < H; y += ts*0.7){
      for(let x = -ts; x < W+ts; x += ts){
        const cx = x - os + ts/2;
        // diamond tile
        ctx.beginPath();
        ctx.moveTo(cx, y); ctx.lineTo(cx+ts/2, y+ts*0.35);
        ctx.lineTo(cx, y+ts*0.7); ctx.lineTo(cx-ts/2, y+ts*0.35);
        ctx.closePath(); ctx.stroke();
        // tiny star in center
        if(((x/ts)|0) % 3 === 0){
          ctx.save();
          ctx.globalCompositeOperation='lighter';
          ctx.fillStyle = 'rgba(255,220,255,0.7)';
          ctx.beginPath(); ctx.arc(cx, y+ts*0.35, 1.4, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }
      }
    }
    ctx.restore();
  }
  // W2 — ICE CRACKS (branching fractures)
  else if(wIdx===2){
    ctx.save();
    ctx.strokeStyle = 'rgba(200,235,255,0.45)';
    ctx.lineWidth = 0.9;
    ctx.lineCap = 'round';
    // deterministic crack seeds with scroll offset
    for(let i=0; i<8; i++){
      const ox = ((i*137 - scroll*0.5) % (W+200)) - 100;
      const oy = GND + 12 + (i%3)*20;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      let x = ox, y = oy;
      for(let k=0; k<5; k++){
        x += 20 + Math.sin(i*0.7+k)*8;
        y += 6 + Math.cos(i*1.3+k)*6;
        ctx.lineTo(x, y);
        // branch
        if(k===2){
          ctx.moveTo(x, y);
          ctx.lineTo(x+14, y+10+Math.sin(i)*5);
          ctx.moveTo(x, y);
        }
      }
      ctx.stroke();
    }
    // ice crystal flecks
    ctx.fillStyle = 'rgba(220,245,255,0.6)';
    for(let i=0; i<14; i++){
      const x = ((i*97 - scroll*0.8) % (W+40)) - 20;
      const y = GND + 8 + (i%4)*16;
      ctx.beginPath();
      ctx.moveTo(x, y-2); ctx.lineTo(x+2, y); ctx.lineTo(x, y+2); ctx.lineTo(x-2, y); ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }
  // W3 — LAVA FISSURES (glowing cracks)
  else if(wIdx===3){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    for(let i=0; i<6; i++){
      const ox = ((i*163 - scroll*1.2) % (W+200)) - 100;
      const oy = GND + 10 + (i%3)*22;
      // outer glow
      ctx.strokeStyle = 'rgba(255,120,40,0.55)';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      let x = ox, y = oy;
      const path = [];
      for(let k=0; k<6; k++){
        x += 18 + Math.sin(i*0.9+k)*6;
        y += 4 + Math.cos(i*1.5+k)*5;
        path.push([x,y]);
        ctx.lineTo(x, y);
      }
      ctx.stroke();
      // hot core
      ctx.strokeStyle = 'rgba(255,230,120,0.9)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(ox, oy);
      for(const p of path) ctx.lineTo(p[0], p[1]);
      ctx.stroke();
    }
    ctx.restore();
  }
  // W4 — FUNGAL PATTERNS (circle-cluster spores)
  else if(wIdx===4){
    ctx.save();
    ctx.globalAlpha = 0.5;
    for(let i=0; i<10; i++){
      const ox = ((i*121 - scroll*0.7) % (W+100)) - 50;
      const oy = GND + 14 + (i%3)*22;
      // spore cluster
      ctx.fillStyle = i%2 ? 'rgba(180,255,80,0.6)' : 'rgba(255,240,100,0.5)';
      for(let k=0; k<4; k++){
        const kx = ox + k*6 - 6;
        const ky = oy + Math.sin(k*1.5 + i)*3;
        ctx.beginPath(); ctx.arc(kx, ky, 2.4, 0, Math.PI*2); ctx.fill();
      }
      // center dot
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle = 'rgba(200,255,120,0.7)';
      ctx.beginPath(); ctx.arc(ox, oy, 1.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }
  // W5 — VOID RUNES (subtle glyphs, faint)
  else if(wIdx===5){
    ctx.save();
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = 'rgba(200,200,255,0.4)';
    ctx.lineWidth = 0.8;
    for(let i=0; i<7; i++){
      const ox = ((i*159 - scroll*0.6) % (W+120)) - 60;
      const oy = GND + 16 + (i%2)*28;
      // circle + triangle rune
      ctx.beginPath(); ctx.arc(ox, oy, 6, 0, Math.PI*2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ox, oy-4); ctx.lineTo(ox+3.5, oy+2); ctx.lineTo(ox-3.5, oy+2); ctx.closePath();
      ctx.stroke();
    }
    ctx.restore();
  }
  // W6 — SOLAR CRACKS with ember glow
  else if(wIdx===6){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle = 'rgba(255,200,60,0.55)';
    ctx.lineWidth = 1.5;
    for(let i=0; i<8; i++){
      const ox = ((i*141 - scroll*0.9) % (W+100)) - 50;
      const oy = GND + 10 + (i%4)*18;
      ctx.beginPath();
      ctx.moveTo(ox, oy); ctx.lineTo(ox+20, oy+8); ctx.lineTo(ox+30, oy-2);
      ctx.stroke();
    }
    ctx.restore();
  }
  // W7 — CIRCUIT TRACES with LED nodes
  else if(wIdx===7){
    ctx.save();
    ctx.strokeStyle = 'rgba(100,230,255,0.55)';
    ctx.lineWidth = 1;
    const tileW = 80;
    const os = scroll % tileW;
    for(let x = -tileW; x < W+tileW; x += tileW){
      const px = x - os;
      const py = GND + 14;
      // horizontal trace
      ctx.beginPath();
      ctx.moveTo(px, py); ctx.lineTo(px+tileW*0.4, py);
      ctx.lineTo(px+tileW*0.4, py+14);
      ctx.lineTo(px+tileW*0.8, py+14);
      ctx.stroke();
      // branch down
      ctx.beginPath();
      ctx.moveTo(px+tileW*0.6, py);
      ctx.lineTo(px+tileW*0.6, py+26);
      ctx.stroke();
      // LED nodes
      const blink = Math.sin(G.t*0.01 + x*0.03) > 0.5;
      ctx.fillStyle = blink ? '#20ffe0' : '#0a3040';
      ctx.beginPath(); ctx.arc(px+tileW*0.4, py, 1.8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = blink ? '#ff40d0' : '#3a0a2a';
      ctx.beginPath(); ctx.arc(px+tileW*0.6, py+26, 1.8, 0, Math.PI*2); ctx.fill();
      // LED glow
      if(blink){
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const lg = ctx.createRadialGradient(px+tileW*0.4, py, 0, px+tileW*0.4, py, 6);
        lg.addColorStop(0, 'rgba(30,255,220,0.6)');
        lg.addColorStop(1, 'rgba(30,255,220,0)');
        ctx.fillStyle = lg;
        ctx.beginPath(); ctx.arc(px+tileW*0.4, py, 6, 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }
    ctx.restore();
  }
  // W8 — CORAL PATTERNS / wave lines
  else if(wIdx===8){
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = 'rgba(100,230,220,0.5)';
    ctx.lineWidth = 1;
    for(let y = GND+8; y < H; y += 14){
      ctx.beginPath();
      ctx.moveTo(0, y);
      for(let x = 0; x <= W; x += 10){
        ctx.lineTo(x, y + Math.sin((x + scroll*0.4 + y*0.3)*0.05)*2);
      }
      ctx.stroke();
    }
    ctx.restore();
  }
  // W9 — RUBY FACETS (diamond grid)
  else if(wIdx===9){
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.strokeStyle = 'rgba(255,80,140,0.5)';
    ctx.lineWidth = 0.8;
    const ts = 40;
    const os = scroll % ts;
    for(let y = GND+6; y < H; y += ts*0.6){
      for(let x = -ts; x < W+ts; x += ts){
        const cx = x - os + ts/2;
        ctx.beginPath();
        ctx.moveTo(cx, y); ctx.lineTo(cx+ts/2, y+ts*0.3);
        ctx.lineTo(cx, y+ts*0.6); ctx.lineTo(cx-ts/2, y+ts*0.3);
        ctx.closePath(); ctx.stroke();
      }
    }
    ctx.restore();
  }
  // W10 — GOLDEN CHEVRONS (royal arrows)
  else if(wIdx===10){
    ctx.save();
    ctx.strokeStyle = 'rgba(255,230,120,0.55)';
    ctx.lineWidth = 1.2;
    const ts = 40;
    const os = scroll % ts;
    for(let y = GND+10; y < H; y += 18){
      for(let x = -ts; x < W+ts; x += ts){
        const px = x - os;
        ctx.beginPath();
        ctx.moveTo(px, y+6); ctx.lineTo(px+ts/2, y); ctx.lineTo(px+ts, y+6);
        ctx.stroke();
      }
    }
    ctx.restore();
  }
  ctx.restore();

  // Double horizon glow (horizon + accent)
  ctx.save();
  ctx.strokeStyle = cw.horizon;
  ctx.lineWidth = 2.5;
  ctx.shadowColor = cw.horizon; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.moveTo(0, GND); ctx.lineTo(W, GND); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = cw.accent;
  ctx.globalAlpha = 0.55;
  ctx.lineWidth = 1;
  ctx.shadowColor = cw.accent; ctx.shadowBlur = 6;
  ctx.beginPath(); ctx.moveTo(0, GND+4); ctx.lineTo(W, GND+4); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();

  // Hexagonal grid panels scrolling (sci-fi floor)
  const tileW = 78, tileH = 16;
  const hexScroll = (G.distance*1.6) % tileW;
  ctx.save();
  for(let row = 0; row < 9; row++){
    const rowY = GND + 8 + row*tileH;
    const perspective = row / 9;
    const rowAlpha = 0.38 * (1 - perspective*0.6);
    const offset = ((row%2===0) ? 0 : tileW/2);
    const stretchFactor = 1 + perspective*0.35;
    for(let x = -tileW + offset - hexScroll*stretchFactor; x < W+tileW*2; x += tileW){
      const cx = x + tileW/2;
      const midX = W/2 + (cx - W/2) * (1 + perspective*0.25);
      const wHalf = (tileW/2) * (1 + perspective*0.25);
      ctx.strokeStyle = cw.horizon;
      ctx.globalAlpha = rowAlpha;
      ctx.lineWidth = 0.9;
      ctx.beginPath();
      ctx.moveTo(midX - wHalf, rowY);
      ctx.lineTo(midX + wHalf, rowY);
      ctx.lineTo(midX + wHalf + 3, rowY+tileH);
      ctx.lineTo(midX - wHalf - 3, rowY+tileH);
      ctx.closePath();
      ctx.stroke();
      if((Math.floor((cx + hexScroll)/tileW) + row) % 9 === 0){
        ctx.fillStyle = cw.horizon;
        ctx.globalAlpha = rowAlpha*0.22;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();

  // Vertical perspective lines converging downward
  ctx.save();
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = cw.accent;
  const ox = (G.distance*1.5)%120;
  for(let x=-ox; x<W+120; x+=60){
    ctx.beginPath();
    ctx.moveTo(x, GND+4);
    ctx.lineTo(W/2 + (x - W/2)*2.2, H);
    ctx.stroke();
  }
  ctx.restore();

  // Embedded glowing ground crystals (world-colored)
  const crystalScroll = (G.distance*2.2) % 220;
  // derive a lighter accent for crystal highlight
  const crystalCol = cw.crystal;
  for(let i = 0; i < 5; i++){
    const ccx = W + 80 - i*210 - crystalScroll;
    if(ccx > -20 && ccx < W+20){
      const gy = GND + 4;
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const gg = ctx.createRadialGradient(ccx, gy, 2, ccx, gy, 22);
      gg.addColorStop(0, crystalCol);
      gg.addColorStop(1, crystalCol+'00');
      ctx.fillStyle = gg;
      ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.arc(ccx, gy, 22, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // Small crystal spike with world color
      const cg = ctx.createLinearGradient(ccx, gy-10, ccx, gy+2);
      cg.addColorStop(0, '#ffffff');
      cg.addColorStop(1, crystalCol);
      ctx.fillStyle = cg;
      ctx.beginPath();
      ctx.moveTo(ccx-3, gy+2);
      ctx.lineTo(ccx, gy-10);
      ctx.lineTo(ccx+3, gy+2);
      ctx.closePath(); ctx.fill();
    }
  }
}

function drawTutorialModal(){
  if(!G.tutModal) return;
  const m = G.tutModal;
  const fade = G.tutPauseFade;
  ctx.save();
  // Backdrop fade
  ctx.fillStyle = `rgba(5,2,15,${0.72*fade})`;
  ctx.fillRect(0, 0, W, H);

  // Card dimensions
  const cw = W - 60, ch = 320;
  const cx = 30, cy = (H - ch)/2;

  // Outer glow
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const gg = ctx.createRadialGradient(W/2, cy+ch*0.35, 30, W/2, cy+ch*0.35, 260);
  gg.addColorStop(0, m.color+'66');
  gg.addColorStop(1, m.color+'00');
  ctx.fillStyle = gg;
  ctx.globalAlpha = fade;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // Card body
  ctx.globalAlpha = fade;
  const bgC = ctx.createLinearGradient(0, cy, 0, cy+ch);
  bgC.addColorStop(0, 'rgba(30,16,60,0.96)');
  bgC.addColorStop(1, 'rgba(10,6,28,0.96)');
  ctx.fillStyle = bgC;
  roundRect(cx, cy, cw, ch, 24); ctx.fill();
  ctx.strokeStyle = m.color;
  ctx.lineWidth = 3;
  roundRect(cx, cy, cw, ch, 24); ctx.stroke();
  // Inner soft border
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  ctx.strokeStyle = m.color + '44';
  ctx.lineWidth = 1.5;
  roundRect(cx+3, cy+3, cw-6, ch-6, 22); ctx.stroke();
  ctx.restore();

  // "NEW!" badge top-left
  ctx.fillStyle = m.color;
  roundRect(cx+16, cy+12, 54, 20, 10); ctx.fill();
  ctx.fillStyle = '#0a0a1f';
  ctx.font = '900 11px Chakra Petch'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('NEW!', cx+43, cy+22);

  // Icon (large emoji)
  ctx.save();
  const iconY = cy + 80;
  ctx.fillStyle = m.color;
  ctx.globalCompositeOperation='lighter';
  const iconGlow = ctx.createRadialGradient(W/2, iconY, 8, W/2, iconY, 55);
  iconGlow.addColorStop(0, m.color+'aa');
  iconGlow.addColorStop(1, m.color+'00');
  ctx.fillStyle = iconGlow;
  ctx.beginPath(); ctx.arc(W/2, iconY, 55, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = fade;
  ctx.fillStyle = m.color;
  ctx.font = 'bold 68px Arial';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(m.icon, W/2, iconY+4);

  // Title
  ctx.fillStyle = '#fff';
  ctx.font = '900 24px Chakra Petch';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText(m.title, W/2, cy+172);

  // Subtitle — word wrap
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = '15px Chakra Petch';
  const words = m.sub.split(' ');
  const maxW = cw - 50;
  let line = '';
  let y = cy+200;
  for(let i=0;i<words.length;i++){
    const test = line ? line + ' ' + words[i] : words[i];
    if(ctx.measureText(test).width > maxW){
      ctx.fillText(line, W/2, y);
      line = words[i];
      y += 20;
    } else {
      line = test;
    }
  }
  if(line) ctx.fillText(line, W/2, y);

  // Tap to continue pulse
  const pulse = 0.55 + Math.sin(G.t*0.006)*0.35;
  ctx.fillStyle = `rgba(255,255,255,${pulse*fade})`;
  ctx.font = 'bold 13px Chakra Petch';
  ctx.fillText('👆  TAP TO CONTINUE', W/2, cy+ch-26);

  ctx.restore();
}

  ctx.restore();
  // Very subtle vignette on top/bottom — much softer so colors pop

  topG.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = topG;
  ctx.fillRect(0, 0, W, 90);
  const botG = ctx.createLinearGradient(0, H-110, 0, H);
  botG.addColorStop(0, 'rgba(0,0,0,0)');
  botG.addColorStop(1, 'rgba(0,0,0,0.16)');

function drawForegroundDebris(){
  for(const d of G.fgDebris){
    ctx.save();
    ctx.globalAlpha = d.op;
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rot);
    if(d.type === 'rock'){
      // Small purple/black asteroid chunk with magenta accent
      ctx.fillStyle = '#160828';
      ctx.strokeStyle = '#5a1e8a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-d.s, -d.s*0.4);
      ctx.lineTo(d.s*0.6, -d.s*0.9);
      ctx.lineTo(d.s*0.85, d.s*0.55);
      ctx.lineTo(-d.s*0.5, d.s*0.95);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // glow accent
      ctx.fillStyle = 'rgba(255,77,184,0.55)';
      ctx.beginPath(); ctx.arc(-d.s*0.15, -d.s*0.15, d.s*0.22, 0, Math.PI*2); ctx.fill();
    } else {
      // Sparkle dust with colored glow
      ctx.globalCompositeOperation='lighter';
      const gg = ctx.createRadialGradient(0, 0, 0, 0, 0, d.s*2.8);
      gg.addColorStop(0, d.hue);
      gg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.arc(0, 0, d.s*2.8, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(0, 0, d.s*0.4, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}
function drawParticles(){
  for(const p of G.particles){
    ctx.save();
    // -30% global alpha on particle glow
    ctx.globalAlpha = Math.max(0, p.life) * 0.7;
    if(p.shape==='rect'){
      ctx.translate(p.x,p.y); ctx.rotate(p.rot||0);
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 3.5;  // reduced from 5
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
    } else {
      // Additive glow halo around each circle particle (reduced 30%)
      ctx.globalCompositeOperation = 'lighter';
      const r = p.size * p.life;
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r*1.4);  // reduced from r*2
      grad.addColorStop(0, p.color);
      grad.addColorStop(0.4, p.color);
      grad.addColorStop(1, p.color.replace(/rgba?\(([^)]+)\)/, (m,inner)=>{
        const parts = inner.split(',').map(s=>s.trim());
        return 'rgba('+parts[0]+','+parts[1]+','+parts[2]+',0)';
      }).replace(/^#[0-9a-f]{6,8}$/i, p.color+'00'));
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(p.x, p.y, r*1.25, 0, Math.PI*2); ctx.fill();  // reduced from r*1.8
      // Hot core (unchanged)
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = Math.max(0, p.life);  // core stays full alpha
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, r*0.9, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
  // Fuse embers — additive bright with soft glow
  for(const e of G.embers){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.globalAlpha = e.life;
    const r = e.size*e.life;
    const gg = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r*3);
    gg.addColorStop(0, C.sparkHot);
    gg.addColorStop(0.5, 'rgba(255,140,60,0.5)');
    gg.addColorStop(1, 'rgba(255,100,40,0)');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(e.x, e.y, r*2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(e.x, e.y, r*0.6, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawPopups(){
  for(const p of G.popups){
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.font = `bold ${Math.floor(22*p.scale)}px Russo One, sans-serif`;
    ctx.textAlign='center';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText(p.text, p.x+2, p.y+2);
    ctx.fillStyle = p.color;
    ctx.fillText(p.text, p.x, p.y);
    ctx.restore();
  }
}

function drawBossWave(){
  if(!G.bossActive && G.bossWarn<=0) return;
  if(G.bossActive){
    const wx = G.bossWaveX;
    ctx.save();

    // 1. BACK SHADOW MASS — dark red fog extending well behind the wave
    const fogG = ctx.createLinearGradient(wx-360, 0, wx, 0);
    fogG.addColorStop(0, 'rgba(60,0,10,0)');
    fogG.addColorStop(0.5, 'rgba(180,20,30,0.35)');
    fogG.addColorStop(1, 'rgba(255,60,20,0.5)');
    ctx.fillStyle = fogG;
    ctx.fillRect(wx-360, 0, 360, H);

    // 2. WALL GRADIENT — multi-stop hot core
    const wallG = ctx.createLinearGradient(wx-280, 0, wx, 0);
    wallG.addColorStop(0,    'rgba(255,40,10,0)');
    wallG.addColorStop(0.35, 'rgba(200,20,10,0.45)');
    wallG.addColorStop(0.7,  'rgba(255,100,30,0.85)');
    wallG.addColorStop(0.92, 'rgba(255,220,80,0.95)');
    wallG.addColorStop(1,    'rgba(255,255,220,1)');
    ctx.fillStyle = wallG;
    ctx.fillRect(wx-280, 0, 280, H);

    // 3. PROCEDURAL FLAME TONGUES — 3-octave noise-driven flame edge
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    // Layer 1 — giant base flames
    ctx.fillStyle = 'rgba(255,80,20,0.7)';
    ctx.beginPath();
    ctx.moveTo(wx+80, 0);
    for(let y=0; y<=H; y+=8){
      const phase = G.t*0.012 + y*0.03;
      const n1 = Math.sin(phase)*24;
      const n2 = Math.sin(phase*1.7 + y*0.015)*14;
      const n3 = Math.cos(phase*2.5 + y*0.009)*10;
      ctx.lineTo(wx + n1 + n2 + n3, y);
    }
    ctx.lineTo(wx+80, H);
    ctx.closePath();
    ctx.fill();
    // Layer 2 — inner hotter flame
    ctx.fillStyle = 'rgba(255,180,60,0.7)';
    ctx.beginPath();
    ctx.moveTo(wx+50, 0);
    for(let y=0; y<=H; y+=8){
      const phase = G.t*0.016 - y*0.04;
      const n1 = Math.sin(phase)*18;
      const n2 = Math.cos(phase*2.1 + y*0.02)*10;
      ctx.lineTo(wx-22 + n1 + n2, y);
    }
    ctx.lineTo(wx+50, H);
    ctx.closePath();
    ctx.fill();
    // Layer 3 — white-hot core edge
    ctx.fillStyle = 'rgba(255,240,180,0.75)';
    ctx.beginPath();
    ctx.moveTo(wx+20, 0);
    for(let y=0; y<=H; y+=8){
      const phase = G.t*0.02 + y*0.05;
      const n1 = Math.sin(phase)*10;
      ctx.lineTo(wx-45 + n1, y);
    }
    ctx.lineTo(wx+20, H);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // 4. DEMONIC FACES — 3 faces emerging from the flame (roar animation)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const facePositions = [
      {y: H*0.22, scale: 1.0, phase: 0},
      {y: H*0.52, scale: 1.3, phase: 2.1},
      {y: H*0.80, scale: 0.9, phase: 4.3},
    ];
    for(const fp of facePositions){
      const emerge = (Math.sin(G.t*0.003 + fp.phase) + 1) * 0.5; // 0..1 pulsing
      if(emerge < 0.2) continue;
      const faceX = wx - 60 + Math.sin(G.t*0.005 + fp.phase)*18;
      const fs = fp.scale * (0.6 + emerge*0.6); // face scale
      const fa = emerge * 0.75;  // face alpha
      ctx.save();
      ctx.translate(faceX, fp.y);
      ctx.scale(fs, fs);
      // face mass (orange-red oval)
      const fg = ctx.createRadialGradient(0, 0, 5, 0, 0, 42);
      fg.addColorStop(0, `rgba(255,140,40,${fa*0.9})`);
      fg.addColorStop(0.6, `rgba(200,40,20,${fa*0.5})`);
      fg.addColorStop(1, 'rgba(180,20,10,0)');
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.ellipse(0, 0, 42, 52, 0, 0, Math.PI*2); ctx.fill();
      // angry eyes (slanted ovals, bright white-hot)
      ctx.fillStyle = `rgba(255,250,200,${fa})`;
      ctx.save();
      ctx.rotate(-0.3);
      ctx.beginPath(); ctx.ellipse(-12, -10, 6, 3, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.rotate(0.3);
      ctx.beginPath(); ctx.ellipse(12, -10, 6, 3, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // pupils (dark slits)
      ctx.fillStyle = `rgba(40,0,0,${fa})`;
      ctx.save();
      ctx.rotate(-0.3);
      ctx.beginPath(); ctx.ellipse(-12, -10, 2, 2, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.save();
      ctx.rotate(0.3);
      ctx.beginPath(); ctx.ellipse(12, -10, 2, 2, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      // horns (two curved triangles on top)
      ctx.fillStyle = `rgba(80,10,10,${fa*0.8})`;
      ctx.beginPath();
      ctx.moveTo(-18, -22); ctx.lineTo(-24, -40); ctx.lineTo(-12, -26); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(18, -22); ctx.lineTo(24, -40); ctx.lineTo(12, -26); ctx.closePath(); ctx.fill();
      // screaming mouth (open oval with fangs)
      const mouthOpen = 10 + Math.sin(G.t*0.012+fp.phase)*4;
      ctx.fillStyle = `rgba(20,0,0,${fa*0.85})`;
      ctx.beginPath(); ctx.ellipse(0, 14, 10, mouthOpen, 0, 0, Math.PI*2); ctx.fill();
      // fangs (white triangles)
      ctx.fillStyle = `rgba(255,240,220,${fa})`;
      ctx.beginPath();
      ctx.moveTo(-5, 8); ctx.lineTo(-3, 14); ctx.lineTo(-1, 8); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(5, 8); ctx.lineTo(3, 14); ctx.lineTo(1, 8); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    ctx.restore();

    // 5. Heavy embers streaming from wave (more than before)
    if(G.frame%1===0){
      for(let i=0;i<5;i++){
        G.particles.push({
          x: wx+rand(-30,20), y: rand(0,H),
          vx: rand(1.5,5), vy: rand(-4,0),
          life:1, max:rand(28,46), color: i%3===0?C.fireHi: (i%3===1?C.fire:'#ffd54a'),
          size:rand(2,5), g:0.04, shape:'circle',
        });
      }
    }

    // 6. CHROMATIC ABERRATION pulse on boss (red/cyan fringe at edges)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const caIntensity = 0.15 + Math.sin(G.t*0.01)*0.08;
    ctx.fillStyle = `rgba(255,40,20,${caIntensity})`;
    ctx.fillRect(0, 0, 40, H);
    ctx.fillRect(W-40, 0, 40, H);
    ctx.fillStyle = `rgba(40,200,255,${caIntensity*0.6})`;
    ctx.fillRect(0, 0, W, 30);
    ctx.fillRect(0, H-30, W, 30);
    ctx.restore();

    // 7. Aggressive screen shake during boss
    if(G.frame%4 === 0) G.shake = Math.max(G.shake, 4 + Math.sin(G.t*0.01)*2);

    ctx.restore();
  }
  // warning overlay
  if(G.bossWarn>0){
    const blink = Math.floor(G.t/150)%2===0;
    ctx.save();
    ctx.fillStyle = blink ? 'rgba(255,30,30,0.3)' : 'rgba(255,30,30,0)';
    ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    // extra scream effect: slight horizontal jitter on text
    const jit = Math.sin(G.t*0.04)*3;
    ctx.font='900 38px Chakra Petch';
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillText('⚠ FIRE WAVE INCOMING ⚠', W/2+2+jit, H*0.35+2);
    ctx.fillStyle = blink ? '#ff4060' : '#ffeadd';
    ctx.fillText('⚠ FIRE WAVE INCOMING ⚠', W/2+jit, H*0.35);
    ctx.font='bold 15px Chakra Petch';
    ctx.fillStyle = '#fff';
    ctx.fillText('Dodge obstacles to stay ahead!', W/2, H*0.35+26);
    ctx.restore();
  }
}

  drawWorldBar();
  drawFuseBar();
  drawFeverBar();

  // combo
  if(G.combo >= 2){
    ctx.save();
    ctx.font = 'bold 28px Chakra Petch'; ctx.textAlign='center';

    ctx.fillStyle = `rgba(0,0,0,${alpha*0.6})`;
    ctx.fillText('COMBO x'+G.combo, W/2+2, 230+2);

    grad.addColorStop(0, C.bombPinkHi); grad.addColorStop(1, C.fuseHole);
    ctx.fillStyle = grad; ctx.globalAlpha = alpha;
    ctx.fillText('COMBO x'+G.combo, W/2, 230);
    const bw = 140;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(W/2-bw/2, 240, bw, 6, 3); ctx.fill();
    ctx.fillStyle = C.fuseHole;
    roundRect(W/2-bw/2, 240, bw*(G.comboTime/1400), 6, 3); ctx.fill();
    ctx.restore();
  }

  // power pills
  let py = H - 200;
  function powerPill(label, timeLeft, color, isCharges){
    ctx.save();
    const w=74, h=74;
    ctx.fillStyle='rgba(0,0,0,0.55)';
    roundRect(W-w-20, py, w, h, 14); ctx.fill();
    ctx.strokeStyle=color; ctx.lineWidth=3;
    roundRect(W-w-20, py, w, h, 14); ctx.stroke();
    ctx.fillStyle=color;
    ctx.font='bold 22px Chakra Petch'; ctx.textAlign='center';
    ctx.fillText(label, W-w/2-20, py+36);
    ctx.font='bold 13px Chakra Petch'; ctx.fillStyle='#fff';
    const txt = isCharges ? ('x'+Math.floor(timeLeft)) : (timeLeft.toFixed(1)+'s');
    ctx.fillText(txt, W-w/2-20, py+58);
    ctx.restore();
    py -= 84;
  }
  if(G.shield>0) powerPill('🛡', G.shield, '#fff', true);
  if(G.magnet>0) powerPill('U', G.magnet, C.gem);
  if(G.dbl>0)    powerPill('x2', G.dbl, C.coin);
  if(G.rocket>0) powerPill('▲', G.rocket, C.fire);
  if(G.slowmo>0) powerPill('⏱', G.slowmo, '#b8e8ff');
  if(G.smash>0)  powerPill('💥', G.smash, '#ff6a40', true);

  // Boss timer
  if(G.bossActive){
    ctx.save();
    const bx = W/2-100, by=135, bw=200, bh=18;
    ctx.fillStyle='rgba(0,0,0,0.6)';
    roundRect(bx,by,bw,bh,9); ctx.fill();
    ctx.fillStyle=C.fire;
    const fillN = G.bossTimer/12000;
    roundRect(bx,by,bw*fillN,bh,9); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 11px Chakra Petch'; ctx.textAlign='center';
    ctx.fillText('FIRE WAVE — DODGE & SURVIVE!', W/2, by+13);
    ctx.restore();
  }

  // tutorial
  if(G.tutTimer>0){
    ctx.save();
    const a = Math.min(1, G.tutTimer/60);
    ctx.globalAlpha = a;
    ctx.fillStyle='rgba(0,0,0,0.5)';
    roundRect(W/2-140, H-220, 280, 54, 18); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 15px Chakra Petch'; ctx.textAlign='center';
    ctx.fillText('TAP TO JUMP  •  HOLD FOR HIGHER', W/2, H-198);
    ctx.font='12px Chakra Petch'; ctx.fillStyle='rgba(255,255,255,0.75)';
    ctx.fillText('Tap again in air = double jump • BONK enemies for coins', W/2, H-180);
    ctx.restore();
  }
}

function drawWorldBar(){
  const cw = currentWorld();
  ctx.save();
  // Pill with world name
  const pillW = 200, pillH = 26;
  const px = W/2 - pillW/2, py = G.bossActive ? 165 : 82;
  // back glow
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const gg = ctx.createRadialGradient(W/2, py+pillH/2, 5, W/2, py+pillH/2, 120);
  gg.addColorStop(0, cw.horizon+'55');
  gg.addColorStop(1, cw.horizon+'00');
  ctx.fillStyle = gg;
  ctx.beginPath(); ctx.arc(W/2, py+pillH/2, 120, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // pill body
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  roundRect(px, py, pillW, pillH, 13); ctx.fill();
  ctx.strokeStyle = cw.horizon;
  ctx.lineWidth = 1.5;
  roundRect(px, py, pillW, pillH, 13); ctx.stroke();
  // World number badge
  ctx.fillStyle = cw.horizon;
  ctx.beginPath(); ctx.arc(px+14, py+pillH/2, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#0a0a1f';
  ctx.font='bold 13px Chakra Petch'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(G.world, px+14, py+pillH/2+1);
  // emoji + name
  ctx.textAlign='center';
  ctx.fillStyle = cw.accent;
  ctx.font='bold 12px Chakra Petch';
  ctx.fillText(cw.emoji+'  '+cw.name.toUpperCase(), W/2+8, py+pillH/2+1);
  // Progress bar under pill (fills as distance into current world)
  const barW = pillW-4, barH = 4;
  const bx = px+2, by = py+pillH+3;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundRect(bx, by, barW, barH, 2); ctx.fill();
  const progress = G.world >= 10 ? 1 : ((G.distance % WORLD_LENGTH) / WORLD_LENGTH);
  const pg = ctx.createLinearGradient(bx, 0, bx+barW, 0);
  pg.addColorStop(0, cw.horizon); pg.addColorStop(1, cw.accent);
  ctx.fillStyle = pg;
  roundRect(bx, by, barW*progress, barH, 2); ctx.fill();
  ctx.restore();
}
function drawFeverBar(){
  if(G.world < UNLOCK.fever) return; // hidden until unlocked at W3
  const x=80, y=54, w=W-200, h=10;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.45)';
  roundRect(x-3,y-3,w+6,h+6,8); ctx.fill();
  ctx.fillStyle=C.bombDarker;
  roundRect(x,y,w,h,5); ctx.fill();
  if(G.feverActive){
    // Active: full animated gold bar
    const pulse = 0.8 + Math.sin(G.t*0.02)*0.2;
    const fg = ctx.createLinearGradient(x,y,x+w,y);
    fg.addColorStop(0, '#ffe070');
    fg.addColorStop(0.5, '#ffb030');
    fg.addColorStop(1, '#ff6040');
    ctx.fillStyle = fg;
    ctx.globalAlpha = pulse;
    const pct = Math.max(0, G.feverTimer/5000);
    roundRect(x,y,w*pct,h,5); ctx.fill();
    ctx.globalAlpha = 1;
    // label
    ctx.fillStyle='#ffe0a0'; ctx.font='bold 11px Chakra Petch'; ctx.textAlign='left';
    ctx.fillText('🔥 FEVER!', 26, y+h-1);
    ctx.textAlign='right';
    ctx.fillText(G.feverTimer.toFixed(0)+'ms', x+w+60, y+h-1);
  } else {
    // Meter fill
    const fg = ctx.createLinearGradient(x,y,x+w,y);
    fg.addColorStop(0, '#ff9030');
    fg.addColorStop(1, '#ffe070');

    roundRect(x,y,w*(G.fever/100),h,5); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.65)'; ctx.font='bold 10px Chakra Petch'; ctx.textAlign='left';
    ctx.fillText('FEVER', 26, y+h-1);
    ctx.textAlign='right';
    ctx.fillText(Math.floor(G.fever)+'%', x+w+60, y+h-1);
  }
  ctx.restore();
}
function drawFuseBar(){
  const x=80, y=26, w=W-200, h=16;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  roundRect(x-4,y-4,w+8,h+8,12); ctx.fill();
  ctx.fillStyle=C.bombDarker;
  roundRect(x,y,w,h,8); ctx.fill();
  const fuseN = Math.min(1, G.fuse/100);
  let cA = C.water, cB=C.ice;
  if(fuseN<0.5){ cA='#ffd54a'; cB='#ff8a4a'; }
  if(fuseN<0.25){ cA='#ff7730'; cB='#ff4466'; }
  const fg = ctx.createLinearGradient(x,y,x+w,y);
  fg.addColorStop(0, cA); fg.addColorStop(1, cB);
  ctx.fillStyle = fg;
  roundRect(x,y,Math.max(2,w*fuseN),h,8); ctx.fill();
  // overcharge
  if(G.fuse>100){
    const overN = Math.min(1, (G.fuse-100)/20);
    ctx.fillStyle = '#ffffff';
    ctx.globalAlpha = 0.6;
    roundRect(x, y, w*overN, h, 8); ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const sh = ctx.createLinearGradient(x,y,x+w,y);
  const pos = (G.t*0.0004)%1;
  sh.addColorStop(Math.max(0,pos-0.08),'rgba(255,255,255,0)');
  sh.addColorStop(pos,'rgba(255,255,255,0.5)');
  sh.addColorStop(Math.min(1,pos+0.08),'rgba(255,255,255,0)');
  ctx.fillStyle=sh;
  roundRect(x,y,Math.max(2,w*fuseN),h,8); ctx.fill();
  ctx.restore();
  const hx = x + Math.max(2,w*fuseN);
  if(fuseN > 0.01) drawFlame(hx, y+h/2 - 2, 5, 10, G.t*0.01);
  // Emit sparks from flame when fuse critical
  if(G.state==='play' && fuseN < 0.3 && G.frame%2===0){
    G.particles.push({
      x: hx, y: y+h/2,
      vx: rand(-1, 2), vy: rand(-2, -0.3),
      life: 1, max: rand(18, 28),
      color: fuseN<0.15 ? C.fire : C.fireHi,
      size: rand(1.5, 3), g: 0.05, shape:'circle',
    });
  }
  // Warning flash border when critical
  if(fuseN < 0.25){
    const pulse = 0.4 + Math.sin(G.t*0.02)*0.3;
    ctx.save();
    ctx.strokeStyle = C.fire;
    ctx.lineWidth = 2;
    ctx.globalAlpha = pulse;
    ctx.shadowColor = C.fire; ctx.shadowBlur = 10;
    roundRect(x-4, y-4, w+8, h+8, 12); ctx.stroke();
    ctx.restore();
  }
  ctx.fillStyle='#fff'; ctx.font='bold 12px Chakra Petch'; ctx.textAlign='left';
  ctx.fillText('FUSE', 26, y+h-2);
  ctx.textAlign='right';
  ctx.fillText(Math.max(0,Math.floor(G.fuse))+'%', x+w+60, y+h-2);
  ctx.restore();
}

function drawMenu(){
  if(G.frame%6===0){
    G.particles.push({
      x: Math.random()*W, y: H+20,
      vx: rand(-0.3,0.3), vy: rand(-2.5,-1),
      life:1, max: 200, color: 'rgba(255,77,184,0.4)', size: rand(1,3), g: 0, shape:'circle',
    });
  }
  drawBackground();

  // ===== LOGO: ASTRO BONK BOMBS =====
  const titleY = 130 + Math.sin(G.menuT*0.002)*4;
  ctx.save();
  ctx.textAlign='center';

  // "ASTRO" — small, cyan, tracked out
  ctx.font = '800 24px Russo One, sans-serif';
  ctx.fillStyle = 'rgba(77,208,255,0.35)';
  ctx.fillText('A  S  T  R  O', W/2+1, titleY+1);
  ctx.shadowColor = C.water; ctx.shadowBlur = 14;
  ctx.fillStyle = C.water;
  ctx.fillText('A  S  T  R  O', W/2, titleY);
  ctx.shadowBlur = 0;

  // "BONK" — impact logo (20% smaller)
  const bonkY = titleY + 66;
  ctx.font = '900 74px Russo One, sans-serif';
  // back glow burst
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const bonkGlow = ctx.createRadialGradient(W/2, bonkY-18, 8, W/2, bonkY-18, 96);
  bonkGlow.addColorStop(0, 'rgba(255,180,60,0.55)');
  bonkGlow.addColorStop(0.5, 'rgba(255,77,184,0.35)');
  bonkGlow.addColorStop(1, 'rgba(255,77,184,0)');
  ctx.fillStyle = bonkGlow;
  ctx.beginPath(); ctx.arc(W/2, bonkY-18, 96, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // impact spikes behind BONK
  ctx.save();
  ctx.strokeStyle = 'rgba(255,215,74,0.5)';
  ctx.lineWidth = 3; ctx.lineCap='round';
  for(let i=0;i<10;i++){
    const a = (i/10)*Math.PI*2 + Math.sin(G.menuT*0.002)*0.05;
    const len = 56 + Math.sin(G.menuT*0.003+i)*7;
    ctx.beginPath();
    ctx.moveTo(W/2+Math.cos(a)*32, bonkY-20+Math.sin(a)*18);
    ctx.lineTo(W/2+Math.cos(a)*len, bonkY-20+Math.sin(a)*(len*0.5));
    ctx.stroke();
  }
  ctx.restore();
  // BONK text (gradient + stroke)
  const g1 = ctx.createLinearGradient(0, bonkY-60, 0, bonkY+10);
  g1.addColorStop(0, '#fff3a0');
  g1.addColorStop(0.4, '#ffb347');
  g1.addColorStop(1, '#ff4db8');
  ctx.shadowColor = 'rgba(255,77,184,0.9)'; ctx.shadowBlur = 30;
  ctx.fillStyle = g1;
  ctx.fillText('BONK', W/2, bonkY);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = C.bombDarker; ctx.lineWidth = 4;
  ctx.strokeText('BONK', W/2, bonkY);

  // "BOMBS"
  const bombsY = bonkY + 46;
  ctx.font = '900 42px Russo One, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('BOMBS', W/2+2, bombsY+2);
  const g2 = ctx.createLinearGradient(0, bombsY-38, 0, bombsY+8);
  g2.addColorStop(0, '#ffffff'); g2.addColorStop(1, '#c0b8e0');
  ctx.fillStyle = g2;
  ctx.fillText('BOMBS', W/2, bombsY);
  ctx.strokeStyle = C.bombDarker; ctx.lineWidth = 3;
  ctx.strokeText('BOMBS', W/2, bombsY);

  // Accent underline
  ctx.strokeStyle = C.fuseHole; ctx.lineWidth = 3;
  ctx.shadowColor = C.fuseHole; ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.moveTo(W/2-95, bombsY+16); ctx.lineTo(W/2+95, bombsY+16);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Tagline
  ctx.font = 'bold 11px Chakra Petch';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('★  STOMP  •  DODGE  •  SURVIVE  ★', W/2, bombsY+36);

  ctx.restore();

  // mascot position
  const mascotY = bombsY+130 + Math.sin(G.menuT*0.003)*8;
  // Orbiting sparkle stars around mascot (4 at different phases)
  ctx.save();
  for(let i=0;i<5;i++){
    const a = G.menuT*0.0015 + (i/5)*Math.PI*2;
    const rx2 = 86 + Math.sin(G.menuT*0.002 + i)*6;
    const ry2 = 54 + Math.cos(G.menuT*0.002 + i)*4;
    const sx2 = W/2 + Math.cos(a)*rx2;
    const sy2 = mascotY + Math.sin(a)*ry2 + 10;
    // glow
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const gg = ctx.createRadialGradient(sx2,sy2,0, sx2,sy2, 14);
    const col = i%2===0 ? C.coinHi : C.gemHi;
    gg.addColorStop(0, col); gg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(sx2,sy2,14,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // 4-point spark
    ctx.save();
    ctx.translate(sx2, sy2);
    ctx.rotate(G.menuT*0.003 + i);
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.moveTo(0,-6); ctx.lineTo(1.5,-1.5); ctx.lineTo(6,0);
    ctx.lineTo(1.5,1.5); ctx.lineTo(0,6); ctx.lineTo(-1.5,1.5);
    ctx.lineTo(-6,0); ctx.lineTo(-1.5,-1.5);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  ctx.restore();
  // mascot (below logo, on top of sparkles)
  drawBomb(W/2, mascotY, 1.5, 'happy', 0, Math.sin(G.menuT*0.002)*0.3, 0, 0);

  // PLAY button (premium: glow, 3D gradient, shine sweep, border)

  const btnW = 260, btnH = 74;
  ctx.save();
  const pulse = 1 + Math.sin(G.menuT*0.005)*0.04;
  ctx.translate(W/2, btnY); ctx.scale(pulse,pulse);
  // halo glow
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const halo = ctx.createRadialGradient(0,0,20,0,0,btnW*0.8);
  halo.addColorStop(0, 'rgba(255,77,184,0.5)');
  halo.addColorStop(1, 'rgba(255,77,184,0)');
  ctx.fillStyle = halo;
  ctx.fillRect(-btnW, -btnH, btnW*2, btnH*2);
  ctx.restore();
  // body gradient (3D feel — light on top, dark on bottom)
  const bg = ctx.createLinearGradient(0,-btnH/2,0,btnH/2);
  bg.addColorStop(0, '#ff86d1');
  bg.addColorStop(0.5, C.fuseHole);
  bg.addColorStop(1, '#8f0c6a');
  ctx.fillStyle = bg;
  ctx.shadowColor = C.fuseHole; ctx.shadowBlur = 24;
  roundRect(-btnW/2, -btnH/2, btnW, btnH, 37); ctx.fill();

  // inner top highlight (glossy)

  hl.addColorStop(0, 'rgba(255,255,255,0.42)');
  hl.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = hl;
  roundRect(-btnW/2+3, -btnH/2+3, btnW-6, btnH*0.5, 34); ctx.fill();
  // animated shine sweep
  ctx.save();
  ctx.beginPath();
  roundRect(-btnW/2, -btnH/2, btnW, btnH, 37); ctx.clip();
  const sweep = ((G.menuT%2800)/2800);
  const sweepX = -btnW/2 + sweep*(btnW+60) - 30;
  const shine = ctx.createLinearGradient(sweepX-20, 0, sweepX+20, 0);
  shine.addColorStop(0, 'rgba(255,255,255,0)');
  shine.addColorStop(0.5, 'rgba(255,255,255,0.35)');
  shine.addColorStop(1, 'rgba(255,255,255,0)');

  // outer border

  ctx.lineWidth = 1.5;
  roundRect(-btnW/2, -btnH/2, btnW, btnH, 37); ctx.stroke();

  ctx.restore();

  drawMenuHeader();

  // ===== Glass panel helper =====
  function glassPanel(x,y,w,h,r,accent){

    g.addColorStop(0, 'rgba(35,15,70,0.85)');
    g.addColorStop(1, 'rgba(10,6,30,0.85)');
    ctx.fillStyle = g;
    roundRect(x,y,w,h,r); ctx.fill();
    // top highlight
    const hl = ctx.createLinearGradient(0,y,0,y+h*0.4);
    hl.addColorStop(0, 'rgba(255,255,255,0.08)');
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hl;
    roundRect(x+2, y+2, w-4, h*0.4, r); ctx.fill();
    // accent border
    ctx.strokeStyle = accent+'99';
    ctx.lineWidth = 1.5;
    roundRect(x,y,w,h,r); ctx.stroke();
    // accent inner glow
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.shadowColor = accent; ctx.shadowBlur = 14;
    ctx.strokeStyle = accent+'22';
    ctx.lineWidth = 1;
    roundRect(x+1,y+1,w-2,h-2,r); ctx.stroke();
    ctx.restore();
  }

  // Daily reward panel
  ctx.save();

  ctx.fillStyle = C.coinHi;

  ctx.fillStyle = C.coin; ctx.font='bold 15px Chakra Petch';
  ctx.fillText('+50 sparks', rx+12, ry+64);
  // notification dot (pulsing)
  const dotR = 5 + Math.sin(G.menuT*0.006)*1.2;
  ctx.save();
  ctx.shadowColor='#ff4466'; ctx.shadowBlur=10;
  ctx.fillStyle='#ff4466';
  ctx.beginPath(); ctx.arc(rx+140-10, ry+10, dotR, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.restore();
  addButton('daily', rx, ry, 140, 80);

  // Shop panel
  ctx.save();
  const sx = W-170, sy = H-230;
  glassPanel(sx, sy, 140, 80, 14, C.gem);
  ctx.fillStyle = C.gem;
  ctx.font = 'bold 11px Chakra Petch'; ctx.textAlign='left';
  ctx.fillText('🛒 UPGRADES', sx+12, sy+22);
  ctx.fillStyle='#fff'; ctx.font = 'bold 13px Chakra Petch';
  ctx.fillText('Boost your run', sx+12, sy+42);
  ctx.fillStyle=C.coinHi; ctx.font='bold 12px Chakra Petch';
  ctx.fillText('4 upgrades', sx+12, sy+64);
  ctx.restore();
  addButton('shop', sx, sy, 140, 80);

  // Skins row (wide)
  ctx.save();
  const kxStart = 30, kY = H-130, kW = W-60, kH = 84;
  glassPanel(kxStart, kY, kW, kH, 16, C.bombPink);
  ctx.fillStyle = C.bombPink;
  ctx.font = 'bold 11px Chakra Petch'; ctx.textAlign='left';
  ctx.fillText('👕 SKINS', kxStart+16, kY+22);
  ctx.fillStyle='#fff'; ctx.font = 'bold 15px Chakra Petch';
  ctx.fillText(SKINS[G.skin].name+' equipped', kxStart+16, kY+44);
  ctx.fillStyle = 'rgba(255,255,255,0.6)'; ctx.font='12px Chakra Petch';
  ctx.fillText(G.ownedSkins.length+' / '+Object.keys(SKINS).length+' unlocked  •  NEW: Neon Pulse', kxStart+16, kY+64);
  // preview mascot on right
  drawBomb(kxStart+kW-52, kY+kH/2-2, 0.45, 'happy', 0, 0,0,0);
  ctx.restore();
  addButton('skins', kxStart, kY, kW, kH);

  // High score ribbon (below mascot, above difficulty)
  if(G.high>0){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.5)';
    roundRect(W/2-110, H-478, 220, 32, 16); ctx.fill();
    ctx.strokeStyle='rgba(255,213,74,0.35)'; ctx.lineWidth=1;
    roundRect(W/2-110, H-478, 220, 32, 16); ctx.stroke();
    ctx.fillStyle=C.coinHi;
    ctx.font='bold 13px Chakra Petch'; ctx.textAlign='center';
    ctx.fillText('🏆 BEST: '+G.high+' m', W/2, H-457);
    ctx.restore();
  }
  // Max world reached
  if(G.maxWorld >= 1){
    const mw = WORLDS[Math.min(9, G.maxWorld-1)];
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.55)';
    roundRect(W/2-130, H-440, 260, 34, 17); ctx.fill();
    ctx.strokeStyle = mw.horizon;
    ctx.lineWidth = 1.2;
    roundRect(W/2-130, H-440, 260, 34, 17); ctx.stroke();
    ctx.fillStyle = mw.horizon;
    ctx.font='bold 11px Chakra Petch'; ctx.textAlign='center';
    ctx.fillText('HIGHEST WORLD REACHED', W/2, H-425);
    ctx.fillStyle = '#fff';
    ctx.font='bold 13px Chakra Petch';
    ctx.fillText(mw.emoji+' W'+G.maxWorld+' — '+mw.name, W/2, H-411);
    ctx.restore();
  }
}
