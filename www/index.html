<style>

  html,body{width:100%;height:100%;overflow:hidden;font-family:'Chakra Petch','Chakra Petch',-apple-system,Roboto,Arial,sans-serif;color:#fff;user-select:none;touch-action:manipulation}
  body{
    background:
      radial-gradient(ellipse at 20% 10%, #3a1856 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, #1a3a5c 0%, transparent 60%),
      linear-gradient(180deg,#0a0a1f 0%,#05050f 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
  }
  .stage{
    position:relative;
    width:min(440px, calc(100vh * 0.52));
    aspect-ratio:9/16;
    border-radius:44px;
    background:#000;
    box-shadow:
      0 40px 90px rgba(0,0,0,.7),
      0 0 0 10px #141420,
      0 0 0 12px #2a2a3a,
      inset 0 0 30px rgba(255,77,184,0.1);
    overflow:hidden;
  }
  .notch{
    position:absolute;top:8px;left:50%;transform:translateX(-50%);
    width:120px;height:22px;background:#000;border-radius:0 0 18px 18px;
    z-index:50;
  }
  canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;cursor:pointer;
    /* Global color enhancement — punchier, more vibrant */
    filter:saturate(1.22) contrast(1.08) brightness(1.04);
    image-rendering:auto;
  }
  .watermark{
    position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
    color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:1px;text-align:center;
    pointer-events:none;
  }
  .watermark b{color:#ff7db8}
  @media(max-width:480px){
    /* Instead of black letterbox bars, extend the cosmic ambience:
       - Top = deep magenta/purple nebula (matches sky of W1 Cosmic Dawn)
       - Bottom = dark violet ground (matches ground of W1)
       - Middle = transparent so canvas shows through cleanly
       Also add a subtle radial glow behind the canvas for depth. */
    body{
      background:
        radial-gradient(ellipse at 50% 50%, rgba(255,77,184,0.10) 0%, transparent 55%),
        linear-gradient(180deg,
          #2a1658 0%,
          #1a0d3e 14%,
          #0d0620 50%,
          #1a0a2e 86%,
          #3a1b6a 100%

      align-items:center;
      justify-content:center;

(() => {
'use strict';

// ============================================================================
//  CORE
// ============================================================================
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
const GND = H - 150;

// High-DPI (retina) support — render at device pixel ratio for crisp visuals
const DPR = Math.min(3, window.devicePixelRatio || 1);
(function setupDPR(){
  if(DPR > 1){
    cv.width = W * DPR;
    cv.height = H * DPR;
    cv.style.width = '100%';
    cv.style.height = '100%';
    ctx.scale(DPR, DPR);
  }
})();

// Bloom post-processing via offscreen canvas — adds glow to bright elements
const bloomCanvas = document.createElement('canvas');
bloomCanvas.width = Math.floor(W * 0.5);
bloomCanvas.height = Math.floor(H * 0.5);
const bloomCtx = bloomCanvas.getContext('2d');
let BLOOM_ENABLED = true;
function applyBloom(){
  if(!BLOOM_ENABLED) return;
  try {
    // Downscale current canvas
    bloomCtx.globalCompositeOperation = 'source-over';
    bloomCtx.clearRect(0, 0, bloomCanvas.width, bloomCanvas.height);
    bloomCtx.drawImage(cv, 0, 0, cv.width, cv.height, 0, 0, bloomCanvas.width, bloomCanvas.height);
    // Composite back with blur + lighter = bloom glow (richer, more saturated)
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.46;
    ctx.filter = 'blur(12px) brightness(1.35) saturate(1.4)';
    ctx.drawImage(bloomCanvas, 0, 0, W, H);
    ctx.filter = 'none';
    ctx.restore();
  } catch(e){
    BLOOM_ENABLED = false;
    console.warn('Bloom disabled:', e.message);
  }
}

// Chromatic aberration — subtle colored vignette for cinematic edge feel (more vivid magenta/cyan)
function applyChromatic(){
  try {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const vg = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.78);
    vg.addColorStop(0, 'rgba(255,60,180,0)');
    vg.addColorStop(1, 'rgba(255,30,170,0.14)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
    const vg2 = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.78);
    vg2.addColorStop(0, 'rgba(60,200,255,0)');
    vg2.addColorStop(1, 'rgba(30,180,255,0.11)');
    ctx.fillStyle = vg2;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  } catch(e){}
}

// Film grain — pre-generated noise texture tiled with random offset per frame
let grainTex = null;
function ensureGrainTex(){
  if(grainTex) return grainTex;
  const gc = document.createElement('canvas');
  gc.width = 128; gc.height = 128;
  const gctx = gc.getContext('2d');
  const img = gctx.createImageData(128, 128);
  for(let i=0;i<img.data.length;i+=4){
    const v = (Math.random()*255)|0;
    img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v;
    img.data[i+3] = 255;
  }
  gctx.putImageData(img, 0, 0);
  grainTex = gc;
  return gc;
}
function applyFilmGrain(){
  try {
    const tex = ensureGrainTex();
    ctx.save();
    ctx.globalCompositeOperation = 'overlay';
    ctx.globalAlpha = 0.038;
    const ox = -Math.floor(Math.random()*128);
    const oy = -Math.floor(Math.random()*128);
    for(let y=oy; y<H; y+=128){
      for(let x=ox; x<W; x+=128){
        ctx.drawImage(tex, x, y);
      }
    }
    ctx.restore();
  } catch(e){}
}

// ============================================================================
//  AUDIO
// ============================================================================
let AC=null;
function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}return AC;}
function beep(freq,dur,type='sine',vol=0.15,slide=0){
  const a=ac();if(!a)return;
  const o=a.createOscillator(),g=a.createGain();
  o.type=type;o.frequency.setValueAtTime(freq,a.currentTime);
  if(slide)o.frequency.exponentialRampToValueAtTime(Math.max(20,freq+slide),a.currentTime+dur);
  o.connect(g);g.connect(a.destination);
  // ADSR envelope (quick attack, exponential decay) — avoids click pop
  g.gain.setValueAtTime(0, a.currentTime);
  g.gain.linearRampToValueAtTime(vol, a.currentTime+0.008);
  g.gain.exponentialRampToValueAtTime(0.0005, a.currentTime+dur);
  o.start();o.stop(a.currentTime+dur);
}
// Rich sound: multi-oscillator with filter sweep (for fever, power-ups, world up)
function richTone(freq, dur, opts){
  const a=ac();if(!a)return;
  opts = opts || {};
  const g = a.createGain();
  const filter = a.createBiquadFilter();
  filter.type = opts.filterType || 'lowpass';
  filter.frequency.setValueAtTime(opts.filterStart || 800, a.currentTime);
  filter.frequency.exponentialRampToValueAtTime(opts.filterEnd || 3000, a.currentTime+dur*0.6);
  filter.Q.value = opts.q || 5;
  // Dual oscillators for richness — fundamental + octave
  const o1 = a.createOscillator();
  const o2 = a.createOscillator();
  o1.type = opts.type || 'sawtooth';
  o2.type = opts.type2 || 'square';
  o1.frequency.setValueAtTime(freq, a.currentTime);
  o2.frequency.setValueAtTime(freq*(opts.octave||2), a.currentTime);
  if(opts.slide){
    o1.frequency.exponentialRampToValueAtTime(Math.max(20,freq+opts.slide), a.currentTime+dur);
    o2.frequency.exponentialRampToValueAtTime(Math.max(20,(freq+opts.slide)*(opts.octave||2)), a.currentTime+dur);
  }
  const gainMix = a.createGain();
  gainMix.gain.value = opts.mix || 0.5;
  o1.connect(filter); o2.connect(gainMix); gainMix.connect(filter);
  filter.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(0, a.currentTime);
  g.gain.linearRampToValueAtTime(opts.vol||0.18, a.currentTime+0.01);
  g.gain.exponentialRampToValueAtTime(0.0005, a.currentTime+dur);
  o1.start(); o2.start();
  o1.stop(a.currentTime+dur); o2.stop(a.currentTime+dur);
}
// Noise burst (for explosions, damage, shatter)
function noise(dur, vol, filterFreq, slide){
  const a=ac();if(!a)return;
  const bufSize = Math.floor(a.sampleRate * dur);
  const buf = a.createBuffer(1, bufSize, a.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1) * (1 - i/bufSize);
  const src = a.createBufferSource();
  src.buffer = buf;
  const filter = a.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(filterFreq||800, a.currentTime);
  if(slide) filter.frequency.exponentialRampToValueAtTime(Math.max(50,filterFreq+slide), a.currentTime+dur);
  const g = a.createGain();
  g.gain.setValueAtTime(vol||0.2, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0005, a.currentTime+dur);
  src.connect(filter); filter.connect(g); g.connect(a.destination);
  src.start();
}
function sfx(n){
  // Trigger native haptics when running on device
  try { if(window.nativeHaptic && window.nativeHaptic[n]) window.nativeHaptic[n](); } catch(e){}
  try{
    if(n==='jump'){
      richTone(300, 0.14, {type:'sawtooth', type2:'sine', octave:2, mix:0.4, vol:0.14, slide:250, filterStart:600, filterEnd:2200, q:6});
    }
    else if(n==='djump'){
      richTone(500, 0.12, {type:'sawtooth', type2:'square', octave:2, mix:0.5, vol:0.13, slide:400, filterStart:900, filterEnd:3400, q:8});
    }
    else if(n==='coin'){
      beep(1100, 0.06, 'triangle', 0.14);
      setTimeout(()=>beep(1650, 0.08, 'triangle', 0.12), 45);
    }
    else if(n==='gem'){
      richTone(1100, 0.1, {type:'triangle', type2:'sine', octave:1.5, mix:0.5, vol:0.15, filterStart:1500, filterEnd:3800});
      setTimeout(()=>richTone(1650, 0.12, {type:'triangle', type2:'sine', octave:1.5, mix:0.5, vol:0.13, filterStart:2000, filterEnd:4500}), 55);
      setTimeout(()=>richTone(2200, 0.15, {type:'sine', type2:'triangle', octave:2, mix:0.4, vol:0.1, filterStart:2500, filterEnd:5000}), 120);
    }
    else if(n==='water'){
      richTone(480, 0.22, {type:'sine', type2:'sine', octave:2.5, mix:0.3, vol:0.16, slide:-220, filterStart:800, filterEnd:400, q:4});
    }
    else if(n==='ice'){
      richTone(720, 0.16, {type:'triangle', type2:'square', octave:1.5, mix:0.25, vol:0.15, slide:350, filterStart:1200, filterEnd:3200, q:7});
      setTimeout(()=>beep(1400, 0.1, 'sine', 0.08), 40);
    }
    else if(n==='hit'){
      noise(0.25, 0.28, 1000, -600);
      beep(120, 0.2, 'sawtooth', 0.22, -50);
    }
    else if(n==='stomp'){
      noise(0.06, 0.18, 2500, -1500);
      beep(210, 0.08, 'square', 0.2);
      setTimeout(()=>beep(420, 0.1, 'square', 0.15), 45);
    }
    else if(n==='boom'){
      noise(0.5, 0.35, 600, -400);
      beep(65, 0.5, 'sawtooth', 0.3);
      setTimeout(()=>beep(38, 0.4, 'sawtooth', 0.24), 80);
    }
    else if(n==='ui'){
      beep(720, 0.05, 'triangle', 0.1);
      setTimeout(()=>beep(1050, 0.04, 'sine', 0.08), 25);
    }
    else if(n==='power'){
      richTone(440, 0.1, {type:'sawtooth', type2:'square', mix:0.5, vol:0.15, filterStart:600, filterEnd:3000, q:8});
      setTimeout(()=>richTone(660, 0.1, {type:'sawtooth', type2:'square', mix:0.5, vol:0.15, filterStart:900, filterEnd:4000, q:8}), 80);
      setTimeout(()=>richTone(880, 0.15, {type:'triangle', type2:'square', mix:0.4, vol:0.15, filterStart:1400, filterEnd:5200, q:8}), 160);
    }
    else if(n==='combo'){
      beep(800+Math.random()*500, 0.08, 'triangle', 0.13);
    }
    else if(n==='warn'){
      richTone(200, 0.17, {type:'sawtooth', type2:'sawtooth', octave:1.02, mix:0.5, vol:0.2, filterStart:400, filterEnd:1200, q:3});
      setTimeout(()=>richTone(180, 0.17, {type:'sawtooth', type2:'sawtooth', octave:1.02, mix:0.5, vol:0.2, filterStart:400, filterEnd:1200, q:3}), 180);
    }
    else if(n==='wave'){
      noise(0.6, 0.22, 400, -200);
      beep(160, 0.4, 'sawtooth', 0.22, -80);
    }
  }catch(e){}
}

let lastTap = 0;

function canvasCoords(e){
  const rect = cv.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width * W;
  const y = (e.clientY - rect.top)  / rect.height * H;
  return {x,y};
}

function hit(x,y, bx,by,bw,bh){ return x>=bx && x<=bx+bw && y>=by && y<=by+bh; }

// UI button registry — filled per-frame by draw fns, cleared each render
const UI = { buttons: [] };
function addButton(id, x, y, w, h){ UI.buttons.push({id,x,y,w,h}); }
function buttonAt(px, py){
  for(let i=UI.buttons.length-1;i>=0;i--){
    const b=UI.buttons[i];
    if(hit(px,py,b.x,b.y,b.w,b.h)) return b.id;
  }
  return null;
}

function onTap(px,py){
  ac(); // unlock audio on first tap
  if(G.state==='menu'){
    const bid = buttonAt(px,py);
    if(bid==='play'){ startGame(); return; }
    if(bid==='shop'){ G.state='shop'; sfx('ui'); return; }
    if(bid==='skins'){ G.state='skins'; sfx('ui'); return; }
    if(bid==='daily'){ claimDaily(); return; }
    startGame();
  }
  else if(G.state==='shop'){
    const bid = buttonAt(px,py);
    if(bid==='back'){ G.state='menu'; sfx('ui'); return; }
    if(bid && bid.startsWith('buy_')){ buyUpgrade(bid.slice(4)); return; }
  }
  else if(G.state==='skins'){
    const bid = buttonAt(px,py);
    if(bid==='back'){ G.state='menu'; sfx('ui'); return; }
    if(bid && bid.startsWith('skin_')){ selectOrBuySkin(bid.slice(5)); return; }
  }
  else if(G.state==='play'){
    if(G.tutModal){ dismissTutorial(); return; }
    if(B.grounded || B.coyote>0){
      B.vy = -14.5;
      B.grounded = false;
      B.jumps = 1;
      B.jumpHeld = true;
      B.jumpStart = G.t;
      B.coyote = 0;
      // Squash horizontally, stretch vertically = "launch"
      B.squashX = 0.8; B.squashY = 1.25;
      B.trail.length = 0;
      sfx('jump');
      spawnDustPuff(B.x, B.y+B.r);
    }
    else if(B.jumps < 2){
      B.vy = -13;
      B.jumps = 2;
      B.squashX = 0.75; B.squashY = 1.3;
      sfx('djump');
      spawnBurst(B.x, B.y+20, C.bombPink, 10);
      G.shockwaves.push({x:B.x, y:B.y+10, r:8, maxR:60, life:1, color:C.bombPink});
    }
    // TRIPLE JUMP — 3rd tap in air for maximum altitude
    else if(B.jumps < 3){
      B.vy = -11.5;
      B.jumps = 3;
      B.squashX = 0.7; B.squashY = 1.35;
      sfx('djump'); setTimeout(()=>sfx('combo'), 60);
      spawnBurst(B.x, B.y+20, C.water, 10);
      spawnBurst(B.x, B.y+10, C.coinHi, 10);
      // Dual-color ring (cyan + gold)
      G.shockwaves.push({x:B.x, y:B.y+6, r:8, maxR:70, life:1, color:C.water});
      G.shockwaves.push({x:B.x, y:B.y+6, r:14, maxR:95, life:1, color:C.coinHi});
      popup(B.x, B.y-70, 'TRIPLE!', C.coinHi, 1.25);
    }
    // GROUND POUND — unlocks at World 3
    else if(G.world >= UNLOCK.groundPound && !B.pounding && B.y < GND - B.r - 40){
      B.vy = 22;
      B.pounding = true;
      B.squashX = 0.7; B.squashY = 1.4;
      sfx('djump');
      spawnBurst(B.x, B.y, C.fireHi, 12);
      // downward trail burst
      for(let k=0;k<6;k++){
        G.particles.push({
          x: B.x+rand(-10,10), y: B.y,
          vx: rand(-1,1), vy: rand(-2, 0),
          life: 1, max: 22,
          color: k%2 ? C.fireHi : C.fire,
          size: rand(3,5), g: 0.02, shape:'circle',
        });
      }
    }
    else {
      B.jumpBuffer = 160;
    }
  }
  else if(G.state==='gameover'){
    const bid = buttonAt(px,py);
    if(bid==='home'){ G.state='menu'; sfx('ui'); return; }
    if(bid==='revive'){ revive(); return; }
    // Tapping anywhere else does nothing — must choose CONTINUE or HOME
  }
}

function onRelease(){ B.jumpHeld = false; }

// Swipe detection state
let swipeStart = null;
cv.addEventListener('pointerdown', (e)=>{
  e.preventDefault();
  const p = canvasCoords(e);
  swipeStart = { x:p.x, y:p.y };
  onTap(p.x, p.y);
});
cv.addEventListener('pointermove', (e)=>{
  if(!swipeStart) return;
  const p = canvasCoords(e);
  const dy = p.y - swipeStart.y;
  const dx = Math.abs(p.x - swipeStart.x);
  // Down swipe (>70px down, less than 80px horizontal drift) triggers smash
  if(dy > 70 && dx < 90 && G.state==='play' && !B.grounded && G.smash > 0 && !B.pounding){
    triggerSmash();
    swipeStart = null;
  }
});
cv.addEventListener('pointerup',   (e)=>{ e.preventDefault(); swipeStart = null; onRelease(); });
cv.addEventListener('pointercancel', ()=>{ swipeStart = null; onRelease(); });
window.addEventListener('keydown', (e)=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); onTap(W/2, H-200); }
  else if(e.code==='ArrowDown'||e.code==='KeyS'){
    e.preventDefault();
    if(G.state==='play' && !B.grounded && G.smash > 0 && !B.pounding){
      triggerSmash();
    }
  }
});
window.addEventListener('keyup', (e)=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ onRelease(); }
});

const rand = (a,b)=>a+Math.random()*(b-a);
const clamp = (v,a,b)=>v<a?a:v>b?b:v;
const lerp = (a,b,t)=>a+(b-a)*t;
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}
function spawnBurst(x,y,color,n){
  // -20% spark count (rounded down, min 1)
  const actualN = Math.max(1, Math.floor(n * 0.8));
  for(let i=0;i<actualN;i++){
    G.particles.push({
      x,y, vx: rand(-4,4), vy: rand(-6,-1),
      life: 1, max: rand(25,45),
      color, size: rand(2,5), g: 0.3, shape: 'circle',
    });
  }
}
function spawnConfetti(x,y){
  const cols=['#ff4db8','#ffd54a','#4dd0ff','#c77dff','#ffffff'];
  for(let i=0;i<24;i++){
    G.particles.push({
      x,y, vx:rand(-7,7),vy:rand(-10,-2),
      life:1, max:rand(50,90),
      color:cols[i%cols.length], size:rand(3,6), g:0.35,
      shape:'rect', rot:rand(0,6.28), vr:rand(-0.4,0.4),
    });
  }
}
function popup(x,y,text,color,scale=1){
  G.popups.push({x,y,text,color,life:1,max:60,vy:-2,scale});
}
function spawnCoinBurst(x, y, count){
  // Mini physics coins that fly out and settle, collectable
  for(let i=0;i<count;i++){
    const a = (i/count)*Math.PI*2 + rand(-0.2,0.2);
    G.collects.push({
      kind:'coin',
      x, y, baseY: y, r: 14, t: Math.random()*6,
      vx: Math.cos(a)*rand(3,6), vy: rand(-9,-4),
      physics: true,
    });
  }
}
function triggerSmash(){
  if(G.smash<=0 || B.grounded || B.pounding) return;
  G.smash -= 1;
  B.vy = 26; // super fast fall
  B.pounding = true;
  B.smashFromItem = true; // marks for bigger AOE on impact
  B.squashX = 0.6; B.squashY = 1.5;
  G.shake = 8;
  sfx('djump'); setTimeout(()=>sfx('warn'), 80);
  popup(B.x, B.y-40, 'SMASH!', '#ff6a40', 1.5);
  // Intense fire trail at start
  for(let k=0; k<14; k++){
    G.particles.push({
      x:B.x+rand(-14,14), y:B.y,
      vx:rand(-2,2), vy:rand(-4,-1),
      life:1, max:26,
      color: k%2 ? C.fireHi : '#ffd54a',
      size:rand(3,7), g:0, shape:'circle',
    });
  }
  G.shockwaves.push({x:B.x, y:B.y, r:6, maxR:70, life:1, color:C.fireHi});
}
function shieldShatter(){
  // Dramatic shatter: polygon fragments + AOE clears nearby obstacles
  G.flash = 0.7;
  G.shake = 18;
  // Expanding double shockwave
  G.shockwaves.push({x:B.x, y:B.y, r:B.r+10, maxR:200, life:1, color:'#e0f4ff'});
  G.shockwaves.push({x:B.x, y:B.y, r:B.r+5, maxR:140, life:1, color:'#ffffff'});
  // 16 glass-like fragments flying outward
  for(let i=0;i<16;i++){
    const a = (i/16)*Math.PI*2;
    const spd = rand(5, 10);
    G.particles.push({
      x:B.x+Math.cos(a)*B.r, y:B.y+Math.sin(a)*B.r,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd - 2,
      life:1, max:rand(28,42),
      color: i%3===0 ? '#ffffff' : (i%3===1 ? '#b8e4ff' : '#60b0e8'),
      size:rand(3,6), g:0.18, shape:'rect', rot:rand(0,6.28), vr:rand(-0.5,0.5),
    });
  }
  // AOE — destroy nearby obstacles & enemies with reward (preserve mystery/bouncer)
  let cleared = 0;
  for(let j=G.obstacles.length-1;j>=0;j--){
    const o = G.obstacles[j];
    if(o.mystery || o.bouncer) continue;
    if(Math.abs((o.x+o.w/2) - B.x) < 180){
      spawnBurst(o.x+o.w/2, o.y+o.h/2, '#ffffff', 12);
      G.obstacles.splice(j,1);
      cleared++;
    }
  }
  for(let j=G.enemies.length-1;j>=0;j--){
    const e = G.enemies[j];
    if(Math.abs((e.x+e.w/2) - B.x) < 180){
      spawnBurst(e.x+e.w/2, e.y+e.h/2, '#ffffff', 14);
      G.runCoins += e.reward || 1;
      G.enemies.splice(j,1);
      cleared++;
    }
  }
  G.shieldMax = 0;
  popup(B.x, B.y-90, 'SHIELD SHATTERED!', '#e0f4ff', 1.5);
  if(cleared > 0) popup(B.x, B.y-60, 'AOE: '+cleared+' cleared', '#fff', 1.1);
  sfx('boom');
}

// ============================================================================
//  AMBIENT ENVIRONMENT PARTICLES — world-flavored atmosphere
//  Types: stardust (all), snow (W2), ember (W3/W6), acid (W4), neon (W7)
//         ice crystals (W2 accent), void whispers (W5), glow motes (W8)
// ============================================================================
function spawnAmbient(){
  if(G.ambient.length > 60) return; // cap for perf

  const cw = currentWorld();

  if(Math.random() < 0.35){
    G.ambient.push({
      type:'stardust',
      x: W + 10, y: rand(80, GND-40),
      vx: rand(-0.9, -0.3), vy: rand(-0.15, 0.15),
      size: rand(0.8, 1.8), life: 1, max: rand(280, 460),

      phase: Math.random()*Math.PI*2,

  if(w===2 && Math.random() < 0.55){

      size: rand(1.5, 3.2), life: 1, max: rand(320, 520),

  // W4 — acid drops falling (+ upward bubbles)

    if(Math.random() < 0.35){

        type:'acid',

        vx: rand(-0.6, -0.2), vy: rand(1.8, 3.0),
        size: rand(1.8, 3.2), life: 1, max: rand(180, 260),
      });

    if(Math.random() < 0.25){
      G.ambient.push({
        type:'bubble',
        x: rand(0, W), y: GND - rand(-20, 30),
        vx: rand(-0.8, -0.2), vy: rand(-0.8, -0.3),
        size: rand(1.5, 3), life: 1, max: rand(220, 340),
      });
    }
  }
  // W5 — void whispers (faint fading wisps)
  if(w===5 && Math.random() < 0.25){
    G.ambient.push({
      type:'void',
      x: W + 10, y: rand(60, GND-40),
      vx: rand(-1.1, -0.5), vy: rand(-0.3, 0.3),
      size: rand(2, 5), life: 1, max: rand(200, 340),
      phase: Math.random()*Math.PI*2,
    });
  }
  // W7 — neon glitch (horizontal flickers + digital rain)
  if(w===7){
    if(Math.random() < 0.45){
      G.ambient.push({
        type:'neon',
        x: W + 8, y: rand(40, GND-40),
        vx: rand(-1.8, -0.8), vy: 0,
        size: rand(8, 22), life: 1, max: rand(40, 90),
        color: Math.random()<0.5 ? 'rgba(255,40,230,' : 'rgba(40,220,255,',
        flicker: Math.random(),
      });
    }
    if(Math.random() < 0.3){
      G.ambient.push({
        type:'digital',
        x: rand(0, W), y: -5,
        vx: 0, vy: rand(2.4, 4),
        size: rand(1, 2), life: 1, max: rand(80, 140),
        color: Math.random()<0.5 ? 'rgba(40,255,180,' : 'rgba(255,80,200,',
      });
    }
  }
  // W8 — glowing motes (deep sea jellies)
  if(w===8 && Math.random() < 0.3){
    G.ambient.push({
      type:'mote',
      x: W + 10, y: rand(100, GND-40),
      vx: rand(-0.7, -0.3), vy: rand(-0.2, 0.2),
      size: rand(2, 4), life: 1, max: rand(250, 380),
      color: Math.random()<0.5 ? 'rgba(100,255,200,' : 'rgba(140,200,255,',
      phase: Math.random()*Math.PI*2,
    });
  }
  // W9 — ruby shards drifting
  if(w===9 && Math.random() < 0.3){
    G.ambient.push({
      type:'ruby',
      x: W + 10, y: rand(60, GND-40),
      vx: rand(-1.4, -0.6), vy: rand(-0.2, 0.5),

  // W10 — golden sparks (royal endgame)
  if(w===10 && Math.random() < 0.35){

      type:'golden',

      vx: rand(-1.4, -0.6), vy: rand(-0.4, 0.1),

function updateAmbient(){
  spawnAmbient();
  for(let i=G.ambient.length-1; i>=0; i--){
    const p = G.ambient[i];
    p.x += p.vx; p.y += p.vy;
    if(p.phase !== undefined) p.phase += 0.03;
    if(p.rot !== undefined) p.rot += p.vr||0;
    p.life -= 1/p.max;
    // slight horizontal drift sway for floaters
    if(p.type==='stardust' || p.type==='mote' || p.type==='golden' || p.type==='void'){
      p.y += Math.sin(p.phase)*0.25;
    }
    if(p.type==='snow'){
      p.x += Math.sin(G.t*0.003 + p.rot)*0.3; // wind drift
    }
    if(p.type==='ember'){
      p.x += Math.sin(G.t*0.006 + p.phase)*0.4;
    }
    if(p.life<=0 || p.x<-30 || p.y>H+30 || p.y<-30) G.ambient.splice(i,1);
  }
}

function drawAmbient(){
  for(const p of G.ambient){
    ctx.save();
    const a = Math.max(0, Math.min(1, p.life)) * Math.min(1, (1-p.life)*4 + 0.4);
    if(p.type==='stardust'){
      ctx.globalAlpha = a*0.6;
      const twink = 0.6 + Math.sin(p.phase)*0.4;
      ctx.fillStyle = p.color + (twink*0.9).toFixed(2) + ')';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
    }
    else if(p.type==='snow'){
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      // 6-pointed snowflake simplified as cross
      ctx.strokeStyle = `rgba(240,250,255,${a})`;
      ctx.lineWidth = 1;
      ctx.lineCap = 'round';
      for(let i=0; i<3; i++){
        const ang = i*Math.PI/3;
        ctx.beginPath();
        ctx.moveTo(-Math.cos(ang)*p.size, -Math.sin(ang)*p.size);
        ctx.lineTo(Math.cos(ang)*p.size, Math.sin(ang)*p.size);
        ctx.stroke();
      }
      ctx.fillStyle = `rgba(255,255,255,${a})`;
      ctx.beginPath(); ctx.arc(0,0,p.size*0.3,0,Math.PI*2); ctx.fill();
    }
    else if(p.type==='ember'){
      ctx.globalCompositeOperation='lighter';
      const pulse = 0.7 + Math.sin(p.phase)*0.3;
      const r = p.size * pulse;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r*3);
      g.addColorStop(0, `rgba(255,200,80,${a*0.9})`);
      g.addColorStop(0.5, `rgba(255,120,40,${a*0.5})`);
      g.addColorStop(1, 'rgba(255,80,20,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, r*2.5, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255,240,180,${a})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, r*0.45, 0, Math.PI*2); ctx.fill();
    }
    else if(p.type==='acid'){
      ctx.globalAlpha = a*0.8;
      // teardrop
      ctx.fillStyle = 'rgba(160,255,80,0.9)';
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.size*0.7, p.size*1.3, 0, 0, Math.PI*2);
      ctx.fill();
      // glow
      ctx.globalCompositeOperation='lighter';
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size*2);
      g.addColorStop(0, `rgba(180,255,100,${a*0.6})`);
      g.addColorStop(1, 'rgba(180,255,100,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*2, 0, Math.PI*2); ctx.fill();
      // highlight
      ctx.globalCompositeOperation='source-over';
      ctx.fillStyle = `rgba(255,255,255,${a*0.8})`;
      ctx.beginPath(); ctx.arc(p.x-p.size*0.2, p.y-p.size*0.4, p.size*0.3, 0, Math.PI*2); ctx.fill();
    }
    else if(p.type==='bubble'){
      ctx.globalAlpha = a*0.5;
      ctx.strokeStyle = 'rgba(200,255,200,0.7)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.beginPath(); ctx.arc(p.x-p.size*0.3, p.y-p.size*0.3, p.size*0.25, 0, Math.PI*2); ctx.fill();
    }
    else if(p.type==='void'){
      ctx.globalCompositeOperation='lighter';
      ctx.globalAlpha = a*0.5;
      const wisp = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size*4);
      wisp.addColorStop(0, 'rgba(220,200,255,0.4)');
      wisp.addColorStop(1, 'rgba(180,160,220,0)');
      ctx.fillStyle = wisp;
      ctx.beginPath(); ctx.ellipse(p.x, p.y, p.size*4, p.size*1.5, Math.sin(p.phase)*0.4, 0, Math.PI*2); ctx.fill();
    }
    else if(p.type==='neon'){
      ctx.globalCompositeOperation='lighter';
      const flk = p.flicker < 0.7 ? 1 : Math.sin(G.t*0.1+p.flicker*10)*0.5+0.5;
      ctx.globalAlpha = a*flk;
      ctx.strokeStyle = p.color + `${(a*0.8).toFixed(2)})`;
      ctx.lineWidth = 1.5;
      ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+p.size, p.y); ctx.stroke();
      // glow
      ctx.strokeStyle = p.color + `${(a*0.3).toFixed(2)})`;
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x+p.size, p.y); ctx.stroke();
    }
    else if(p.type==='digital'){
      ctx.globalAlpha = a*0.8;
      ctx.fillStyle = p.color + `${a.toFixed(2)})`;
      ctx.fillRect(p.x, p.y, 1, p.size*3);
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle = p.color + `${(a*0.3).toFixed(2)})`;
      ctx.fillRect(p.x-1, p.y, 3, p.size*3);
    }
    else if(p.type==='mote'){
      ctx.globalCompositeOperation='lighter';
      const pulse = 0.6 + Math.sin(p.phase)*0.4;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size*3);
      g.addColorStop(0, p.color + `${(a*pulse).toFixed(2)})`);
      g.addColorStop(1, p.color + '0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,'+(a*pulse).toFixed(2)+')';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.5, 0, Math.PI*2); ctx.fill();
    }
    else if(p.type==='ruby'){
      ctx.globalAlpha = a;
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = 'rgba(255,60,100,0.85)';
      ctx.beginPath();
      ctx.moveTo(0, -p.size);
      ctx.lineTo(p.size, 0);
      ctx.lineTo(0, p.size);
      ctx.lineTo(-p.size, 0);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      ctx.moveTo(0, -p.size);
      ctx.lineTo(p.size*0.3, -p.size*0.3);
      ctx.lineTo(-p.size*0.3, -p.size*0.3);
      ctx.closePath();
      ctx.fill();
    }
    else if(p.type==='golden'){
      ctx.globalCompositeOperation='lighter';
      const pulse = 0.6 + Math.sin(p.phase)*0.4;
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size*3);
      g.addColorStop(0, `rgba(255,230,90,${a*0.9})`);
      g.addColorStop(0.5, `rgba(255,180,40,${a*0.4})`);
      g.addColorStop(1, 'rgba(255,140,20,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*3*pulse, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = `rgba(255,255,220,${a})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.45, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function startGame(){
  G.state='play';
  G.t=0; G.frame=0; G.distance=0;
  G.world = 1;
  const w = WORLDS[0];
  G.baseSpeed = w.base; G.maxSpeed = w.max; G.accel = w.accel;
  G.fuseDrain = w.drain * (1 - 0.03*G.upgrades.slowBurn);
  G.speed = w.base;
  G.combo=0; G.comboTime=0; G.bestCombo=0;
  G.runCoins=0; G.runGems=0;
  G.fuse = Math.min(100, 100 + G.upgrades.startFuse*5); // can start >100 visually, capped at 100
  G.fuse = 100 + G.upgrades.startFuse*5;                  // allow overcharge bar
  G.shake=0; G.flash=0;
  G.shield=0; G.shieldMax=0; G.shieldImpact=0; G.magnet=0; G.dbl=0; G.rocket=0; G.slowmo=0; G.smash=0;
  G.obstacles=[]; G.collects=[]; G.particles=[]; G.popups=[]; G.embers=[]; G.enemies=[]; G.shockwaves=[];
  G.spawnT=30; G.enemyT=1200;
  G.lastShockCombo = 0;
  G.fever = 0; G.feverActive = false; G.feverTimer = 0;
  G.coinRushActive = false; G.coinRushTimer = 0; G.coinRushSpawn = 0; G.nextCoinRushAt = 1800;
  G.coinMilestone = 0;
  G.runAch = {};
  G.runStomps = 0;
  G.supergiftSpawned = false;
  G.nearMissStreak = 0;
  G.countdown = 3000; // 3 seconds countdown
  G.countdownLabel = '3';
  // W1 welcome gift — big rainbow super-sparkle at 250m as an addictive "wow" pickup
  setTimeout(()=>{
    if(G.state==='play' && G.world===1 && !G.supergiftSpawned){
      G.supergiftSpawned = true;
      G.collects.push({kind:'supersparkle', x:W+60, y:GND-170, baseY:GND-170, r:34, t:0});
    }
  }, 4500);
  G.rage=false;
  G.transition=1;
  G.tutTimer=180;
  G.bossWarn=0; G.bossActive=false; G.bossTimer=0; G.bossSurvived=0;
  G.nextBossAt = 600;
  G.bossWaveX = -300;
  B.x=W*0.22; B.y=GND-B.r-8; B.vy=0; B.grounded=true; B.jumps=0;
  B.jumpBuffer=0; B.coyote=0; B.jumpHeld=false;
  B.squashX=1; B.squashY=1; B.trail=[];
  B.stompChain=0; B.pounding=false; B.smashFromItem=false;
  B.alive=true; B.rot=0; B.expression='run'; B.iframes=0;
  G.tutModal = null;
  G.tutQueue = [];
  G.practice = [];
  // Initial jump tutorial — delayed until after countdown completes
  if(!G.seen.jump){
    setTimeout(() => {
      if(G.state==='play'){
        showTutorial('jump', true);
        if(!G.seen.doubleJump){
          setTimeout(()=>{ if(!G.tutModal && G.state==='play') showTutorial('doubleJump', true); }, 50);
        }
      }
    }, 3400);
  }
  sfx('ui');
}

function endGame(){
  G.state='gameover';
  G.transition=0;
  const earned = G.runCoins + Math.floor(G.distance/50);
  G.totalCoins += earned; save('br_coins', G.totalCoins);
  G.totalGems += G.runGems; save('br_gems', G.totalGems);
  if(Math.floor(G.distance) > G.high){ G.high = Math.floor(G.distance); save('br_high', G.high); }
  G.xp += Math.floor(G.distance/10) + G.runCoins;
  while(G.xp >= G.xpMax){ G.xp -= G.xpMax; G.level++; G.xpMax = Math.floor(G.xpMax*1.15); }
  save('br_xp', G.xp); save('br_xpmax', G.xpMax); save('br_level', G.level);
  sfx('boom');
  G.shake = 18;
}

function showTutorial(key, skipPractice){
  if(!key || G.seen[key]) return false;
  const info = TUTORIALS[key];
  if(!info) return false;
  G.seen[key] = true;
  save('br_seen', G.seen);
  if(!skipPractice){
    const practiceKeys = ['coal','firepit','saw','chili','spikes','bouncer','mystery','ember','minibomb','match','ufo','spikehead',
                          'col_coin','col_gem','col_water','col_ice','col_shield','col_magnet','col_rocket','col_dbl','col_slowmo','col_smash'];
    if(practiceKeys.includes(key)) G.practice.push(key, key, key);
  }
  G.tutQueue.push(key);
  if(!G.tutModal) processNextTutorial();
  return true;
}
function processNextTutorial(){
  if(G.tutModal || G.tutQueue.length===0) return;
  const key = G.tutQueue.shift();
  const info = TUTORIALS[key];
  if(info){
    G.tutModal = { ...info, key };
    sfx('ui');
  } else {
    processNextTutorial();
  }
}
function dismissTutorial(){
  G.tutModal = null;
  sfx('ui');
  setTimeout(()=>{ if(!G.tutModal && G.state==='play') processNextTutorial(); }, 180);
}

// In-run achievement unlocks (one per run)
const RUN_ACHIEVEMENTS = [
  { id:'sprinter',     check:()=>G.distance>=500,       title:'SPRINTER!',      desc:'500m reached',      reward:'+10 ✨',    fx:()=>{ G.runCoins+=10; } },
  { id:'sparkHoard',   check:()=>G.runCoins>=100,       title:'SPARK HOARDER!', desc:'100 sparks caught', reward:'+15 FUSE',   fx:()=>{ G.fuse=Math.min(120,G.fuse+15); } },
  { id:'stompMaster',  check:()=>G.runStomps>=10,       title:'STOMP MASTER!',  desc:'10 enemies BONKed', reward:'+2 💎',      fx:()=>{ G.runGems+=2; } },
  { id:'marathoner',   check:()=>G.distance>=2000,      title:'MARATHONER!',    desc:'2000m reached',     reward:'+20 ✨',    fx:()=>{ G.runCoins+=20; } },
  { id:'perfectCombo', check:()=>G.bestCombo>=10,       title:'PERFECT COMBO!', desc:'x10 combo chain',   reward:'+25 FUSE',   fx:()=>{ G.fuse=Math.min(120,G.fuse+25); } },
  { id:'explorer',     check:()=>G.world>=2,            title:'EXPLORER!',      desc:'Reached new world', reward:'+3 💎',      fx:()=>{ G.runGems+=3; } },
];
function checkRunAchievements(){
  for(const a of RUN_ACHIEVEMENTS){
    if(!G.runAch[a.id] && a.check()){
      G.runAch[a.id] = true;
      a.fx();
      G.shockwaves.push({x:B.x, y:B.y-20, r:15, maxR:180, life:1, color:C.coinHi});
      spawnConfetti(B.x, B.y-40);
      popup(W/2, H*0.35-8, '🏅 '+a.title, C.coinHi, 1.7);
      popup(W/2, H*0.35+22, a.desc, '#fff', 1.0);
      popup(W/2, H*0.35+50, a.reward, C.gem, 1.2);
      G.flash = 0.4;
      sfx('power');
    }
  }
}
// Called every frame during play — detects new elements approaching
function checkForNewElementTutorials(){
  if(G.tutModal) return;
  // Enemies (check first — show stomp indicator context)
  for(const e of G.enemies){
    const dx = e.x - B.x;
    if(dx > 40 && dx < 340 && !G.seen[e.kind]){
      if(showTutorial(e.kind)) return;
    }
  }
  // Obstacles
  for(const o of G.obstacles){
    const dx = o.x - B.x;
    if(dx > 40 && dx < 340 && !G.seen[o.kind]){
      if(showTutorial(o.kind)) return;
    }
  }
  // Collectibles (including power-ups)
  for(const c of G.collects){
    const key = 'col_' + c.kind;
    const dx = c.x - B.x;
    if(dx > 40 && dx < 300 && !G.seen[key]){
      if(showTutorial(key)) return;
    }
  }
}

function onWorldUp(){
  const w = WORLDS[G.world-1];
  // Apply new difficulty live
  G.baseSpeed = w.base;
  G.maxSpeed  = w.max;
  G.accel     = w.accel;
  G.fuseDrain = w.drain * (1 - 0.03*G.upgrades.slowBurn);
  // Show world-up once, then unlock-specific follow-up tutorials
  showTutorial('worldup', true);
  if(G.world === UNLOCK.groundPound) showTutorial('groundPound', true);
  if(G.world === UNLOCK.glide) showTutorial('glide', true);
  // Reward: full fuse refill + visual drama
  G.fuse = Math.min(120, G.fuse + 40);
  G.flash = 1;
  G.shake = 16;
  G.shockwaves.push({x:W/2, y:H/2, r:10, maxR:400, life:1, color:w.horizon});
  G.shockwaves.push({x:W/2, y:H/2, r:5, maxR:300, life:1, color:w.accent});
  spawnConfetti(W/2, H/2-30);
  spawnConfetti(W/2-80, H/2+20);
  spawnConfetti(W/2+80, H/2+20);
  popup(W/2, H/2-40, 'WORLD '+G.world, '#ffffff', 2.2);
  popup(W/2, H/2+10, w.emoji+' '+w.name.toUpperCase()+' '+w.emoji, w.accent, 1.4);
  popup(W/2, H/2+60, '+40 FUSE', C.water, 1.2);
  sfx('power');
  setTimeout(()=>sfx('combo'), 120);
  setTimeout(()=>sfx('power'), 240);
  // Persist highest world ever reached
  if(G.world > G.maxWorld){
    G.maxWorld = G.world;
    save('br_maxworld', G.maxWorld);
  }
}
function revive(){
  const cost = 5;
  if(G.totalGems < cost){ sfx('hit'); popup(W/2, H/2, 'NEED 5 GEMS', '#ff4466', 1.3); return; }
  G.totalGems -= cost; save('br_gems', G.totalGems);
  G.state = 'play';
  G.fuse = 100;
  G.shield = 3; G.shieldMax = 3; G.shieldImpact = 0; // grace shield
  B.alive = true;
  B.y = GND - B.r - 8;
  B.vy = 0;
  B.grounded = true;
  B.iframes = 180; // 3s invincibility
  G.shake = 14; G.flash = 1;
  // Clear immediate threats near player
  G.obstacles = G.obstacles.filter(o => o.x > B.x + 200 || o.x < B.x - 100);
  G.enemies = G.enemies.filter(e => e.x > B.x + 200 || e.x < B.x - 100);
  G.transition = 0.2;
  spawnConfetti(B.x, B.y);
  popup(B.x, B.y-100, 'REVIVE!', C.coinHi, 2.2);
  sfx('power');
}
function claimDaily(){
  popup(W/2, H/2, '+50 SPARKS', C.coinHi, 1.4);
  G.totalCoins += 50; save('br_coins', G.totalCoins);
  sfx('coin');
  spawnConfetti(W/2, H/2);
}

function buyUpgrade(key){
  const u = UPGRADES[key];
  const lvl = G.upgrades[key];
  if(lvl>=u.max){ sfx('hit'); return; }
  const cost = u.cost(lvl);
  if(G.totalCoins < cost){ sfx('hit'); popup(W/2, H/2, 'NOT ENOUGH SPARKS', '#ff4466', 1.2); return; }
  G.totalCoins -= cost;
  G.upgrades[key] = lvl+1;
  save('br_coins', G.totalCoins); save('br_up', G.upgrades);
  sfx('power'); spawnConfetti(W/2, H*0.6);
  popup(W/2, H*0.5, 'UPGRADED!', C.fuseHole, 1.4);
}

function selectOrBuySkin(key){
  const s = SKINS[key];
  if(G.ownedSkins.includes(key)){
    G.skin = key; save('br_skin', key); sfx('ui');
    popup(W/2, H*0.5, 'EQUIPPED', '#fff', 1.2);
  } else {
    if(s.cur==='coin'){
      if(G.totalCoins < s.cost){ sfx('hit'); popup(W/2, H/2, 'NOT ENOUGH SPARKS', '#ff4466', 1.2); return; }
      G.totalCoins -= s.cost; save('br_coins', G.totalCoins);
    } else {
      if(G.totalGems < s.cost){ sfx('hit'); popup(W/2, H/2, 'NOT ENOUGH GEMS', '#ff4466', 1.2); return; }
      G.totalGems -= s.cost; save('br_gems', G.totalGems);
    }
    G.ownedSkins.push(key); save('br_owned', G.ownedSkins);
    G.skin = key; save('br_skin', key);
    sfx('power'); spawnConfetti(W/2, H*0.5);
    popup(W/2, H*0.5, 'UNLOCKED!', C.coinHi, 1.4);
  }
}

// ============================================================================
//  UPDATE
// ============================================================================
function update(dt){
  G.frame++; G.t += dt;
  G.shake *= 0.88; G.flash *= 0.9;
  G.transition = Math.min(1, G.transition + dt/400);

  for(const s of G.bgStars) s.tw += 0.04;
  for(const c of G.bgClouds){
    c.x -= c.s * (G.state==='play'?1.4:0.3);
    if(c.x + c.w < 0){ c.x = W + 20; c.y = 80+Math.random()*200; }
  }
  // shooting stars (always animate)
  if(Math.random() < 0.006){
    G.shootingStars.push({
      x: W + 30, y: rand(20, H*0.4),
      vx: -rand(11, 17), vy: rand(1.5, 3),
      life: 1, trail: []
    });
  }
  for(let i=G.shootingStars.length-1; i>=0; i--){
    const s = G.shootingStars[i];
    s.trail.push({x:s.x, y:s.y});
    if(s.trail.length > 14) s.trail.shift();
    s.x += s.vx; s.y += s.vy;
    s.life -= 0.010;
    if(s.life<=0 || s.x<-100) G.shootingStars.splice(i,1);
  }
  // Ambient world-flavored particles (always-on atmosphere)
  updateAmbient();
  // Foreground debris parallax
  for(const d of G.fgDebris){
    const ps = G.state==='play' ? (2.5 + G.speed*0.85) : 1.3;
    d.x -= ps;
    d.y += d.vy;
    d.rot += d.vr;
    if(d.x < -d.s*3){
      d.x = W + d.s*2 + Math.random()*60;
      d.y = 80 + Math.random()*(H-180);
      d.s = 1.5 + Math.random()*4;
      d.op = 0.25 + Math.random()*0.5;
      d.type = Math.random()<0.35 ? 'rock' : 'spark';
      d.hue = Math.random()<0.5 ? '#4dd0ff' : '#ff4db8';
    }
  }
  if(G.state==='menu'){ G.menuT += dt; return; }
  if(G.state==='shop' || G.state==='skins'){ G.menuT += dt; return; }
  if(G.state==='gameover'){
    // update particles only
    for(let i=G.particles.length-1;i>=0;i--){
      const p=G.particles[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.life-=1/p.max;
      if(p.rot!==undefined){ p.rot+=p.vr||0; }
      if(p.life<=0) G.particles.splice(i,1);
    }
    for(let i=G.popups.length-1;i>=0;i--){
      const p=G.popups[i];
      p.y+=p.vy; p.vy*=0.96; p.life-=1/p.max;
      if(p.life<=0) G.popups.splice(i,1);
    }
    return;
  }
  if(G.tutTimer>0) G.tutTimer--;
  // Tutorial modal paused
  if(G.tutModal){
    G.tutPauseFade = Math.min(1, G.tutPauseFade + dt/250);
    return;
  } else {
    G.tutPauseFade = Math.max(0, G.tutPauseFade - dt/250);
  }
  // INTRO COUNTDOWN — freezes gameplay for 3 seconds at run start
  if(G.countdown > 0){
    const prevSec = Math.ceil(G.countdown/1000);
    G.countdown -= dt;
    const nextSec = Math.ceil(G.countdown/1000);
    if(nextSec !== prevSec){
      // new tick — play sound
      if(nextSec >= 1){
        G.countdownLabel = String(nextSec);
        sfx('ui');
      } else if(G.countdown > 0){
        G.countdownLabel = 'GO!';
        G.flash = 0.8;
        G.shake = 10;
        sfx('power');
        spawnConfetti(B.x, B.y);
      }
    }
    return; // pause all gameplay
  }
  // Detect new element approaching — may pause game
  checkForNewElementTutorials();
  if(G.tutModal) return;
  // Check run achievements (one-shot milestones)
  checkRunAchievements();
  if(B.iframes>0) B.iframes--;

  // speed/distance
  G.distance += G.speed * 0.18;
  G.speed = Math.min(G.maxSpeed, G.baseSpeed + G.distance*G.accel);

  // Boss trigger — only from W5 onwards
  if(G.world >= UNLOCK.boss && !G.bossActive && G.bossWarn<=0 && G.distance >= G.nextBossAt){
    G.bossWarn = 2500;
    showTutorial('boss', true);
    sfx('warn');
  }
  if(G.bossWarn>0){
    G.bossWarn -= dt;
    if(G.bossWarn<=0){
      G.bossActive = true;
      G.bossTimer = 12000;
      G.bossWaveX = -220;
      sfx('wave');
    }
  }
  if(G.bossActive){
    G.bossTimer -= dt;
    // Wave tracks a target position well BEHIND the player. Gap shrinks slowly
    // over the 12s from 280px to 110px — always stays back unless player gets hit.
    const bossProgress = 1 - (G.bossTimer/12000); // 0 → 1
    const targetX = B.x - 280 + bossProgress*170;
    G.bossWaveX += (targetX - G.bossWaveX) * 0.04;
    // Decay any surge-forward back toward target
    // (surges come from obstacle damage — see collision code)
    // Only if somehow wave gets too close, apply contact damage and push back
    if(G.bossWaveX > B.x - 30){
      if(B.iframes<=0 && G.shield<=0 && !B.pounding){
        G.fuse -= 18; G.shake=14; G.flash=0.7; sfx('hit');
        B.iframes = 60;
        G.bossWaveX = B.x - 180; // big push back
      } else {
        G.bossWaveX = B.x - 120;
      }
    }
    if(G.bossTimer<=0){
      G.bossActive = false;
      G.bossSurvived++;
      G.nextBossAt = Math.floor(G.distance) + 600;
      G.runCoins += 25; G.fuse = Math.min(100, G.fuse+40);
      popup(W/2, H/2-40, 'WAVE CLEARED!', C.coinHi, 1.6);
      popup(W/2, H/2+10, '+25 COINS • +40 FUSE', '#fff', 1.0);
      spawnConfetti(W/2, H/2);
      sfx('power');
    }
  }

  // Fuse drain
  G.fuse -= G.fuseDrain * (G.rocket>0 ? 0 : 1) * (G.bossActive?1.5:1);
  if(G.fuse > 100 && !G.rocket && G.shield<=0 && G.fuse>100) { /* allow overcharge */ }
  if(G.fuse > 120) G.fuse = 120;
  if(G.fuse < 25 && !G.rage){ G.rage=true; }
  if(G.fuse > 30 && G.rage){ G.rage=false; }
  if(G.fuse <= 0){ G.fuse=0; if(B.alive){ B.alive=false; explode(); endGame(); } }

  if(G.combo>0){
    G.comboTime -= dt;
    if(G.comboTime<=0){ G.combo=0; G.lastShockCombo=0; }
  }

  // Shield no longer ticks down — charge-based (only lost on hit)
  if(G.shieldImpact > 0) G.shieldImpact = Math.max(0, G.shieldImpact - dt/300);
  if(G.magnet>0) G.magnet -= dt/1000;
  if(G.dbl>0)    G.dbl    -= dt/1000;
  if(G.rocket>0) G.rocket -= dt/1000;
  // Slow-mo crystal effect — applied to world speed after speed update
  if(G.slowmo > 0){
    G.speed *= 0.4;
    G.slowmo -= dt/1000;
  }

  // Stomp Fever: when meter fills to 100 → auto-activate 5s super mode
  if(G.world >= UNLOCK.fever && G.fever >= 100 && !G.feverActive){
    G.feverActive = true;
    G.feverTimer = 5000;
    G.fever = 0;
    G.flash = 0.8;
    G.shake = 10;
    spawnConfetti(B.x, B.y);
    showTutorial('fever', true);
    if(!G.tutModal){
      popup(W/2, H/2-40, 'STOMP FEVER!', '#ffe0a0', 2.2);
      popup(W/2, H/2+4, 'INVINCIBLE • x2 COINS', '#fff', 1.1);
    }
    sfx('power');
  }
  // Coin Rush event — only from W4 onwards
  if(G.world >= UNLOCK.coinrush && !G.coinRushActive && G.distance >= G.nextCoinRushAt){
    G.coinRushActive = true;
    G.coinRushTimer = 5000;
    G.coinRushSpawn = 0;
    showTutorial('coinrush', true);
    if(!G.tutModal){
      popup(W/2, H/2-30, 'SPARK RUSH!', C.coinHi, 2.2);
      popup(W/2, H/2+10, 'Grab them all!', '#fff', 1.1);
    }
    spawnConfetti(W/2, H/2);
    G.flash = 0.6;
    sfx('power');
  }
  if(G.coinRushActive){
    G.coinRushTimer -= dt;
    G.coinRushSpawn -= dt;
    // Spawn clusters of coins from top falling down
    if(G.coinRushSpawn <= 0){
      const startX = W + rand(-20, 60);
      const startY = rand(80, 200);
      for(let k=0; k<3; k++){
        G.collects.push({
          kind:'coin',
          x: startX + k*28, y: startY + k*18,
          baseY: startY + k*18, r: 17, t: Math.random()*6,
          vx: rand(-3,1), vy: rand(-4,-1),
          physics: true,
        });
      }
      G.coinRushSpawn = 150 + Math.random()*120;
    }
    if(G.coinRushTimer <= 0){
      G.coinRushActive = false;
      G.nextCoinRushAt = Math.floor(G.distance) + 1200 + Math.random()*800; // next rush 1200-2000m away
      popup(W/2, H/2, 'RUSH END', C.coin, 1.2);
    }
  }

  if(G.feverActive){
    G.feverTimer -= dt;
    B.iframes = Math.max(B.iframes, 4);
    // Gold trail
    if(G.frame%2===0){
      G.particles.push({
        x: B.x+rand(-20,20), y: B.y+rand(-15,15),
        vx: rand(-2,2), vy: rand(-1,1),
        life: 1, max: 20,
        color: Math.random()<0.5 ? '#ffe070' : '#ff9030',
        size: rand(2,4), g: 0, shape:'circle',
      });
    }
    if(G.feverTimer<=0){
      G.feverActive = false;
      popup(B.x, B.y-80, 'FEVER END', '#ffd54a', 1.1);
    }
  }

  // Jump buffer + coyote timers
  if(B.jumpBuffer > 0) B.jumpBuffer -= dt;
  if(B.coyote > 0) B.coyote -= dt;

  // Variable jump hold (slightly longer window)
  if(B.jumpHeld && G.t - B.jumpStart < 280 && B.vy < 0) B.vy -= 0.55;
  // GLIDE — unlocks at World 4 (hold tap while falling)
  const isGliding = G.world >= UNLOCK.glide && B.jumpHeld && !B.grounded && !B.pounding && G.t - B.jumpStart > 280 && B.vy > 1;
  // Asymmetric gravity — floaty going up, snappy coming down (or soft if gliding)
  let gravity = isGliding ? 0.22 : (B.vy < 0 ? 0.58 : 0.95);
  B.vy += gravity;
  const maxFall = isGliding ? 3.5 : 17;
  if(B.vy > maxFall) B.vy = maxFall;
  B.y += B.vy;
  // Glide visual: sparkle wings + ambient dust
  if(isGliding && G.frame%3===0){
    G.particles.push({
      x: B.x+rand(-30,-15), y: B.y+rand(-5,8),
      vx: rand(-1,-3), vy: rand(-0.5, 0.5),
      life: 1, max: 22,
      color: 'rgba(255,255,255,0.7)',
      size: rand(1.5,3), g: 0.02, shape:'circle',
    });
    G.particles.push({
      x: B.x+rand(15,30), y: B.y+rand(-5,8),
      vx: rand(1,3), vy: rand(-0.5, 0.5),
      life: 1, max: 22,
      color: 'rgba(126,239,255,0.6)',
      size: rand(1.5,3), g: 0.02, shape:'circle',
    });
  }
  if(B.y >= GND - B.r - 8){
    const justLanded = !B.grounded;
    B.y = GND - B.r - 8;
    if(justLanded){
      spawnDustPuff(B.x, B.y+B.r);
      // Ground Pound impact → big shockwave + destroy nearby obstacles/enemies
      if(B.pounding){
        const isSmash = B.smashFromItem;
        const aoe = isSmash ? 190 : 140;
        G.shockwaves.push({x:B.x, y:B.y+B.r, r:18, maxR: isSmash? 280 : 220, life:1, color: isSmash? '#ffffff' : '#fff3a0'});
        G.shockwaves.push({x:B.x, y:B.y+B.r, r:10, maxR: isSmash? 180 : 120, life:1, color:C.fireHi});
        G.shake = isSmash ? 22 : 18;
        G.flash = isSmash ? 0.6 : 0.4;
        sfx('boom');
        for(let k=0;k<(isSmash?26:18);k++){
          G.particles.push({
            x:B.x, y:B.y+B.r,
            vx:rand(-10,10), vy:rand(-7,-1),
            life:1, max:rand(25,45),
            color: k%2?C.fireHi:'#ffd54a',
            size:rand(3,7), g:0.25, shape:'circle',
          });
        }
        for(let j=G.obstacles.length-1;j>=0;j--){
          const o = G.obstacles[j];
          // Preserve mystery boxes (loot!) and bouncers (useful pads)
          if(o.mystery || o.bouncer) continue;
          if(Math.abs((o.x+o.w/2) - B.x) < aoe){
            spawnBurst(o.x+o.w/2, o.y+o.h/2, C.fireHi, 14);
            popup(o.x+o.w/2, o.y-10, '+1', C.coin, 1);
            G.runCoins += 1;
            G.obstacles.splice(j,1);
          }
        }
        for(let j=G.enemies.length-1;j>=0;j--){
          const e = G.enemies[j];
          if(Math.abs((e.x+e.w/2) - B.x) < aoe){
            spawnBurst(e.x+e.w/2, e.y+e.h/2, e.color||C.fire, 16);
            popup(e.x+e.w/2, e.y, 'SMASH!', C.coinHi, 1.3);
            G.runCoins += e.reward || 2;
            G.enemies.splice(j,1);
          }
        }
        popup(B.x, B.y-50, isSmash ? 'SMASH BLAST!' : 'GROUND POUND!', C.fireHi, 1.5);
        B.pounding = false;
        B.smashFromItem = false;
      }
      else if(B.vy > 8){
        G.shockwaves.push({x:B.x, y:B.y+B.r, r:8, maxR:50, life:1, color:'rgba(255,255,255,0.8)'});
      }
      B.squashX = 1.3; B.squashY = 0.7;
      B.trail.length = 0;
    }
    B.vy = 0; B.grounded = true; B.jumps = 0;
    B.stompChain = 0;
    B.expression = 'run';
    // Buffered jump → auto-trigger on landing
    if(justLanded && B.jumpBuffer > 0){
      B.vy = -14.5;
      B.grounded = false;
      B.jumps = 1;
      B.jumpHeld = true;
      B.jumpStart = G.t;
      B.jumpBuffer = 0;
      B.squashX = 0.8; B.squashY = 1.25;
      sfx('jump');
      spawnDustPuff(B.x, B.y+B.r);
    }
    // Running ground sparks
    if(G.frame%4===0) spawnRunSparkle(B.x-18, B.y+B.r-2);
  } else {
    if(B.grounded) B.coyote = 100;
    B.grounded = false;
    B.expression = 'jump';
    // Afterimage trail while airborne
    if(G.frame%3===0){
      B.trail.push({x:B.x, y:B.y, life:1, sqX:B.squashX, sqY:B.squashY});
      if(B.trail.length > 6) B.trail.shift();
    }
  }
  // Update trail life
  for(let i=B.trail.length-1; i>=0; i--){
    B.trail[i].life -= 0.06;
    if(B.trail[i].life<=0) B.trail.splice(i,1);
  }
  // Lerp squash back to 1
  B.squashX = lerp(B.squashX, 1, 0.18);
  B.squashY = lerp(B.squashY, 1, 0.18);
  B.legPhase += 0.35;
  B.bob = Math.sin(B.legPhase*0.5) * 1.5;
  if(--B.blinkTimer <= 0){ B.blink = 8; B.blinkTimer = 120+Math.random()*120; }
  if(B.blink>0) B.blink--;

  if(G.frame%3===0 && B.alive){
    const fx = B.x+28, fy = B.y-58;
    G.embers.push({x:fx,y:fy,vx:rand(-1.5,1.5),vy:rand(-2.5,-0.8),life:1,max:40,size:rand(1.5,3.2)});
  }

  // World progression — advance every WORLD_LENGTH meters (cap at 10)
  const targetWorld = Math.min(10, Math.floor(G.distance / WORLD_LENGTH) + 1);
  if(targetWorld > G.world){
    G.world = targetWorld;
    onWorldUp();
  }

  // Spawning — uses current world's difficulty
  const cw = currentWorld();
  const difficultyNorm = Math.min(1, (G.distance % WORLD_LENGTH)/2000);
  const spawnInterval = lerp(cw.spawn[0], cw.spawn[1], difficultyNorm);
  G.spawnT -= dt;
  if(G.spawnT<=0){
    spawnWave();
    G.spawnT = spawnInterval + Math.random()*180;
  }
  G.enemyT -= dt;
  if(G.enemyT<=0 && !G.bossActive && G.distance>120){
    spawnEnemy();
    G.enemyT = cw.enemyGap + Math.random()*1100 - difficultyNorm*350;
  }

  // Obstacles
  for(let i=G.obstacles.length-1;i>=0;i--){
    const o = G.obstacles[i];
    o.x -= G.speed;
    if(o.rot) o.rotA = (o.rotA||0) + o.rot;
    // Close-call: obstacle just passed under/around player while airborne
    if(!o.passed && o.x + o.w < B.x - B.r*0.4){
      o.passed = true;
      if(!B.grounded && B.iframes<=0){
        const bombBottom = B.y + B.r*0.58;
        if(bombBottom < o.y + 6){
          G.nearMissStreak = (G.nearMissStreak||0) + 1;
          // Escalating reward: streak x1 = +1, x3 = +2, x5 = +3, x7 = +5
          const streak = G.nearMissStreak;
          const sparkBonus = streak >= 7 ? 5 : streak >= 5 ? 3 : streak >= 3 ? 2 : 1;
          G.runCoins += sparkBonus;
          const label = streak >= 3 ? `NEAR MISS x${streak}! +${sparkBonus}` : `NICE! +${sparkBonus}`;
          const col = streak >= 5 ? C.coinHi : streak >= 3 ? '#fff' : '#7eefff';
          popup(o.x+o.w/2, o.y-35, label, col, 1.2 + Math.min(0.5, streak*0.05));
          spawnBurst(B.x, B.y+B.r, streak >= 5 ? C.coinHi : '#7eefff', 5 + Math.min(10, streak));
          if(streak >= 5){
            G.shockwaves.push({x:B.x, y:B.y, r:10, maxR:90+streak*8, life:1, color:C.coinHi});
          }
          G.combo++; G.comboTime = 1400;
          if(G.combo>G.bestCombo) G.bestCombo = G.combo;
          sfx('ui');
        }
      }
    }
    if(o.x + o.w < -60){ G.obstacles.splice(i,1); continue; }
    if(checkCollide(B, o) && B.alive && B.iframes<=0 && !B.pounding){
      // MYSTERY BOX — crack open for random loot
      if(o.mystery){
        const roll = Math.random();
        G.shockwaves.push({x:o.x+o.w/2, y:o.y+o.h/2, r:12, maxR:200, life:1, color:C.coinHi});
        G.shockwaves.push({x:o.x+o.w/2, y:o.y+o.h/2, r:6, maxR:120, life:1, color:C.gem});
        spawnConfetti(o.x+o.w/2, o.y+o.h/2);
        spawnStarBurst(o.x+o.w/2, o.y+o.h/2);
        G.shake = 12; G.flash = 0.5;
        sfx('power');
        if(roll < 0.22){
          // Rare: +5 gems jackpot
          G.runGems += 5;
          popup(o.x+o.w/2, o.y-50, 'JACKPOT! +5 💎', C.gem, 1.6);
        } else if(roll < 0.55){
          // Spark shower (15 physics sparks)
          spawnCoinBurst(o.x+o.w/2, o.y+o.h/2, 15);
          popup(o.x+o.w/2, o.y-50, 'SPARK SHOWER!', C.coinHi, 1.5);
        } else if(roll < 0.80){
          // Random available power-up
          const pool = availablePowerups();
          const k = pool[Math.floor(Math.random()*pool.length)];
          G.collects.push({kind:k, x:o.x+o.w/2, y:o.y+o.h/2, baseY:o.y-40, r:28, t:0, vx:0, vy:-6, physics:true});
          popup(o.x+o.w/2, o.y-50, 'POWER-UP!', '#fff', 1.5);
        } else {
          // Big fuse refill
          G.fuse = Math.min(120, G.fuse+45);
          popup(o.x+o.w/2, o.y-50, '+45 FUSE!', C.water, 1.5);
        }
        B.vy = -11;
        B.jumps = 1;
        G.obstacles.splice(i,1);
        continue;
      }
      // BOUNCE PAD — not damage, launches bomb sky-high
      if(o.bouncer){
        B.vy = -26;
        B.grounded = false;
        B.jumps = 0; // refresh jumps for mid-air combos
        B.jumpHeld = false;
        B.squashX = 0.75; B.squashY = 1.3;
        G.shake = 8;
        sfx('djump');
        spawnBurst(B.x, B.y+B.r, C.fuseHole, 20);
        G.shockwaves.push({x:o.x+o.w/2, y:o.y, r:10, maxR:140, life:1, color:C.bombPinkHi});
        popup(B.x, B.y-40, 'BOING!', C.bombPinkHi, 1.4);
        continue;
      }
      if(G.rocket>0){ spawnBurst(o.x, o.y, C.fireHi, 18); G.obstacles.splice(i,1); continue; }
      if(G.shield>0){
        G.shield -= 1;
        G.shieldImpact = 1;
        B.iframes = 24;
        spawnBurst(B.x,B.y,'#ffffff',18);
        G.flash=0.4; G.shake=10;
        G.shockwaves.push({x:B.x, y:B.y, r:B.r+8, maxR:B.r+60, life:1, color:'#e0f4ff'});
        if(G.shield<=0){
          // SHIELD SHATTERED — big AOE
          shieldShatter();
        } else {
          popup(B.x,B.y-80,'SHIELD! ('+G.shield+' left)','#ffffff',1.1);
        }
        sfx('hit'); G.obstacles.splice(i,1);
      } else {
        const dmg = o.dmg||22;
        G.fuse -= dmg; G.shake=18; G.flash=0.7;
        G.combo=0; G.lastShockCombo=0; G.nearMissStreak=0;
        popup(o.x, o.y-40, '-'+dmg, '#ff4466', 1.3);
        sfx('hit');
        B.vy = -10; B.grounded=false; B.iframes=30;
        spawnBurst(B.x, B.y, C.fire, 14);
        // Fire wave surges forward if active
        if(G.bossActive) G.bossWaveX += 55;
        G.obstacles.splice(i,1);
      }
    }
  }

  // Enemies (Mario-style)
  for(let i=G.enemies.length-1;i>=0;i--){
    const e = G.enemies[i];
    e.x += e.vx - G.speed*0.92;
    e.hop = (e.hop||0)+0.1;
    if(e.kind==='ember' || e.kind==='minibomb'){
      e.bobY = Math.sin(e.hop*3)*3;
    }
    if(e.kind==='match'){
      e.bobY = Math.sin(e.hop*2)*2;
    }
    if(e.kind==='ufo'){
      // Floats up/down smoothly
      e.y = e.bobBaseY + Math.sin(e.hop*1.5)*14;
    }
    if(e.x + e.w < -40){ G.enemies.splice(i,1); continue; }

    if(B.iframes>0 || !B.alive || B.pounding){ continue; }
    const interaction = checkEnemyInteract(B, e);
    if(interaction==='stomp' && e.stomp){
      // STOMP KILL — explode with ring shockwave + debris + screen shake
      e.dying = true;
      B.vy = -13;
      B.grounded = false;
      sfx('stomp');
      // expanding impact ring at enemy center
      G.shockwaves.push({x:e.x+e.w/2, y:e.y+e.h/2, r:8, maxR:90, life:1, color:e.color||'#fff3a0'});
      // main body explosion particles
      spawnBurst(e.x+e.w/2, e.y+e.h/2, e.color||C.fire, 18);
      // debris chunks (rect particles fly outward with gravity)
      for(let k=0; k<8; k++){
        const ang = (k/8)*Math.PI*2 + rand(-0.15, 0.15);
        const spd = rand(3, 7);
        G.particles.push({
          x: e.x+e.w/2, y: e.y+e.h/2,
          vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2,
          life: 1, max: rand(28, 42),
          color: e.color || '#ffffff',
          size: rand(2.5, 4.5), g: 0.25,
          shape: 'rect', rot: rand(0, 6.28), vr: rand(-0.45, 0.45),
        });
      }
      G.shake = Math.max(G.shake, 5);
      B.stompChain++;
      G.runStomps = (G.runStomps||0) + 1;
      // cartoon "BONK!" popup + impact star burst
      popup(e.x+e.w/2, e.y-45, 'BONK!', C.fuseHole, 1.5);
      spawnStarBurst(e.x+e.w/2, e.y+e.h/2);
      popup(e.x+e.w/2, e.y-10, '+'+e.reward, C.coin, 1.2);
      G.runCoins += e.reward;
      // Stomps fill fever meter
      G.fever = Math.min(100, G.fever + 14);
      // Coin burst — mini coins explode out of BONKed enemy
      spawnCoinBurst(e.x+e.w/2, e.y+e.h/2, 4);
      G.combo++; G.comboTime=1400;
      if(G.combo>G.bestCombo) G.bestCombo=G.combo;
      // CHAIN STOMP BONUS — escalates each additional in-air stomp
      if(B.stompChain >= 2){
        const bonus = (B.stompChain - 1) * 3;
        G.runCoins += bonus;
        popup(e.x+e.w/2, e.y-80, `CHAIN x${B.stompChain}! +${bonus}`, C.coinHi, 1.4);
        spawnStarBurst(e.x+e.w/2, e.y);
        G.shockwaves.push({x:e.x+e.w/2, y:e.y+e.h/2, r:12, maxR:140, life:1, color:C.coinHi});
        sfx('power');
      }
      if(e.explode){
        // clear nearby obstacles (preserve mystery/bouncer — they're useful/loot)
        for(let j=G.obstacles.length-1;j>=0;j--){
          const o = G.obstacles[j];
          if(o.mystery || o.bouncer) continue;
          if(Math.abs(o.x - e.x) < 150){ spawnBurst(o.x,o.y,C.fireHi,12); G.obstacles.splice(j,1); }
        }
        popup(e.x+e.w/2, e.y-40, 'BOOM BONUS!', C.fireHi, 1.3);
        G.shake = 10;
        sfx('boom');
        G.runCoins += 5;
      }
      G.enemies.splice(i,1);
    }
    else if(interaction==='hit'){
      if(G.rocket>0){
        spawnBurst(e.x+e.w/2, e.y+e.h/2, C.fireHi, 18);
        G.enemies.splice(i,1);
        continue;
      }
      if(G.shield>0){
        G.shield -= 1;
        G.shieldImpact = 1;
        B.iframes = 24;
        spawnBurst(B.x,B.y,'#ffffff',18);
        G.flash=0.4; G.shake=10;
        G.shockwaves.push({x:B.x, y:B.y, r:B.r+8, maxR:B.r+60, life:1, color:'#e0f4ff'});
        if(G.shield<=0){
          shieldShatter();
        } else {
          popup(B.x,B.y-80,'SHIELD! ('+G.shield+' left)','#ffffff',1.1);
        }
        sfx('hit'); G.enemies.splice(i,1);
      } else {
        const dmg = e.dmg;
        G.fuse -= dmg; G.shake=16; G.flash=0.6;
        G.combo=0; G.lastShockCombo=0; G.nearMissStreak=0;
        popup(e.x+e.w/2, e.y-20, '-'+dmg, '#ff4466', 1.3);
        sfx('hit');
        B.vy = -10; B.grounded=false; B.iframes=30;
        // Fire wave surges forward if active
        if(G.bossActive) G.bossWaveX += 55;
        G.enemies.splice(i,1);
      }
    }
  }

  // Collectibles
  for(let i=G.collects.length-1;i>=0;i--){
    const c = G.collects[i];
    if(c.physics){
      // Flying coin with gravity — settles when hitting ground
      c.x += c.vx - G.speed*0.3;
      c.y += c.vy;
      c.vy += 0.5;
      if(c.y >= GND - 18){
        c.y = GND - 18;
        c.baseY = c.y;
        c.vx = 0; c.vy = 0;
        c.physics = false;
      }
    } else {
      c.x -= G.speed;
      c.t = (c.t||0)+0.08;
      c.y = c.baseY + Math.sin(c.t)*4;
    }
    // Magnet pull (always-on mini + stronger when power-up active)
    const dxm=B.x-c.x, dym=B.y-c.y, dm=Math.hypot(dxm,dym);
    const hasMagnet = G.magnet>0;
    const range = hasMagnet ? 220*(1+0.15*G.upgrades.magnetRange) : 95;
    const strength = hasMagnet ? 6 : 2.3;
    if(dm<range && dm>1){ c.x += dxm/dm*strength; c.y += dym/dm*strength; }
    if(c.x < -40){ G.collects.splice(i,1); continue; }
    const dx=B.x-c.x, dy=B.y-c.y, dist=Math.hypot(dx,dy);
    if(dist < B.r+c.r){ collectItem(c); G.collects.splice(i,1); }
  }

  // Shockwaves (expanding rings)
  for(let i=G.shockwaves.length-1; i>=0; i--){
    const sw = G.shockwaves[i];
    sw.r += 5;
    sw.life -= 0.03;
    if(sw.life<=0 || sw.r>sw.maxR) G.shockwaves.splice(i,1);
  }
  // Particles
  for(let i=G.particles.length-1;i>=0;i--){
    const p=G.particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.life-=1/p.max;
    if(p.rot!==undefined){ p.rot+=p.vr||0; }
    if(p.life<=0) G.particles.splice(i,1);
  }
  for(let i=G.embers.length-1;i>=0;i--){
    const e=G.embers[i];
    e.x+=e.vx; e.y+=e.vy; e.vy+=0.02; e.life-=1/e.max;
    if(e.life<=0) G.embers.splice(i,1);
  }

  for(let i=G.popups.length-1;i>=0;i--){
    const p=G.popups[i];
    p.y+=p.vy; p.vy*=0.96; p.life-=1/p.max;
    if(p.life<=0) G.popups.splice(i,1);
  }
}

// ============================================================================
//  COLLISION / COLLECT
// ============================================================================
function checkCollide(b,o){
  // Shrunken hitbox for player forgiveness (~20% smaller than visual)
  const bx=b.x-b.r*0.48, by=b.y-b.r*0.58, bw=b.r*0.96, bh=b.r*1.15;
  return bx < o.x+o.w && bx+bw > o.x && by < o.y+o.h && by+bh > o.y;
}
function checkEnemyInteract(b,e){
  const bx=b.x-b.r*0.48, by=b.y-b.r*0.58, bw=b.r*0.96, bh=b.r*1.15;
  const bBot = by+bh;
  if(bx >= e.x+e.w || bx+bw <= e.x) return 'none';
  if(by >= e.y+e.h || bBot <= e.y) return 'none';
  // Stomp only if falling AND enemy is stompable (prevents pass-through on Spiny)
  if(b.vy > 2.5 && bBot - e.y < 26 && e.stomp) return 'stomp';
  return 'hit';
}

function collectItem(c){
  G.combo++; G.comboTime = 1400;
  if(G.combo > G.bestCombo) G.bestCombo = G.combo;
  const mult = (G.dbl>0 || G.feverActive) ? 2 : 1;
  // Fever meter fill
  if(c.kind==='coin') G.fever = Math.min(100, G.fever + 1.2);
  else if(c.kind==='gem') G.fever = Math.min(100, G.fever + 5);
  else if(c.kind==='water' || c.kind==='ice') G.fever = Math.min(100, G.fever + 3);
  if(c.kind==='coin'){
    const amt = 1*mult;
    G.runCoins += amt;
    // SPARKS directly feed the fuse (+0.3 each) — thematic tie-in
    G.fuse = Math.min(120, G.fuse + 0.3);
    popup(c.x, c.y-20, '+'+amt, C.coin, 1.0);
    sfx('coin'); spawnBurst(c.x,c.y,C.coin,6);
    // SPARK MILESTONE — every 20 sparks grants +10 fuse bonus
    const nextMile = G.coinMilestone + 20;
    if(G.runCoins >= nextMile){
      G.coinMilestone = nextMile;
      G.fuse = Math.min(120, G.fuse + 10);
      popup(B.x, B.y-130, '+10 FUSE!', C.coinHi, 1.4);
      popup(B.x, B.y-105, '('+G.coinMilestone+' sparks)', '#fff', 0.85);
      G.shockwaves.push({x:B.x, y:B.y, r:10, maxR:140, life:1, color:C.coin});
      sfx('power');
    }
  } else if(c.kind==='gem'){
    const amt = 3*mult;
    G.runGems += amt;
    popup(c.x,c.y-20,'+'+amt+' GEM', C.gem, 1.1);
    sfx('gem'); spawnConfetti(c.x,c.y);
  } else if(c.kind==='water'){
    G.fuse = Math.min(120, G.fuse+18);
    popup(c.x,c.y-20,'+18 FUSE', C.water, 1.0);
    sfx('water'); spawnBurst(c.x,c.y,C.water,14);
  } else if(c.kind==='ice'){
    G.fuse = Math.min(120, G.fuse+28);
    popup(c.x,c.y-20,'+28 FUSE', C.ice, 1.1);
    sfx('ice'); spawnBurst(c.x,c.y,C.ice,18);
  } else if(c.kind==='shield'){
    // Charge-based now: 3 base + upgrades
    const maxCharges = 3 + G.upgrades.shieldTime;
    G.shield = maxCharges;
    G.shieldMax = maxCharges;
    G.shieldImpact = 0;
    popup(c.x,c.y-20,'SHIELD x'+maxCharges+'!', '#ffffff', 1.3);
    sfx('power'); spawnBurst(c.x,c.y,'#ffffff',20);
  } else if(c.kind==='magnet'){
    G.magnet = 8;
    popup(c.x,c.y-20,'MAGNET!', '#ff4db8', 1.2);
    sfx('power'); spawnBurst(c.x,c.y,C.gem,20);
  } else if(c.kind==='rocket'){
    G.rocket = 5;
    popup(c.x,c.y-20,'ROCKET!', C.fireHi, 1.3);
    sfx('power'); spawnBurst(c.x,c.y,C.fireHi,22);
  } else if(c.kind==='dbl'){
    G.dbl = 10;
    popup(c.x,c.y-20,'x2 SPARKS!', C.coinHi, 1.3);
    sfx('power'); spawnBurst(c.x,c.y,C.coin,22);
  } else if(c.kind==='slowmo'){
    G.slowmo = 4;
    popup(c.x,c.y-20,'SLOW-MO!', '#b8e8ff', 1.3);
    sfx('ice'); spawnBurst(c.x,c.y,C.ice,22);
    G.flash = 0.4;
  } else if(c.kind==='smash'){
    G.smash = Math.min(3, G.smash + 1);
    popup(c.x, c.y-20, 'SMASH x'+G.smash+'!', '#ff6a40', 1.3);
    sfx('power'); spawnBurst(c.x, c.y, C.fireHi, 20);

  } else if(c.kind==='supersparkle'){

    G.runCoins += 15;

    sfx('power'); setTimeout(()=>sfx('combo'),120); setTimeout(()=>sfx('power'),240);
  }
  if(G.combo>=3 && G.combo%3===0){
    popup(B.x, B.y-110, 'COMBO x'+G.combo+'!', '#ff4db8', 1.3);
    sfx('combo');
  }
  // Milestone shockwave at 5, 10, 15, 20... + fuse refill bonus
  if(G.combo>0 && G.combo%5===0 && G.combo !== G.lastShockCombo){
    G.lastShockCombo = G.combo;
    G.shockwaves.push({x:B.x, y:B.y, r:14, maxR:190, life:1, color:C.coinHi});

    popup(B.x+55, B.y-105, '+8 FUSE', C.water, 1.0);
    sfx('power');
  }
}

function spawnWave(){
  // Practice queue has priority — spawn tutorialed element for 3 reps
  if(G.practice.length > 0){
    const key = G.practice.shift();
    spawnPracticeFor(key);
    return;
  }
  // Filter encounters by current world
  const pool = ENC.filter(e => (e.minW || 1) <= G.world);
  const enc = pool[Math.floor(Math.random()*pool.length)];
  if(enc) enc.f(W + 60, GND);
}

function spawnObstacle(){
  const roll = Math.random();
  let kind;
  if(roll<0.3) kind='coal';
  else if(roll<0.55) kind='firepit';
  else if(roll<0.75) kind='saw';
  else if(roll<0.9) kind='chili';
  else kind='spikes';

  const floor = GND;
  if(kind==='coal'){
    G.obstacles.push({kind,x:W+60,y:floor-32,w:54,h:30,dmg:15});
  } else if(kind==='firepit'){
    G.obstacles.push({kind,x:W+60,y:floor-50,w:90,h:48,dmg:25});
  } else if(kind==='saw'){
    G.obstacles.push({kind,x:W+60,y:floor-100-Math.random()*50,w:64,h:64,dmg:30, rot:0.28, rotA:0});
  } else if(kind==='chili'){
    G.obstacles.push({kind,x:W+60,y:floor-60,w:46,h:58,dmg:20});
  } else if(kind==='spikes'){
    G.obstacles.push({kind,x:W+60,y:floor-28,w:82,h:26,dmg:22});
  }
}

function spawnEnemy(){
  const floor = GND;
  const pool = availableEnemies();
  const kind = pool[Math.floor(Math.random()*pool.length)];
  let e;
  if(kind==='ember'){
    e = {kind:'ember', x:W+60, y:floor-48, w:46, h:48, vx:-1.1, dmg:16, stomp:true, reward:2, color:'#7ab8ff', hop:Math.random()*6};
  } else if(kind==='minibomb'){
    e = {kind:'minibomb', x:W+60, y:floor-46, w:46, h:46, vx:-1.0, dmg:18, stomp:true, reward:5, explode:true, color:C.bombPink, hop:Math.random()*6};
  } else if(kind==='match'){
    e = {kind:'match', x:W+60, y:floor-92, w:32, h:92, vx:-0.7, dmg:18, stomp:true, reward:3, color:C.fireHi, hop:Math.random()*6};
  } else if(kind==='ufo'){
    const airY = floor - 170 - Math.random()*40;
    e = {kind:'ufo', x:W+60, y:airY, w:54, h:32, vx:-0.8, dmg:20, stomp:true, reward:6, color:'#aaeaff', hop:Math.random()*6, airborne:true, bobBaseY: airY};
  } else if(kind==='spikehead'){
    e = {kind:'spikehead', x:W+60, y:floor-60, w:52, h:60, vx:-0.6, dmg:24, stomp:false, reward:0, color:'#ff3030', hop:Math.random()*6};

  if(e) G.enemies.push(e);
}
