function drawShop(){
  drawBackground();
  // header
  ctx.save();
  ctx.font='900 42px Chakra Petch'; ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillText('UPGRADES', W/2+2, 98);
  const g = ctx.createLinearGradient(0,60,0,110);
  g.addColorStop(0, C.bombPinkHi); g.addColorStop(1, C.fuseHole);
  ctx.fillStyle=g;
  ctx.fillText('UPGRADES', W/2, 96);
  ctx.font='bold 13px Chakra Petch'; ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('Permanent boosts for every run', W/2, 120);
  ctx.restore();

  // coin display
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  roundRect(W/2-80, 140, 160, 34, 17); ctx.fill();
  ctx.fillStyle=C.coin;
  ctx.beginPath(); ctx.arc(W/2-60, 157, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 16px Chakra Petch'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(G.totalCoins.toLocaleString(), W/2+12, 158);
  ctx.restore();

  // upgrade cards
  const keys = Object.keys(UPGRADES);
  const startY = 200, cardH = 110, gap = 14;
  keys.forEach((key, i)=>{
    const u = UPGRADES[key];
    const lvl = G.upgrades[key];
    const y = startY + i*(cardH+gap);
    const x = 30, w = W-60;
    ctx.save();
    // card
    ctx.fillStyle = 'rgba(15,8,30,0.85)';
    roundRect(x, y, w, cardH, 16); ctx.fill();
    ctx.strokeStyle = u.color; ctx.lineWidth = 1.5;
    roundRect(x, y, w, cardH, 16); ctx.stroke();

    // icon circle
    ctx.fillStyle = u.color+'33';
    ctx.beginPath(); ctx.arc(x+44, y+cardH/2, 28, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle=u.color;
    ctx.font='bold 26px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(u.icon, x+44, y+cardH/2+2);

    // name + desc
    ctx.fillStyle='#fff';
    ctx.font='bold 17px Chakra Petch'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillText(u.name, x+84, y+30);
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.font='12px Chakra Petch';
    ctx.fillText(u.desc, x+84, y+48);

    // level pips
    const pw = 12, pgap=4;
    const pipsX = x+84, pipsY = y+60;
    for(let j=0;j<u.max;j++){
      ctx.fillStyle = j<lvl ? u.color : 'rgba(255,255,255,0.15)';
      roundRect(pipsX+j*(pw+pgap), pipsY, pw, 6, 3); ctx.fill();
    }
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.font='11px Chakra Petch';
    ctx.fillText('LVL '+lvl+' / '+u.max, pipsX, pipsY+22);

    // buy button
    const bx2 = x+w-110, by2 = y+cardH/2-22, bw = 92, bh=44;
    if(lvl>=u.max){
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      roundRect(bx2,by2,bw,bh,10); ctx.fill();
      ctx.fillStyle='#aaa';
      ctx.font='bold 14px Chakra Petch'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('MAXED', bx2+bw/2, by2+bh/2);
    } else {
      const cost = u.cost(lvl);
      const afford = G.totalCoins >= cost;
      const bg = ctx.createLinearGradient(0, by2, 0, by2+bh);
      bg.addColorStop(0, afford? u.color : '#555');
      bg.addColorStop(1, afford? '#c71585' : '#333');
      ctx.fillStyle = bg;
      roundRect(bx2,by2,bw,bh,10); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.font='bold 12px Chakra Petch'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('UPGRADE', bx2+bw/2, by2+14);
      ctx.fillStyle = C.coin;
      ctx.beginPath(); ctx.arc(bx2+bw/2-22, by2+30, 6, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle=afford?'#fff':'#ffccd0';
      ctx.font='bold 13px Chakra Petch';
      ctx.fillText(cost, bx2+bw/2+8, by2+32);
      addButton('buy_'+key, bx2, by2, bw, bh);
    }
    ctx.restore();
  });

  // back button
  drawBackButton();
}

  ctx.restore();

  // currency row
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.5)';
  roundRect(W/2-120, 140, 240, 34, 17); ctx.fill();
  ctx.fillStyle=C.coin;
  ctx.beginPath(); ctx.arc(W/2-90, 157, 9, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 14px Chakra Petch'; ctx.textAlign='left'; ctx.textBaseline='middle';
  ctx.fillText(G.totalCoins.toLocaleString(), W/2-74, 158);
  ctx.fillStyle=C.gem;
  ctx.beginPath();
  ctx.moveTo(W/2+24, 150); ctx.lineTo(W/2+32, 158);
  ctx.lineTo(W/2+24, 166); ctx.lineTo(W/2+16, 158);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#fff';
  ctx.fillText(G.totalGems, W/2+40, 158);
  ctx.restore();

  // skin grid
  const keys = Object.keys(SKINS);
  const cols = 2;
  const cardW = (W-90)/cols, cardH = 200, gap = 14;
  const startX = 30, startY = 200;
  keys.forEach((key, i)=>{
    const s = SKINS[key];
    const col = i%cols, row = Math.floor(i/cols);
    const x = startX + col*(cardW+gap);
    const y = startY + row*(cardH+gap);
    const owned = G.ownedSkins.includes(key);
    const equipped = G.skin===key;
    ctx.save();
    // card bg
    ctx.fillStyle = equipped ? 'rgba(255,77,184,0.18)' : 'rgba(15,8,30,0.85)';
    roundRect(x, y, cardW, cardH, 16); ctx.fill();
    ctx.strokeStyle = equipped ? C.fuseHole : (owned? 'rgba(255,255,255,0.25)':'rgba(255,255,255,0.12)');
    ctx.lineWidth = equipped? 3 : 1.5;
    roundRect(x, y, cardW, cardH, 16); ctx.stroke();

    // mini bomb preview (using temporary skin override)
    const oldSkin = G.skin; G.skin = key;
    drawBomb(x+cardW/2, y+88, 0.85, 'happy', Math.sin(G.t*0.003+i)*4, 0,0,0);
    G.skin = oldSkin;

    // name
    ctx.fillStyle='#fff';
    ctx.font='bold 15px Chakra Petch'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(s.name, x+cardW/2, y+cardH-48);

    // status / cost
    if(equipped){
      ctx.fillStyle=C.fuseHole;
      ctx.font='bold 12px Chakra Petch';
      ctx.fillText('EQUIPPED', x+cardW/2, y+cardH-26);
    } else if(owned){
      ctx.fillStyle='rgba(255,255,255,0.8)';
      ctx.font='bold 12px Chakra Petch';
      ctx.fillText('TAP TO EQUIP', x+cardW/2, y+cardH-26);
    } else {
      // cost pill
      const pw = 100, ph = 26;
      const px = x+cardW/2-pw/2, py=y+cardH-44;
      const afford = s.cur==='coin' ? G.totalCoins>=s.cost : G.totalGems>=s.cost;
      ctx.fillStyle = afford? (s.cur==='coin'?'#ffd54a':C.gem) : '#555';
      roundRect(px, py, pw, ph, 13); ctx.fill();
      ctx.fillStyle = '#0a0a1f';
      ctx.font='bold 13px Chakra Petch';
      if(s.cur==='coin') ctx.fillText('★ '+s.cost, x+cardW/2, py+18);
      else ctx.fillText('💎 '+s.cost, x+cardW/2, py+18);
    }
    ctx.restore();
    addButton('skin_'+key, x, y, cardW, cardH);
  });
  drawBackButton();
}

    ['XP earned', '+'+(Math.floor(G.distance/10)+G.runCoins), C.water],
  ];
  ctx.font='14px Chakra Petch';
  rows.forEach((r,i)=>{
    const y = rowY + i*40;
    ctx.fillStyle='rgba(255,255,255,0.08)';
    roundRect(px+20,y-18,pw-40,34,10); ctx.fill();
    ctx.fillStyle='#fff'; ctx.textAlign='left';
    ctx.fillText(r[0], px+36, y+4);
    ctx.fillStyle=r[2]; ctx.font='bold 16px Chakra Petch';
    ctx.textAlign='right';
    ctx.fillText(r[1], px+pw-36, y+4);
    ctx.font='14px Chakra Petch';
  });

  // XP bar
  const xY = py+340;
  ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.font='11px Chakra Petch'; ctx.textAlign='left';
  ctx.fillText('LEVEL '+G.level, px+24, xY);
  ctx.fillStyle=C.bombDarker;
  roundRect(px+24,xY+8,pw-48,12,6); ctx.fill();
  const xg = ctx.createLinearGradient(px+24,0,px+pw-24,0);
  xg.addColorStop(0, C.water); xg.addColorStop(1, C.ice);
  ctx.fillStyle=xg;
  roundRect(px+24,xY+8,(pw-48)*(G.xp/G.xpMax),12,6); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.textAlign='right';
  ctx.fillText(G.xp+' / '+G.xpMax+' XP', px+pw-24, xY);

  // Achievement
  if(G.runCoins>=5 || G.distance>=100 || G.bossSurvived>0){
    const aY = py+390;
    ctx.fillStyle='rgba(255,215,74,0.13)';
    roundRect(px+20, aY-18, pw-40, 34, 10); ctx.fill();
    ctx.strokeStyle = C.coinHi; ctx.lineWidth = 1.5;
    roundRect(px+20, aY-18, pw-40, 34, 10); ctx.stroke();
    ctx.fillStyle=C.coinHi;
    ctx.font='bold 12px Chakra Petch'; ctx.textAlign='left';
    const ach = G.bossSurvived>0 ? '🏅 UNLOCKED: "Fire Walker"' : '🏅 UNLOCKED: "Burning Bright"';
    ctx.fillText(ach, px+36, aY+4);
  }

  // CONTINUE button (primary) — costs 5 gems, keeps progress
  const canRevive = G.totalGems >= 5;
  const rbx = W/2-130, rby=H-210, rbw=260, rbh=60;
  ctx.save();
  const rp = 1 + Math.sin(G.t*0.006)*0.03;
  ctx.translate(rbx+rbw/2, rby+rbh/2);
  ctx.scale(rp, rp);
  const bgG = ctx.createLinearGradient(0, -rbh/2, 0, rbh/2);
  if(canRevive){
    bgG.addColorStop(0, '#ffe070');
    bgG.addColorStop(1, '#c88010');
    ctx.shadowColor='#ffb040'; ctx.shadowBlur=22;
  } else {
    bgG.addColorStop(0, '#555');
    bgG.addColorStop(1, '#222');
  }
  ctx.fillStyle = bgG;
  roundRect(-rbw/2,-rbh/2,rbw,rbh,27); ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle = canRevive ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.1)';
  ctx.lineWidth=1.5;
  roundRect(-rbw/2,-rbh/2,rbw,rbh,27); ctx.stroke();
  ctx.fillStyle = canRevive ? '#3a2000' : '#888';
  ctx.font='bold 18px Chakra Petch'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('✨ CONTINUE', -36, 0);
  // gem cost
  ctx.fillStyle = canRevive ? C.gem : '#666';
  ctx.beginPath();
  ctx.moveTo(44, -7); ctx.lineTo(52, 0); ctx.lineTo(44, 7); ctx.lineTo(36, 0);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = canRevive ? '#3a2000' : '#888';
  ctx.font='bold 20px Chakra Petch';
  ctx.fillText('5', 76, 1);
  ctx.restore();
  addButton('revive', rbx, rby, rbw, rbh);

  // Single HOME button (back to menu — next game starts from W1)
  const btBY = H-130;
  const hx = W/2-110, hy=btBY, hw=220, hh=54;
  const bgH = ctx.createLinearGradient(0, hy, 0, hy+hh);
  bgH.addColorStop(0, '#4a3a6a');
  bgH.addColorStop(1, '#1e1038');
  ctx.fillStyle = bgH;
  roundRect(hx,hy,hw,hh,27); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5;
  roundRect(hx,hy,hw,hh,27); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font='bold 17px Chakra Petch'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('🏠  BACK TO MENU', hx+hw/2, hy+hh/2);
  addButton('home', hx, hy, hw, hh);
  // Info note under HOME
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.font='11px Chakra Petch';
  ctx.fillText('Next run starts from World 1', W/2, hy+hh+18);

  ctx.restore();
}

// ============================================================================
//  RENDER
// ============================================================================
function render(){
  UI.buttons.length = 0;
  const sx = (Math.random()-0.5)*G.shake;
  const sy = (Math.random()-0.5)*G.shake;
  ctx.save();
  ctx.translate(sx, sy);

  if(G.state==='menu'){ drawMenu(); drawForegroundDebris(); drawParticles(); drawPopups(); drawScanlines(); ctx.restore(); return; }
  if(G.state==='shop'){ drawShop(); drawForegroundDebris(); drawParticles(); drawPopups(); drawScanlines(); ctx.restore(); return; }
  if(G.state==='skins'){ drawSkins(); drawForegroundDebris(); drawParticles(); drawPopups(); drawScanlines(); ctx.restore(); return; }

  // play / gameover share world
  drawBackground();
  drawGround();
  drawAmbient(); // world-flavored ambient particles between ground and gameplay
  for(const o of G.obstacles) drawObstacle(o);
  for(const e of G.enemies){
    drawEnemy(e);
    // Indicator above head: green arrow = stompable, red warning = avoid
    const ecx = e.x + e.w/2;
    if(e.stomp) drawStompIndicator(ecx, e.y);
    else drawDangerIndicator(ecx, e.y);
  }
  for(const c of G.collects) drawCollectible(c);
  if(G.magnet>0){
    ctx.save(); ctx.globalAlpha = 0.25 + Math.sin(G.t*0.01)*0.1;
    const gr = ctx.createRadialGradient(B.x, B.y, 20, B.x, B.y, 220);
    gr.addColorStop(0, 'rgba(255,77,184,0.4)'); gr.addColorStop(1, 'rgba(255,77,184,0)');
    ctx.fillStyle = gr;
    ctx.beginPath(); ctx.arc(B.x, B.y, 220, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  if(G.shield>0){
    const sR = B.r + 24;
    // Color based on remaining charges (green/white=full, amber=mid, red=low)
    const chargeRatio = G.shieldMax > 0 ? G.shield/G.shieldMax : 1;
    let accent, hex;
    if(G.shield >= 3){ accent = '#c0f0ff'; hex = '#80d8ff'; }
    else if(G.shield === 2){ accent = '#ffe070'; hex = '#ffb040'; }
    else { accent = '#ff6060'; hex = '#ff3030'; }

    ctx.save();
    // Outer glow ring (stronger on impact)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const gA = 0.25 + Math.sin(G.t*0.01)*0.1 + G.shieldImpact*0.5;
    const gg = ctx.createRadialGradient(B.x, B.y, B.r+2, B.x, B.y, sR+20);
    gg.addColorStop(0, 'rgba(255,255,255,0)');
    gg.addColorStop(0.6, accent+'33');
    gg.addColorStop(1, accent+'00');
    ctx.globalAlpha = Math.min(1, gA + G.shieldImpact*0.7);
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(B.x, B.y, sR+20, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // Filled bubble body
    ctx.globalAlpha = 0.32 + Math.sin(G.t*0.008)*0.08 + G.shieldImpact*0.4;
    const bg2 = ctx.createRadialGradient(B.x-10, B.y-10, 4, B.x, B.y, sR);
    bg2.addColorStop(0, accent+'00');
    bg2.addColorStop(0.75, accent+'22');
    bg2.addColorStop(1, accent+'66');
    ctx.fillStyle = bg2;
    ctx.beginPath(); ctx.arc(B.x, B.y, sR, 0, Math.PI*2); ctx.fill();

    // Hexagonal tech pattern (clipped to bubble)
    ctx.save();
    ctx.beginPath(); ctx.arc(B.x, B.y, sR, 0, Math.PI*2); ctx.clip();
    ctx.globalAlpha = 0.22 + G.shieldImpact*0.3;
    ctx.strokeStyle = hex;
    ctx.lineWidth = 1;
    const hexSize = 11;
    const offset = (G.t*0.02)%(hexSize*1.5);
    for(let hy = B.y - sR + offset; hy < B.y + sR; hy += hexSize*1.5){
      for(let hx = B.x - sR; hx < B.x + sR; hx += hexSize*Math.sqrt(3)){
        const col = Math.floor((hx-B.x)/(hexSize*Math.sqrt(3)));
        const yAdj = (col%2===0) ? 0 : hexSize*0.75;
        ctx.beginPath();
        for(let k=0;k<6;k++){
          const a = (k/6)*Math.PI*2 + Math.PI/6;
          const px = hx + Math.cos(a)*hexSize;
          const py = hy + yAdj + Math.sin(a)*hexSize;
          if(k===0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.closePath(); ctx.stroke();
      }
    }
    ctx.restore();

    // 3 ARC SEGMENTS — one per charge capacity
    ctx.globalAlpha = 1;
    const maxC = Math.max(3, G.shieldMax);
    const segGap = 0.08;
    const segSpan = (Math.PI*2 / maxC) - segGap;
    const rot = G.t*0.0015;
    for(let i=0; i<maxC; i++){
      const a0 = i*(Math.PI*2/maxC) + rot;
      const active = i < G.shield;
      ctx.strokeStyle = active ? accent : 'rgba(80,80,110,0.25)';
      ctx.lineWidth = active ? 4 : 2;
      if(active){
        ctx.shadowColor = accent;
        ctx.shadowBlur = 10 + G.shieldImpact*20;
      }
      ctx.beginPath();
      ctx.arc(B.x, B.y, sR, a0, a0 + segSpan);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Rotating dash outline (subtle)
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = accent;
    ctx.lineWidth = 1.2;
    ctx.setLineDash([6, 10]);
    ctx.lineDashOffset = -G.t*0.03;
    ctx.beginPath(); ctx.arc(B.x, B.y, sR-4, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);

    // Impact flash ring
    if(G.shieldImpact > 0.05){
      ctx.globalAlpha = G.shieldImpact * 0.8;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3 + G.shieldImpact*4;
      ctx.beginPath(); ctx.arc(B.x, B.y, sR + (1-G.shieldImpact)*25, 0, Math.PI*2); ctx.stroke();
    }

    // Shimmer highlight (sweeping arc)
    ctx.globalAlpha = 0.7;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    const arcStart = (G.t*0.004)%(Math.PI*2);
    ctx.beginPath(); ctx.arc(B.x, B.y, sR-2, arcStart, arcStart+Math.PI*0.4); ctx.stroke();

    ctx.restore();
  }
  if(G.rocket>0){
    for(let i=0;i<4;i++){
      G.particles.push({
        x: B.x-30, y: B.y+10+rand(-10,10),
        vx: -rand(3,7), vy: rand(-0.5,0.5),
        life: 1, max: 20, color: i%2?C.fireHi:C.fire, size: rand(4,8), g:0,
      });
    }
  }
  // Ground pound trail — intense downward streak
  if(B.pounding){
    for(let i=0;i<3;i++){
      G.particles.push({
        x: B.x+rand(-6,6), y: B.y+rand(-5,5),
        vx: rand(-0.5,0.5), vy: rand(-8,-3),
        life: 1, max: 18,
        color: i%2?C.fireHi:'#ffd54a',
        size: rand(3,5), g: 0, shape:'circle',
      });
    }
    // red/gold glow aura
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const pg = ctx.createRadialGradient(B.x, B.y, 10, B.x, B.y, 80);
    pg.addColorStop(0, 'rgba(255,180,60,0.5)');
    pg.addColorStop(1, 'rgba(255,80,40,0)');
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(B.x, B.y, 80, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // Orbital power-up icons (behind bomb so they circle around)
  if(B.alive){
    const active = [];
    if(G.shield>0) active.push({label:'🛡', color:'#ffffff'});
    if(G.magnet>0) active.push({label:'U', color:C.gem});
    if(G.dbl>0)    active.push({label:'x2', color:C.coin});
    if(G.rocket>0) active.push({label:'▲', color:C.fire});
    if(active.length){
      const orbitR = 37;
      for(let i=0;i<active.length;i++){
        const a = G.t*0.004 + (i/active.length)*Math.PI*2;
        const ox2 = B.x + Math.cos(a)*orbitR;
        const oy2 = B.y + Math.sin(a)*orbitR*0.55;
        const it = active[i];
        // glow
        ctx.save();
        ctx.globalCompositeOperation='lighter';
        const gg = ctx.createRadialGradient(ox2,oy2,2,ox2,oy2,18);
        gg.addColorStop(0, it.color);
        gg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gg;
        ctx.globalAlpha = 0.7;
        ctx.beginPath(); ctx.arc(ox2,oy2,18,0,Math.PI*2); ctx.fill();
        ctx.restore();
        // chip
        ctx.fillStyle = 'rgba(15,8,30,0.8)';
        ctx.beginPath(); ctx.arc(ox2,oy2,10,0,Math.PI*2); ctx.fill();
        ctx.strokeStyle = it.color;
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(ox2,oy2,10,0,Math.PI*2); ctx.stroke();
        // label
        ctx.fillStyle = it.color;
        ctx.font = 'bold 11px Chakra Petch'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(it.label, ox2, oy2+1);
      }
    }
  }
  if(B.alive){
    // Soft aura halo behind bomb (rim light)
    const skinDef = SKINS[G.skin] || SKINS.classic;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const auraR = 45 + Math.sin(G.t*0.006)*2.5;
    const aura = ctx.createRadialGradient(B.x, B.y-4, 18, B.x, B.y-4, auraR);
    aura.addColorStop(0, skinDef.hole + '44');
    aura.addColorStop(1, skinDef.hole + '00');
    ctx.fillStyle = aura;
    ctx.beginPath(); ctx.arc(B.x, B.y-4, auraR, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // Afterimage trail (behind bomb)
    for(const tp of B.trail){
      ctx.save();
      ctx.globalAlpha = tp.life * 0.35;
      drawBomb(tp.x, tp.y, 0.58, 'jump', 0, 0, 0, 0, tp.sqX, tp.sqY);
      ctx.restore();
    }
    // Subtle idle breathing when grounded (continuous soft scale pulse)
    const breath = B.grounded ? 1 + Math.sin(G.t*0.004) * 0.018 : 1;
    const scale = (G.rocket>0 ? 1.1 : 1) * 0.6 * breath;
    const flicker = (B.iframes>0 && G.frame%4<2) ? 0.4 : 1;
    // Eye tracking based on state
    let eyeX = 0.3, eyeY = 0;
    if(!B.grounded){
      if(B.vy < -3) { eyeX = 0; eyeY = -0.8; }     // look up while rising
      else if(B.vy > 3) { eyeX = 0.1; eyeY = 0.7; } // look down while falling
      else eyeX = 0.2;
    } else if(B.pounding){
      eyeY = 0.8;
    }
    // Random glance left/right occasionally when running
    if(B.grounded && Math.sin(G.t*0.0008) > 0.93) eyeX = -0.3;
    ctx.save(); ctx.globalAlpha = flicker;
    drawBomb(B.x, B.y, scale, B.expression, B.bob, eyeX, eyeY, B.blink>0?1:0, B.squashX, B.squashY);
    ctx.restore();
  }
  // Shockwave rings
  for(const sw of G.shockwaves){
    ctx.save();
    ctx.globalAlpha = sw.life;
    ctx.strokeStyle = sw.color || C.fuseHole;
    ctx.lineWidth = 3*sw.life + 1;
    ctx.shadowColor = sw.color || C.fuseHole;
    ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
  drawParticles();
  drawForegroundDebris();
  drawBossWave();
  drawPopups();
  drawHUD();
  drawScanlines();

  if(G.flash>0.02){
    ctx.fillStyle = `rgba(255,80,80,${G.flash*0.5})`;
    ctx.fillRect(0,0,W,H);
  }
  // Coin Rush edge glow (gold pulsing border)
  if(G.coinRushActive){
    ctx.save();
    const pulse = 0.5 + Math.sin(G.t*0.015)*0.3;
    const vg = ctx.createRadialGradient(W/2, H/2, W*0.35, W/2, H/2, W*0.8);
    vg.addColorStop(0, 'rgba(255,213,74,0)');
    vg.addColorStop(1, `rgba(255,213,74,${pulse*0.5})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0,0,W,H);
    // small banner
    ctx.fillStyle = `rgba(0,0,0,${pulse*0.4})`;
    roundRect(W/2-90, 215, 180, 30, 15); ctx.fill();
    ctx.strokeStyle = C.coinHi; ctx.lineWidth=2;
    roundRect(W/2-90, 215, 180, 30, 15); ctx.stroke();
    ctx.fillStyle = C.coinHi;
    ctx.font='bold 14px Chakra Petch'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✨ SPARK RUSH '+(G.coinRushTimer/1000).toFixed(1)+'s', W/2, 230);
    ctx.restore();
  }
  // Slow-mo cyan tint + edge glow
  if(G.slowmo>0){
    ctx.save();
    const alpha = Math.min(1, G.slowmo) * 0.18;
    ctx.fillStyle = `rgba(77,208,255,${alpha})`;
    ctx.fillRect(0,0,W,H);
    // edge vignette (cyan)
    const vg = ctx.createRadialGradient(W/2, H/2, W*0.3, W/2, H/2, W*0.8);
    vg.addColorStop(0, 'rgba(77,208,255,0)');
    vg.addColorStop(1, `rgba(77,208,255,${alpha*1.5})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
  if(G.rage){
    const g = ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.7);
    g.addColorStop(0,'rgba(255,0,40,0)');
    g.addColorStop(1, `rgba(255,0,40,${0.35+Math.sin(G.t*0.02)*0.15})`);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }
  if(G.state==='gameover'){ drawGameOver(); }
  if(G.state==='play' && G.transition<1){
    ctx.fillStyle = `rgba(255,255,255,${1-G.transition})`;
    ctx.fillRect(0,0,W,H);
  }
  // POST-PROCESSING STACK — bloom + chromatic + film grain before UI
  if(G.state==='play' && !G.tutModal){
    applyBloom();
    applyChromatic();
    applyFilmGrain();
  }
  // Countdown overlay (drawn below tutorial if both active)
  if(G.state==='play' && G.countdown > 0){
    drawCountdown();
  }
  // Tutorial modal overlay (highest priority — drawn on top)
  if(G.state==='play' && (G.tutModal || G.tutPauseFade>0)){
    drawTutorialModal();
  }

  ctx.restore();
}
function drawCountdown(){
  ctx.save();
  // Dim backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);
  // Large number/label in center
  const sec = Math.ceil(G.countdown/1000);
  const isGo = G.countdownLabel === 'GO!';
  const msSinceTick = 1000 - (G.countdown % 1000);
  const prog = Math.min(1, msSinceTick/1000);
  // Scale-in animation
  const scale = isGo ? 1 + prog*0.3 : 2.0 - prog*1.0;
  const alpha = isGo ? 1 - prog*0.8 : 1 - prog*0.7;
  ctx.globalAlpha = Math.max(0, alpha);
  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(scale, scale);
  // Glow ring behind
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  const color = isGo ? '#5fee80' : sec === 1 ? C.fireHi : sec === 2 ? C.coin : C.water;
  const g = ctx.createRadialGradient(0,0,10, 0,0, 160);
  g.addColorStop(0, color+'bb');
  g.addColorStop(1, color+'00');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(0,0,160,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Text
  ctx.fillStyle = color;
  ctx.font = isGo ? '900 140px Russo One, sans-serif' : '900 200px Russo One, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = color;
  ctx.shadowBlur = 40;
  ctx.fillText(G.countdownLabel, 0, 0);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 4;
  ctx.strokeText(G.countdownLabel, 0, 0);
  ctx.restore();
  // "Get ready!" sub text (only during 3-2-1, not GO)
  if(!isGo){
    ctx.globalAlpha = 0.7;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Chakra Petch';
    ctx.textAlign = 'center';
    ctx.fillText('GET READY!', W/2, H/2 + 140);
  }
  ctx.restore();
}

// ============================================================================
//  MAIN LOOP — with defensive error handling so one bug can't freeze the game
// ============================================================================
let lastT = performance.now();
let errCount = 0;
function loop(now){
  const dt = Math.min(33, now-lastT);
  lastT = now;
  try { update(dt); }
  catch(e){ if(errCount++<5) console.error('[update]', e); }
  try { render(); }
  catch(e){ if(errCount++<5) console.error('[render]', e); ctx.restore(); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
