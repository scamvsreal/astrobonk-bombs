  ctx.scale(scale*sqX, scale*sqY);

  // shadow
  ctx.save();
  ctx.scale(1, 0.3);
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.ellipse(0, 140, 40, 14, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // dark lower body
  ctx.fillStyle = s.dark;
  ctx.beginPath(); ctx.arc(0,0,46,0,Math.PI*2); ctx.fill();

  // colored top half
  const grad = ctx.createRadialGradient(-12,-18,5, 0,-5,50);
  grad.addColorStop(0, s.hi);
  grad.addColorStop(1, s.mid);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(0, 0, 46, Math.PI, Math.PI*2, false);
  ctx.bezierCurveTo(40, 8, -40, 8, -46, 0);
  ctx.closePath();
  ctx.fill();

  // fuse hole
  ctx.fillStyle = s.hole;
  ctx.beginPath(); ctx.ellipse(6, -40, 9, 5, 0, 0, Math.PI*2); ctx.fill();

  // fuse + spark
  ctx.strokeStyle = s.dark;
  ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(6, -42);
  const wobble = Math.sin(G.t*0.01)*3;
  ctx.bezierCurveTo(20, -80, 45+wobble, -70, 40, -55);
  ctx.bezierCurveTo(35, -45, 55, -40, 58+wobble, -58);
  ctx.bezierCurveTo(62, -72, 52, -82, 65, -90);
  ctx.stroke();

  const sparkX = 65, sparkY = -90;
  const sparkSize = 5 + Math.sin(G.t*0.03)*1.5;
  ctx.save();
  ctx.translate(sparkX, sparkY);
  ctx.globalCompositeOperation = 'lighter';
  const sg = ctx.createRadialGradient(0,0,0, 0,0,18);
  sg.addColorStop(0, 'rgba(255,180,71,0.9)');
  sg.addColorStop(1, 'rgba(255,120,40,0)');
  ctx.fillStyle = sg;
  ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = C.spark;
  ctx.lineWidth = 2.5; ctx.lineCap = 'round';
  const rays = 8;
  for(let i=0;i<rays;i++){
    const a = (i/rays)*Math.PI*2 + G.t*0.005;
    const l = sparkSize + (i%2? 1.5 : 0);
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*2, Math.sin(a)*2);
    ctx.lineTo(Math.cos(a)*(sparkSize+l), Math.sin(a)*(sparkSize+l));
    ctx.stroke();
  }
  ctx.fillStyle = C.sparkHot;
  ctx.beginPath(); ctx.arc(0,0,3,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.beginPath(); ctx.ellipse(-22, -22, 10, 16, -0.5, 0, Math.PI*2); ctx.fill();

  // eyes
  const eyeY = 5, eyeW = 15, eyeH = 18;
  const lx = -13 + eyesLookX*2, rx = 13 + eyesLookX*2;
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.ellipse(lx, eyeY, eyeW, eyeH - blinkAmt*eyeH*0.9, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(rx, eyeY, eyeW, eyeH - blinkAmt*eyeH*0.9, 0, 0, Math.PI*2); ctx.fill();
  if(blinkAmt < 0.9){
    ctx.fillStyle = s.dark;
    const px = 2 + eyesLookX*3;
    let py = -2 + eyesLookY*3;
    if(expression==='jump') py = -5;
    if(expression==='hurt') py = 0;
    ctx.beginPath(); ctx.ellipse(lx+px, eyeY+py, 9, 11, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(rx+px, eyeY+py, 9, 11, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.ellipse(lx+px+3, eyeY+py-4, 2, 3, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(rx+px+3, eyeY+py-4, 2, 3, 0, 0, Math.PI*2); ctx.fill();
  }
  if(expression==='happy'){
    ctx.strokeStyle = s.dark; ctx.lineWidth = 3; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(0, 28, 8, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  }

  // feet
  if(expression==='run'){
    const legSwing = Math.sin(B.legPhase) * 8;
    ctx.fillStyle = '#ffffff';
    roundRect(-18-Math.abs(legSwing*0.3), 38 + (legSwing<0?-legSwing*0.5:0), 18, 10, 5); ctx.fill();
    ctx.fillStyle = s.hole;
    ctx.fillRect(-18, 41 + (legSwing<0?-legSwing*0.5:0), 18, 2);
    ctx.fillStyle = '#ffffff';
    roundRect(0+Math.abs(legSwing*0.3), 38 + (legSwing>0?legSwing*0.5:0), 18, 10, 5); ctx.fill();
    ctx.fillStyle = C.water;
    ctx.fillRect(0, 41 + (legSwing>0?legSwing*0.5:0), 18, 2);
  } else {
    ctx.fillStyle = '#ffffff';
    roundRect(-17, 36, 15, 9, 4); ctx.fill();
    roundRect(2, 36, 15, 9, 4); ctx.fill();
  }

  ctx.restore();
}

// ============================================================================
//  DRAW — ENEMIES
// ============================================================================
function drawEnemy(e){
  const cx = e.x + e.w/2;
  const by = e.y + (e.bobY||0);
  // Hit flash (invincibility blink after damage)
  const hitFlash = (e.hitFlash && e.hitFlash > 0) ? e.hitFlash : 0;

  // TELEGRAPH — proximity-based charge glow (stronger as player approaches)
  // Dangerous (non-stompable) enemies get a red telegraph; stompable get a soft cyan one.
  if(typeof B !== 'undefined' && B.alive){
    const dx = (e.x + e.w/2) - B.x;
    const dy = (e.y + e.h/2) - B.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const telegraphRange = 220;
    if(dx > 0 && dist < telegraphRange){
      const proximity = 1 - (dist/telegraphRange); // 0..1
      const charge = proximity * proximity; // ease for dramatic ramp
      const isDanger = !e.stomp;
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const pulse = 0.7 + Math.sin(G.t*0.015)*0.3;
      const color = isDanger ? 'rgba(255,60,40,' : 'rgba(80,220,255,';
      const r = e.w*0.6 + charge * 20;
      const tg = ctx.createRadialGradient(cx, by+e.h/2, e.w*0.3, cx, by+e.h/2, r);
      tg.addColorStop(0, color + (charge*0.45*pulse).toFixed(2) + ')');
      tg.addColorStop(1, color + '0)');
      ctx.fillStyle = tg;
      ctx.beginPath(); ctx.arc(cx, by+e.h/2, r, 0, Math.PI*2); ctx.fill();
      // on very close (charge > 0.7) — draw sharp warning ring pulsing
      if(charge > 0.5 && isDanger){
        ctx.strokeStyle = `rgba(255,80,60,${charge*pulse*0.6})`;
        ctx.lineWidth = 1.5;
        const ringR = e.w*0.55 + Math.sin(G.t*0.04)*3;
        ctx.beginPath(); ctx.arc(cx, by+e.h/2, ringR, 0, Math.PI*2); ctx.stroke();
      }
      ctx.restore();
    }
  }

  // Soft contact shadow helper
  const softShadow = (sx, sy, sw, alpha=0.42) => {
    ctx.save();
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, sw);
    sg.addColorStop(0, `rgba(0,0,0,${alpha})`);
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.ellipse(sx, sy, sw, sw*0.28, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  };
  // Rim-light helper — thin bright arc opposite the main light source
  const rimLight = (x, y, r, color='rgba(255,255,255,0.55)', arcStart=0.15, arcEnd=1.85) => {
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = r*0.08;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.arc(x, y, r*0.94, Math.PI*arcStart, Math.PI*arcEnd); ctx.stroke();
    ctx.restore();
  };
  // Specular highlight helper — bright glossy dot on top-left
  const specular = (x, y, rx, ry, alpha=0.75) => {
    ctx.save();
    const g = ctx.createRadialGradient(x, y, 0, x, y, Math.max(rx, ry));
    g.addColorStop(0, `rgba(255,255,255,${alpha})`);
    g.addColorStop(0.5, `rgba(255,255,255,${alpha*0.3})`);
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(x, y, rx, ry, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  };

  // =======================================================================
  //  SPACE GRUB (ember) — gelatinous cosmic jelly blob, Apple-grade polish
  //  Layers: outer glow · ambient shadow · rim · wobble body gradient ·
  //          inner luminous core · specular · glossy eyes · antenna whips
  // =======================================================================
  if(e.kind==='ember'){
    ctx.save();
    const r = e.w*0.46;
    // jiggle wobble — horizontal squash based on hop
    const sqX = 1 + Math.sin(e.hop*3.0)*0.08;
    const sqY = 1 - Math.sin(e.hop*3.0)*0.10;
    const bcy = by + e.h*0.5;

    // 1. Soft contact shadow
    softShadow(cx, by+e.h-1, r*1.05, 0.50);

    // 2. Outer ambient glow (cyan halo — makes it pop off background)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const halo = ctx.createRadialGradient(cx, bcy, r*0.6, cx, bcy, r*1.7);
    halo.addColorStop(0, 'rgba(80,200,255,0.22)');
    halo.addColorStop(1, 'rgba(80,200,255,0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(cx, bcy, r*1.7, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 3. Body base — multi-stop radial gradient (cool icy cyan → deep navy)
    ctx.save();
    ctx.translate(cx, bcy);
    ctx.scale(sqX, sqY);
    const bodyG = ctx.createRadialGradient(-r*0.38, -r*0.42, r*0.08, 0, 0, r*1.05);
    bodyG.addColorStop(0,    '#f0faff');     // almost white top highlight
    bodyG.addColorStop(0.18, '#b8e4ff');
    bodyG.addColorStop(0.45, '#5aa2e0');
    bodyG.addColorStop(0.75, '#1e4888');
    bodyG.addColorStop(1,    '#06112e');     // deep navy edge
    ctx.fillStyle = bodyG;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();

    // 4. Rim light opposite main light (bottom-right glow)
    const rimG = ctx.createRadialGradient(r*0.55, r*0.55, r*0.55, 0, 0, r*1.02);
    rimG.addColorStop(0, 'rgba(120,220,255,0)');
    rimG.addColorStop(0.88, 'rgba(120,220,255,0)');
    rimG.addColorStop(0.96, 'rgba(180,240,255,0.55)');
    rimG.addColorStop(1, 'rgba(120,220,255,0)');
    ctx.fillStyle = rimG;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.fill();

    // 5. Inner luminous core (pulsing cyan energy)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const corePulse = 0.8 + Math.sin(G.t*0.005)*0.2;
    const coreG = ctx.createRadialGradient(0, r*0.15, 0, 0, r*0.15, r*0.65);
    coreG.addColorStop(0, `rgba(140,230,255,${0.45*corePulse})`);
    coreG.addColorStop(1, 'rgba(140,230,255,0)');
    ctx.fillStyle = coreG;
    ctx.beginPath(); ctx.arc(0, r*0.15, r*0.65, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 6. Dark outline (contour)
    ctx.strokeStyle = 'rgba(4,10,30,0.85)';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI*2); ctx.stroke();
    ctx.restore();

    // 7. Specular glossy highlight (top-left)
    specular(cx - r*0.42, bcy - r*0.48, r*0.22, r*0.30, 0.85);
    // tiny secondary pinpoint (makes it look wet)
    ctx.save();
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(cx - r*0.28, bcy - r*0.58, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 8. Antennae — dual whip tentacles with pink energy orbs
    const wiggle = Math.sin(G.t*0.008 + e.hop*0.6)*3;
    // darkened stroke with inner highlight
    ctx.strokeStyle = '#06112e';
    ctx.lineWidth = 3; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(cx-7, bcy-r*0.82);
    ctx.quadraticCurveTo(cx-11+wiggle, bcy-r*1.3, cx-11+wiggle, bcy-r*1.9);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx+7, bcy-r*0.82);
    ctx.quadraticCurveTo(cx+11-wiggle, bcy-r*1.3, cx+11-wiggle, bcy-r*1.9);
    ctx.stroke();
    // inner stroke highlight
    ctx.strokeStyle = 'rgba(120,180,220,0.7)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx-7, bcy-r*0.82);
    ctx.quadraticCurveTo(cx-11+wiggle, bcy-r*1.3, cx-11+wiggle, bcy-r*1.9);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx+7, bcy-r*0.82);
    ctx.quadraticCurveTo(cx+11-wiggle, bcy-r*1.3, cx+11-wiggle, bcy-r*1.9);
    ctx.stroke();

    // Glowing pink orbs at antenna tips
    const orbY = bcy - r*1.9;
    const orbPulse = 1 + Math.sin(G.t*0.01)*0.15;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    for(const side of [-1, 1]){
      const ox = cx + side*11 + (side===-1?wiggle:-wiggle);
      const ag = ctx.createRadialGradient(ox, orbY, 0, ox, orbY, 14*orbPulse);
      ag.addColorStop(0, 'rgba(255,180,240,1)');
      ag.addColorStop(0.35, 'rgba(255,100,200,0.7)');
      ag.addColorStop(1, 'rgba(255,77,184,0)');
      ctx.fillStyle = ag;
      ctx.beginPath(); ctx.arc(ox, orbY, 14*orbPulse, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
    for(const side of [-1,1]){
      const ox = cx + side*11 + (side===-1?wiggle:-wiggle);
      // orb core with highlight
      const og = ctx.createRadialGradient(ox-1, orbY-1, 0, ox, orbY, 3.5);
      og.addColorStop(0, '#fff');
      og.addColorStop(0.4, '#ffb8e0');
      og.addColorStop(1, '#c03080');
      ctx.fillStyle = og;
      ctx.beginPath(); ctx.arc(ox, orbY, 3.5, 0, Math.PI*2); ctx.fill();
    }

    // 9. Big expressive glossy eyes
    const eyeY = bcy - r*0.05;
    const eyeW = r*0.33, eyeH = r*0.40;
    // white with subtle gradient (not flat white)
    const eyeG = ctx.createRadialGradient(cx-r*0.32, eyeY-2, 0, cx-r*0.32, eyeY, eyeW);
    eyeG.addColorStop(0, '#ffffff');
    eyeG.addColorStop(1, '#d0dce8');
    ctx.fillStyle = eyeG;
    ctx.beginPath(); ctx.ellipse(cx-r*0.32, eyeY, eyeW, eyeH, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+r*0.32, eyeY, eyeW, eyeH, 0, 0, Math.PI*2); ctx.fill();
    // eye inner shadow (subtle ring)
    ctx.strokeStyle = 'rgba(0,20,60,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.ellipse(cx-r*0.32, eyeY, eyeW, eyeH, 0, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx+r*0.32, eyeY, eyeW, eyeH, 0, 0, Math.PI*2); ctx.stroke();
    // Pupils — spherical with highlight (3D feel)
    const pOff = -2;
    for(const side of [-1, 1]){
      const ex = cx + side*r*0.32 + pOff;
      const pg = ctx.createRadialGradient(ex-1, eyeY-1, 0, ex, eyeY+1, eyeW*0.6);
      pg.addColorStop(0, '#3a4868');
      pg.addColorStop(0.6, '#0a1e4a');
      pg.addColorStop(1, '#040a1e');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.ellipse(ex, eyeY+1, eyeW*0.58, eyeH*0.62, 0, 0, Math.PI*2); ctx.fill();
    }
    // Dual catchlights (primary + secondary for "alive" look)
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(cx-r*0.34-1, eyeY-2, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+r*0.30-1, eyeY-2, 1.8, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.beginPath(); ctx.arc(cx-r*0.30+1, eyeY+2, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+r*0.36+1, eyeY+2, 0.8, 0, Math.PI*2); ctx.fill();

    // 10. Waddle feet (Bombița brand colors)
    const legP = Math.sin(e.hop*3);
    for(const s of [[-1, C.fuseHole],[1, '#4dd0ff']]){
      const fx = cx + s[0]*7 - 4;
      const fy = by+e.h-6 + (s[0]*legP>0?0:-1.5);
      // shoe body with gradient
      const shG = ctx.createLinearGradient(fx, fy, fx, fy+5);
      shG.addColorStop(0, '#ffffff'); shG.addColorStop(1, '#c4cad4');
      ctx.fillStyle = shG;
      roundRect(fx, fy, 8, 5, 2); ctx.fill();
      ctx.strokeStyle = 'rgba(0,10,30,0.4)'; ctx.lineWidth = 0.6;
      roundRect(fx, fy, 8, 5, 2); ctx.stroke();
      // sole stripe
      ctx.fillStyle = s[1];
      ctx.fillRect(fx, fy+3, 8, 1.8);
    }

    // 11. Hit flash overlay
    if(hitFlash > 0){
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle = `rgba(255,255,255,${hitFlash*0.8})`;
      ctx.beginPath(); ctx.arc(cx, bcy, r*1.2, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  // =======================================================================
  //  ASTRO MINE (minibomb) — chromed naval mine with rotating warning ring
  //  Layers: drop shadow · chromed metal body · warning stripes · fuse sparks ·
  //          bevel highlights · angry eyes · pulsing danger light
  // =======================================================================
  else if(e.kind==='minibomb'){
    const mcx = cx, mcy = by + e.h*0.5;
    ctx.save();
    // subtle angry jitter (charging to explode feel)
    const jitter = Math.sin(G.t*0.04)*0.4;
    ctx.translate(mcx+jitter, mcy);

    // 1. Danger aura (pulsing red)
    const dangerPulse = 0.6 + Math.sin(G.t*0.01)*0.4;
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const dg = ctx.createRadialGradient(0, 0, 4, 0, 0, 34);
    dg.addColorStop(0, `rgba(255,60,100,${0.26*dangerPulse})`);
    dg.addColorStop(1, 'rgba(255,60,100,0)');
    ctx.fillStyle = dg;
    ctx.beginPath(); ctx.arc(0, 0, 34, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // 2. Contact shadow
    softShadow(0, 22, 16, 0.45);

    const R = 18;

    // 3. Body — chromed metal gradient (dark magenta → hot pink → highlight)
    const bodyG = ctx.createRadialGradient(-R*0.45, -R*0.42, R*0.1, 0, 0, R*1.05);
    bodyG.addColorStop(0,    '#ffd8ee');
    bodyG.addColorStop(0.18, '#ff8ccb');
    bodyG.addColorStop(0.55, '#b8358c');
    bodyG.addColorStop(0.85, '#4a0a36');
    bodyG.addColorStop(1,    '#140414');
    ctx.fillStyle = bodyG;
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI*2); ctx.fill();

    // 4. Equatorial warning stripe (caution band)
    ctx.save();
    ctx.beginPath(); ctx.arc(0, 0, R-0.5, 0, Math.PI*2); ctx.clip();
    // caution zebra band
    ctx.translate(0, 0.5);
    ctx.rotate(G.t*0.0008);
    ctx.fillStyle = '#1a0a18';
    ctx.fillRect(-R*1.2, -3.5, R*2.4, 7);
    ctx.fillStyle = '#ffd54a';
    for(let i=-4; i<=4; i++){
      ctx.fillRect(i*5.2, -3, 3.2, 6);
    }
    ctx.restore();

    // 5. Rim light (bottom-right)
    const rimG = ctx.createRadialGradient(R*0.55, R*0.55, R*0.55, 0, 0, R*1.02);
    rimG.addColorStop(0, 'rgba(255,140,200,0)');
    rimG.addColorStop(0.90, 'rgba(255,140,200,0)');
    rimG.addColorStop(0.97, 'rgba(255,200,230,0.55)');
    rimG.addColorStop(1, 'rgba(255,140,200,0)');
    ctx.fillStyle = rimG;
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI*2); ctx.fill();

    // 6. Dark contour outline
    ctx.strokeStyle = '#0a040f';
    ctx.lineWidth = 1.3;
    ctx.beginPath(); ctx.arc(0, 0, R, 0, Math.PI*2); ctx.stroke();

    // 7. Rivet studs around the body (militaristic)
    ctx.fillStyle = '#d8a2c0';
    ctx.strokeStyle = '#3a0826';
    ctx.lineWidth = 0.5;
    for(let i=0; i<6; i++){
      const a = (i/6)*Math.PI*2 + Math.PI/6;
      const rx = Math.cos(a)*R*0.82, ry = Math.sin(a)*R*0.82;
      ctx.beginPath(); ctx.arc(rx, ry, 1.4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    }

    // 8. Specular top-left glossy sheen
    specular(-R*0.42, -R*0.48, R*0.22, R*0.32, 0.8);

    // 9. Fuse hole + braided fuse
    ctx.fillStyle = '#1a0612';
    ctx.beginPath(); ctx.ellipse(2, -R*0.88, 4.2, 2.6, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#7a1e08'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.ellipse(2, -R*0.88, 4.2, 2.6, 0, 0, Math.PI*2); ctx.stroke();
    // fuse rope with twist shading
    ctx.strokeStyle = '#6a3420';
    ctx.lineWidth = 2.6; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(2, -R*0.88);
    ctx.quadraticCurveTo(8, -R*1.2, 11, -R*1.55);
    ctx.stroke();
    // fuse inner highlight (braid)
    ctx.strokeStyle = '#d4926a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(2, -R*0.88);
    ctx.quadraticCurveTo(8, -R*1.2, 11, -R*1.55);
    ctx.stroke();

    // 10. Spark tip — real volumetric burst
    ctx.save();
    ctx.translate(11, -R*1.55);
    ctx.globalCompositeOperation='lighter';
    // outer heat glow
    const hg = ctx.createRadialGradient(0,0,0, 0,0, 11);
    hg.addColorStop(0, 'rgba(255,220,120,0.95)');
    hg.addColorStop(0.5, 'rgba(255,120,40,0.55)');
    hg.addColorStop(1, 'rgba(255,80,20,0)');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.fill();
    // star rays
    ctx.strokeStyle = '#ffd080'; ctx.lineWidth = 1.4; ctx.lineCap = 'round';
    const rSize = 2.8 + Math.sin(G.t*0.04)*0.6;
    for(let i=0; i<8; i++){
      const a = (i/8)*Math.PI*2 + G.t*0.006;
      const len = i%2===0 ? rSize+3 : rSize+1.5;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a)*1.2, Math.sin(a)*1.2);
      ctx.lineTo(Math.cos(a)*len, Math.sin(a)*len);
      ctx.stroke();
    }
    // white-hot core
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(0,0,1.8,0,Math.PI*2); ctx.fill();
    ctx.restore();

    // 11. Angry eyes — 3D spherical with catchlights
    for(const side of [-1, 1]){
      const ex = side*5;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.ellipse(ex, 4, 4.2, 4.8, 0, 0, Math.PI*2); ctx.fill();
      // eye inner ring
      ctx.strokeStyle = 'rgba(40,0,20,0.3)'; ctx.lineWidth = 0.6;
      ctx.beginPath(); ctx.ellipse(ex, 4, 4.2, 4.8, 0, 0, Math.PI*2); ctx.stroke();
      // pupil with gradient
      const pg = ctx.createRadialGradient(ex-1, 4, 0, ex, 5, 2.4);
      pg.addColorStop(0, '#3a1020');
      pg.addColorStop(1, '#0a0208');
      ctx.fillStyle = pg;
      ctx.beginPath(); ctx.arc(ex+(side>0?1:-1), 5, 2.4, 0, Math.PI*2); ctx.fill();
      // catchlight
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(ex-1, 3, 1, 0, Math.PI*2); ctx.fill();
    }
    // angry red brows (slanted, glowing)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.strokeStyle = 'rgba(255,60,80,0.5)';
    ctx.lineWidth = 4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-10, -1); ctx.lineTo(-1, 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10, -1); ctx.lineTo(2, 2); ctx.stroke();
    ctx.restore();
    ctx.strokeStyle = '#ff2a50';
    ctx.lineWidth = 2.3; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-10, -1); ctx.lineTo(-1, 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10, -1); ctx.lineTo(2, 2); ctx.stroke();
    // grumpy mouth (fanged)
    ctx.strokeStyle = '#0a040f'; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(-4, 12); ctx.quadraticCurveTo(0, 9, 4, 12); ctx.stroke();
    // tiny tooth
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.moveTo(-1.5, 11.5); ctx.lineTo(0, 13.5); ctx.lineTo(1.5, 11.5); ctx.closePath(); ctx.fill();

    // 12. Tiny feet
    const legP = Math.sin(e.hop*3)*1.5;
    for(const s of [[-1, C.fuseHole], [1, '#4dd0ff']]){
      const fx = s[0]>0 ? 2 : -10;
      const fy = R-4 + s[0]*legP;
      const fg = ctx.createLinearGradient(fx, fy, fx, fy+5);
      fg.addColorStop(0, '#ffffff'); fg.addColorStop(1, '#c4cad4');
      ctx.fillStyle = fg;
      roundRect(fx, fy, 8, 5, 2); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,10,0.45)'; ctx.lineWidth = 0.6;
      roundRect(fx, fy, 8, 5, 2); ctx.stroke();
      ctx.fillStyle = s[1]; ctx.fillRect(fx, fy+3, 8, 1.8);
    }

    // 13. Hit flash
    if(hitFlash > 0){
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle = `rgba(255,255,255,${hitFlash*0.85})`;
      ctx.beginPath(); ctx.arc(0, 0, R*1.15, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  // =======================================================================
  //  ROCKET ALIEN (match) — Astronaut alien with plasma jetpack
  //  Layers: thruster plasma (3-layer) · metal thruster housing · flight-suit
  //          with seams · glass helmet with dual spec · alien face · antenna
  // =======================================================================
  else if(e.kind==='match'){
    ctx.save();
    const bodyW = 28, bodyH = e.h-22;
    // float bob
    const bob = Math.sin(G.t*0.005)*0.6;

    // 1. Plasma flame exhaust (3-layer: outer red → mid orange → core white)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const fLen = 14 + Math.sin(G.t*0.05)*4 + Math.sin(e.hop*5)*2;
    // layer 1 outer red wash
    const f1 = ctx.createLinearGradient(cx, by+e.h-14, cx, by+e.h+fLen);
    f1.addColorStop(0, 'rgba(255,100,40,0.75)');
    f1.addColorStop(1, 'rgba(255,50,30,0)');
    ctx.fillStyle = f1;
    ctx.beginPath();
    ctx.moveTo(cx-10, by+e.h-13);
    ctx.quadraticCurveTo(cx, by+e.h+fLen*1.1, cx+10, by+e.h-13);
    ctx.closePath(); ctx.fill();
    // layer 2 mid yellow
    const f2 = ctx.createLinearGradient(cx, by+e.h-12, cx, by+e.h+fLen*0.75);
    f2.addColorStop(0, 'rgba(255,220,100,0.9)');
    f2.addColorStop(1, 'rgba(255,150,50,0)');
    ctx.fillStyle = f2;
    ctx.beginPath();
    ctx.moveTo(cx-7, by+e.h-13);
    ctx.quadraticCurveTo(cx, by+e.h+fLen*0.75, cx+7, by+e.h-13);
    ctx.closePath(); ctx.fill();
    // layer 3 white-hot core
    const f3 = ctx.createLinearGradient(cx, by+e.h-12, cx, by+e.h+fLen*0.45);
    f3.addColorStop(0, 'rgba(255,255,255,1)');
    f3.addColorStop(1, 'rgba(255,230,160,0)');
    ctx.fillStyle = f3;
    ctx.beginPath();
    ctx.moveTo(cx-3, by+e.h-12);
    ctx.quadraticCurveTo(cx, by+e.h+fLen*0.45, cx+3, by+e.h-12);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    // Apply float bob to body
    const fby = by + bob;

    // 2. Contact shadow
    softShadow(cx, by+e.h+2, 16, 0.35);

    // 3. Thruster housing (metallic segmented)
    const thG = ctx.createLinearGradient(cx, fby+e.h-22, cx, fby+e.h-12);
    thG.addColorStop(0, '#d0d4dc');
    thG.addColorStop(0.5, '#7a7e8a');
    thG.addColorStop(1, '#2a2e3a');
    ctx.fillStyle = thG;
    roundRect(cx-11, fby+e.h-22, 22, 10, 3.5); ctx.fill();
    // thruster seam line
    ctx.strokeStyle = '#1a1e28'; ctx.lineWidth = 0.8;
    roundRect(cx-11, fby+e.h-22, 22, 10, 3.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-9, fby+e.h-15); ctx.lineTo(cx+9, fby+e.h-15); ctx.stroke();
    // glowing rivets
    for(const rx of [-6, 0, 6]){
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const rg = ctx.createRadialGradient(cx+rx, fby+e.h-18, 0, cx+rx, fby+e.h-18, 4);
      rg.addColorStop(0, 'rgba(255,210,80,0.8)');
      rg.addColorStop(1, 'rgba(255,150,20,0)');
      ctx.fillStyle = rg;
      ctx.beginPath(); ctx.arc(cx+rx, fby+e.h-18, 4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#ffe080';
      ctx.beginPath(); ctx.arc(cx+rx, fby+e.h-18, 1.4, 0, Math.PI*2); ctx.fill();
    }

    // 4. Flight suit body (teardrop with seams)
    const suitG = ctx.createRadialGradient(cx-5, fby+8, 3, cx, fby+bodyH*0.5, bodyW);
    suitG.addColorStop(0,    '#d0ffd0');
    suitG.addColorStop(0.25, '#72d494');
    suitG.addColorStop(0.65, '#2e8a50');
    suitG.addColorStop(1,    '#0c3020');
    ctx.fillStyle = suitG;
    ctx.beginPath();
    ctx.moveTo(cx-bodyW/2+2, fby+e.h-22);
    ctx.bezierCurveTo(cx-bodyW/2-3, fby+bodyH*0.45, cx-bodyW/2+2, fby+5, cx, fby);
    ctx.bezierCurveTo(cx+bodyW/2-2, fby+5, cx+bodyW/2+3, fby+bodyH*0.45, cx+bodyW/2-2, fby+e.h-22);
    ctx.closePath();
    ctx.fill();
    // suit outline
    ctx.strokeStyle = 'rgba(10,30,20,0.8)';
    ctx.lineWidth = 1.3;
    ctx.stroke();
    // chest seam
    ctx.strokeStyle = 'rgba(20,60,40,0.5)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(cx, fby+14);
    ctx.lineTo(cx, fby+e.h-23);
    ctx.stroke();
    // chest tech light
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const cg = ctx.createRadialGradient(cx, fby+bodyH*0.55, 0, cx, fby+bodyH*0.55, 6);
    cg.addColorStop(0, 'rgba(120,255,180,0.9)');
    cg.addColorStop(1, 'rgba(40,220,120,0)');
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(cx, fby+bodyH*0.55, 6, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = '#d0ffe0';
    ctx.beginPath(); ctx.arc(cx, fby+bodyH*0.55, 1.4, 0, Math.PI*2); ctx.fill();

    // 5. Suit side lights (shoulder pads)
    for(const sx of [-bodyW/2+2, bodyW/2-2]){
      ctx.fillStyle = '#ff4db8';
      ctx.beginPath(); ctx.arc(cx+sx, fby+16, 1.8, 0, Math.PI*2); ctx.fill();
    }

    // 6. Glass helmet — dome with dual specular + refractive shine
    ctx.save();
    // glass tint fill
    const glG = ctx.createRadialGradient(cx-3, fby+8, 2, cx, fby+14, 16);
    glG.addColorStop(0, 'rgba(240,255,255,0.55)');
    glG.addColorStop(0.5, 'rgba(180,220,255,0.25)');
    glG.addColorStop(1, 'rgba(120,170,220,0.12)');
    ctx.fillStyle = glG;
    ctx.beginPath(); ctx.ellipse(cx, fby+14, 13, 17, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // helmet rim (chrome)
    ctx.strokeStyle = 'rgba(200,240,255,0.85)';
    ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.ellipse(cx, fby+14, 13, 17, 0, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = 'rgba(40,80,120,0.4)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.ellipse(cx, fby+14, 12.2, 16.2, 0, 0, Math.PI*2); ctx.stroke();
    // primary specular arc
    ctx.strokeStyle = 'rgba(255,255,255,0.85)';
    ctx.lineWidth = 1.8; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.ellipse(cx-5, fby+10, 5, 9, -0.3, Math.PI*0.9, Math.PI*1.55); ctx.stroke();
    // tiny secondary shine
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath(); ctx.arc(cx+6, fby+8, 1.4, 0, Math.PI*2); ctx.fill();

    // 7. Alien face inside helmet
    // big eyes with iris ring
    for(const side of [-1, 1]){
      const ex = cx + side*4;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.ellipse(ex, fby+14, 3.6, 5.2, 0, 0, Math.PI*2); ctx.fill();
      // iris ring (red-magenta)
      const ig = ctx.createRadialGradient(ex, fby+14, 0, ex, fby+14, 3);
      ig.addColorStop(0, '#ff8a7a');
      ig.addColorStop(0.6, '#ff3350');
      ig.addColorStop(1, '#7a0a20');
      ctx.fillStyle = ig;
      ctx.beginPath(); ctx.ellipse(ex, fby+15, 2, 3.2, 0, 0, Math.PI*2); ctx.fill();
      // catchlight
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(ex-0.8, fby+13.5, 0.9, 0, Math.PI*2); ctx.fill();
    }
    // tiny nostrils
    ctx.fillStyle = 'rgba(20,60,40,0.6)';
    ctx.beginPath(); ctx.arc(cx-1, fby+20, 0.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+1, fby+20, 0.5, 0, Math.PI*2); ctx.fill();

    // 8. Antenna with LED tip
    const at = Math.sin(G.t*0.005)*1.5;
    ctx.strokeStyle = '#1a3868'; ctx.lineWidth = 2.2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(cx, fby-2); ctx.lineTo(cx+at, fby-14); ctx.stroke();
    // LED glow
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const ledG = ctx.createRadialGradient(cx+at, fby-14, 0, cx+at, fby-14, 9);
    ledG.addColorStop(0, 'rgba(255,140,220,1)');
    ledG.addColorStop(0.4, 'rgba(255,77,184,0.7)');
    ledG.addColorStop(1, 'rgba(255,77,184,0)');
    ctx.fillStyle = ledG;
    ctx.beginPath(); ctx.arc(cx+at, fby-14, 9, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // LED core
    const ledC = ctx.createRadialGradient(cx+at-1, fby-15, 0, cx+at, fby-14, 3);
    ledC.addColorStop(0, '#ffffff');
    ledC.addColorStop(0.6, '#ffb8e0');
    ledC.addColorStop(1, '#c03080');
    ctx.fillStyle = ledC;
    ctx.beginPath(); ctx.arc(cx+at, fby-14, 3, 0, Math.PI*2); ctx.fill();

    // 9. Hit flash
    if(hitFlash > 0){
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.fillStyle = `rgba(255,255,255,${hitFlash*0.7})`;
      ctx.beginPath();
      ctx.ellipse(cx, fby+e.h*0.5, bodyW*0.7, e.h*0.6, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }

  // =======================================================================
  //  UFO DRONE — chrome saucer with rotating underlights + volumetric beam
  //  Layers: rotating beam · chromed ring hull · rotating LED sequence ·
  //          dome glass with fresnel · alien pilot with glowing eyes · antenna
  // =======================================================================
  else if(e.kind==='ufo'){
    const uCx = e.x + e.w/2;
    const uCy = e.y + e.h/2;
    ctx.save();
    // tilt slightly based on movement
    const tilt = Math.sin(G.t*0.003)*0.06;
    ctx.translate(uCx, uCy);
    ctx.rotate(tilt);

    // 1. Volumetric tractor beam (animated cone with scanning particles)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    // outer cone
    const beamLen = 40;
    const bg = ctx.createLinearGradient(0, 4, 0, 4+beamLen);
    bg.addColorStop(0, 'rgba(255,220,120,0.55)');
    bg.addColorStop(0.5, 'rgba(255,180,80,0.22)');
    bg.addColorStop(1, 'rgba(255,140,40,0)');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.moveTo(-e.w*0.22, 6);
    ctx.lineTo(-e.w*0.42, 4+beamLen);
    ctx.lineTo(e.w*0.42, 4+beamLen);
    ctx.lineTo(e.w*0.22, 6);
    ctx.closePath(); ctx.fill();
    // scanning stripe inside beam
    const scanY = (G.t*0.08) % beamLen;
    ctx.fillStyle = 'rgba(255,255,200,0.45)';
    ctx.beginPath();
    const scanLW = e.w*0.22 + (e.w*0.2)*(scanY/beamLen);
    ctx.moveTo(-scanLW, 6+scanY);
    ctx.lineTo(scanLW, 6+scanY);
    ctx.lineTo(scanLW*0.94, 6+scanY+2);
    ctx.lineTo(-scanLW*0.94, 6+scanY+2);
    ctx.closePath(); ctx.fill();
    // beam source hotspot
    const bh = ctx.createRadialGradient(0, 6, 0, 0, 6, 18);
    bh.addColorStop(0, 'rgba(255,240,180,0.9)');
    bh.addColorStop(1, 'rgba(255,200,120,0)');
    ctx.fillStyle = bh;
    ctx.beginPath(); ctx.arc(0, 6, 18, 0, Math.PI*2); ctx.fill();

    // 2. Contact shadow on ground (faint, far below)
    // (skipped — UFO is airborne, beam serves as shadow)

    bpG.addColorStop(1, '#10161e');

    roundRect(-e.w*0.36, 4, e.w*0.72, 9, 4); ctx.stroke();

    // 4. Rotating LED sequence underneath (5 lights, sequential)
    const seqPhase = (G.t*0.012) % 5;
    for(let i=0; i<5; i++){
      const lx = -e.w*0.28 + i*(e.w*0.14);
      const ly = 8;
      const active = Math.abs(((seqPhase - i + 2.5) % 5) - 2.5) < 1.2;
      const intensity = active ? 1 : 0.15;

      ctx.save();
      ctx.globalCompositeOperation='lighter';
      const lg = ctx.createRadialGradient(lx, ly, 0, lx, ly, 5);
      lg.addColorStop(0, `rgba(255,220,100,${0.9*intensity})`);

      ctx.beginPath(); ctx.arc(lx, ly, 5, 0, Math.PI*2); ctx.fill();

      ctx.fillStyle = active ? '#fff2b0' : '#604020';
      ctx.beginPath(); ctx.arc(lx, ly, 1.8, 0, Math.PI*2); ctx.fill();
    }

    // 5. Ring hull — chrome metal with horizontal bands
    const ringG = ctx.createLinearGradient(0, -7, 0, 7);
    ringG.addColorStop(0,    '#f4f8ff');
    ringG.addColorStop(0.25, '#c8d4e0');
    ringG.addColorStop(0.55, '#586a7e');
    ringG.addColorStop(0.8,  '#30404e');
    ringG.addColorStop(1,    '#1a222c');
    ctx.fillStyle = ringG;
    roundRect(-e.w*0.48, -7, e.w*0.96, 14, 7); ctx.fill();
    // ring edge
    ctx.strokeStyle = '#0a101a'; ctx.lineWidth = 1;
    roundRect(-e.w*0.48, -7, e.w*0.96, 14, 7); ctx.stroke();
    // band seam
    ctx.strokeStyle = 'rgba(40,60,80,0.6)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(-e.w*0.46, 0); ctx.lineTo(e.w*0.46, 0); ctx.stroke();
    // bright specular streak on top
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(-e.w*0.35, -5.5);
    ctx.lineTo(e.w*0.35, -5.5);
    ctx.lineTo(e.w*0.33, -4.2);
    ctx.lineTo(-e.w*0.33, -4.2);
    ctx.closePath(); ctx.fill();
    ctx.restore();

    ctx.fillStyle = 'rgba(10,20,40,0.4)';
    ctx.beginPath(); ctx.ellipse(0, -6.5, 14, 2, 0, 0, Math.PI*2); ctx.fill();
    // dome glass body
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(0, -6, 14, 12, 0, Math.PI, Math.PI*2);
    ctx.closePath();
    ctx.clip();
    // tinted interior
    const dInt = ctx.createRadialGradient(0, -4, 2, 0, -6, 14);
    dInt.addColorStop(0, 'rgba(200,240,255,0.65)');
    dInt.addColorStop(0.7, 'rgba(80,140,200,0.4)');
    dInt.addColorStop(1, 'rgba(40,80,140,0.2)');
    ctx.fillStyle = dInt;
    ctx.fillRect(-14, -18, 28, 14);
    // strong top-left spec
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.ellipse(-5, -12, 4, 6, -0.3, 0, Math.PI*2); ctx.fill();
    // secondary spec
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(5, -10, 1.4, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    // dome rim (chrome)
    ctx.strokeStyle = 'rgba(200,230,255,0.85)'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.ellipse(0, -6, 14, 12, 0, Math.PI, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = 'rgba(40,60,90,0.5)'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.ellipse(0, -6, 13, 11, 0, Math.PI, Math.PI*2); ctx.stroke();

    const plG = ctx.createRadialGradient(-1, -11, 1, 0, -9, 5.5);

    plG.addColorStop(0.5, '#6ed060');
    plG.addColorStop(1, '#1e5020');
    ctx.fillStyle = plG;
    ctx.beginPath(); ctx.ellipse(0, -10, 5, 5, 0, 0, Math.PI*2); ctx.fill();
    // eyes glow
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    for(const side of [-1, 1]){
      const eg = ctx.createRadialGradient(side*2, -10, 0, side*2, -10, 3);
      eg.addColorStop(0, 'rgba(255,120,220,0.8)');
      eg.addColorStop(1, 'rgba(255,77,184,0)');
      ctx.fillStyle = eg;
      ctx.beginPath(); ctx.arc(side*2, -10, 3, 0, Math.PI*2); ctx.fill();

    ctx.beginPath(); ctx.arc(-2, -10, 1.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(2, -10, 1.2, 0, Math.PI*2); ctx.fill();
